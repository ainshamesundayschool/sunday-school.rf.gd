<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>الرحلات — نسخة لوحة الكنيسة</title>
  <style>
    html,body{height:100%;margin:0}
    body{font-family: Cairo, sans-serif;background:#f5f5f8}
    .frame-wrap{position:fixed;inset:0;display:flex;flex-direction:column}
    .frame-top{height:56px;display:flex;align-items:center;gap:12px;padding:8px 12px;background:#fff;border-bottom:1px solid rgba(0,0,0,.06);box-shadow:0 1px 4px rgba(0,0,0,.04);z-index:40}
    .frame-top .back{padding:8px 12px;border-radius:8px;border:1px solid var(--border,rgba(0,0,0,.08));background:#ffff;cursor:pointer;font-weight:700}
    .frame-top .hint{color:#6e6d85;font-size:0.9rem;margin-right:auto}
    iframe{flex:1;border:0;width:100%;height:100%}
  </style>
</head>
<body>
  <div class="frame-wrap">
    <div class="frame-top">
      <button class="back" id="backBtn">◀ العودة إلى لوحة الكنيسة</button>
      <div class="hint">نسخة كاملة من واجهة إدارة الرحلات</div>
    </div>
    <iframe id="dashFrame" src="/uncle/church/index.html#trips" title="لوحة الرحلات"></iframe>
  </div>

  <script>
    // Preserve and forward any hash/query parameters to the embedded dashboard
    (function(){
      const frame = document.getElementById('dashFrame');
      const back = document.getElementById('backBtn');

      // If someone opened with a trip hash like #trip-123&tab=regs, forward it
      const rawHash = window.location.hash || '';
      if (rawHash) {
        // If hash already begins with '#', remove leading '#'
        const cleaned = rawHash.replace(/^#/, '');
        // join to trips base
        frame.src = '/uncle/church/index.html#trips?' + cleaned;
      }

      // Back button returns to the church dashboard and opens the trips tab
      back.addEventListener('click', function(){
        window.location.href = '/uncle/church/index.html#trips';
      });

      // Allow messages from iframe to request parent navigation (for back behavior)
      window.addEventListener('message', (ev)=>{
        try{
          const msg = ev.data || {};
          if (msg && msg.type === 'navigate-parent' && msg.hash) {
            window.location.href = '/uncle/church/index.html' + msg.hash;
          }
        }catch(e){}
      }, false);
    })();
  </script>
</body>
</html>
