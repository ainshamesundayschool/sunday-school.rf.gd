<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>إدارة الرحلات</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            color-scheme: light;
            font-family: 'Cairo', sans-serif;
            --bg: #f5f5f8;
            --card: #ffffff;
            --border: rgba(15,14,26,0.1);
            --text: #111827;
            --muted: #6b7280;
            --primary: #4f46e5;
            --success: #059669;
            --danger: #dc2626;
            --warning: #d97706;
            --radius: 18px;
            --shadow: 0 18px 50px rgba(15, 23, 42, 0.05);
        }
        * { box-sizing: border-box; }
        html, body { margin: 0; padding: 0; min-height: 100%; background: var(--bg); color: var(--text); }
        body { font-family: 'Cairo', sans-serif; }
        button, input, select, textarea { font: inherit; }
        .page-shell { max-width: 1320px; margin: 0 auto; padding: 18px 18px 36px; }
        .page-header { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 18px; }
        .page-header h1 { font-size: 1.7rem; margin: 0; }
        .page-actions { display: flex; gap: 10px; flex-wrap: wrap; }
        .btn { display: inline-flex; align-items: center; justify-content: center; gap: 8px; border: 1px solid transparent; border-radius: 999px; padding: 10px 16px; cursor: pointer; transition: all .15s ease; text-decoration: none; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-outline { background: white; color: var(--text); border-color: var(--border); }
        .btn-success { background: var(--success); color: white; }
        .btn-danger { background: var(--danger); color: white; }
        .btn-sm { padding: 8px 12px; font-size: 0.88rem; }
        .btn:hover { transform: translateY(-1px); }
        .panel { background: white; border-radius: 26px; box-shadow: var(--shadow); padding: 20px; border: 1px solid var(--border); }
        .panel-grid { display: grid; grid-template-columns: 1fr 420px; gap: 20px; }
        .panel-full { grid-column: 1 / -1; }
        .card { background: #fff; border: 1px solid var(--border); border-radius: 18px; padding: 16px; display: grid; gap: 10px; }
        .card:hover { box-shadow: 0 16px 40px rgba(15,23,42,.08); }
        .card-title { margin: 0; font-weight: 800; font-size: 1rem; }
        .badge { display: inline-flex; align-items: center; justify-content: center; padding: 3px 10px; border-radius: 999px; font-size: 0.75rem; font-weight: 700; }
        .badge-active { background: #dbeafe; color: #1d4ed8; }
        .badge-paid { background: #d1fae5; color: #047857; }
        .badge-pending { background: #fee2e2; color: #b91c1c; }
        .list-header { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 16px; }
        .search-grid { display: grid; grid-template-columns: 1fr repeat(3, minmax(140px, auto)); gap: 12px; margin-bottom: 18px; }
        .form-input, .form-select, .form-textarea { width: 100%; border: 1px solid var(--border); border-radius: 14px; padding: 12px 14px; color: var(--text); background: #fff; }
        .form-textarea { min-height: 120px; resize: vertical; }
        .trips-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 16px; }
        .trip-card { background: white; border: 1px solid var(--border); border-radius: 18px; padding: 16px; display: grid; gap: 12px; cursor: pointer; transition: transform .2s ease, box-shadow .2s ease; }
        .trip-card:hover { transform: translateY(-2px); box-shadow: 0 16px 40px rgba(15,23,42,.08); }
        .trip-card h3 { margin: 0; font-size: 1rem; }
        .trip-meta { display: flex; flex-wrap: wrap; gap: 10px; font-size: 0.82rem; color: var(--muted); }
        .trip-meta span { display: inline-flex; gap: 6px; align-items: center; }
        .trip-footer { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; justify-content: space-between; margin-top: 8px; }
        .stat-row { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 10px; margin-top: 12px; }
        .stat-box { background: #fafafa; border-radius: 14px; padding: 12px; text-align: center; }
        .stat-box strong { display: block; font-size: 1rem; margin-top: 6px; }
        .detail-panel { display: flex; flex-direction: column; gap: 16px; }
        .detail-header { display: flex; flex-direction: column; gap: 14px; }
        .detail-header .topline { display: flex; gap: 12px; align-items: center; justify-content: space-between; flex-wrap: wrap; }
        .detail-tabs { display: flex; gap: 8px; flex-wrap: wrap; }
        .tab-pill { padding: 10px 14px; border-radius: 999px; border: 1px solid var(--border); cursor: pointer; color: var(--muted); }
        .tab-pill.active { background: var(--primary); color: white; border-color: transparent; }
        .detail-body { background: #fafbff; border-radius: 22px; padding: 18px; min-height: 360px; }
        .hidden { display: none !important; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .grid-3 { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 12px; }
        .table { width: 100%; border-collapse: collapse; }
        .table th, .table td { text-align: right; padding: 10px 8px; border-bottom: 1px solid #ebedf2; }
        .table th { color: var(--muted); font-weight: 700; }
        .modal-backdrop { position: fixed; inset: 0; background: rgba(15,23,42,0.45); display: none; align-items: center; justify-content: center; padding: 18px; z-index: 1200; }
        .modal-backdrop.open { display: flex; }
        .modal { background: white; border-radius: 24px; width: min(100%, 760px); max-width: 760px; max-height: 90vh; overflow-y: auto; padding: 24px; position: relative; }
        .modal-head { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 18px; }
        .modal-head h2 { margin: 0; font-size: 1.2rem; }
        .modal-close { background: transparent; border: none; color: var(--muted); font-size: 1.2rem; cursor: pointer; }
        .modal form { display: grid; gap: 14px; }
        .chip { border: 1px solid var(--border); background: #fff; border-radius: 999px; padding: 8px 14px; cursor: pointer; color: var(--muted); }
        .chip.active { background: var(--primary); color: white; border-color: transparent; }
        .toast { position: fixed; left: 50%; transform: translateX(-50%); bottom: 24px; background: rgba(20,20,20,0.95); color: white; border-radius: 14px; padding: 12px 18px; display: none; z-index: 1300; min-width: 240px; text-align: center; }
        @media (max-width: 980px) { .panel-grid { grid-template-columns: 1fr; } }
        @media (max-width: 640px) { .search-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="page-shell">
        <div class="page-header">
            <div>
                <h1>لوحة الرحلات</h1>
                <p style="color:var(--muted);margin:6px 0 0;">صفحة مستقلة لإدارة الرحلات، التسجيلات، الدفعات والتصدير.</p>
            </div>
            <div class="page-actions">
                <button class="btn btn-primary" onclick="openTripForm()"><i class="fas fa-plus"></i> إضافة رحلة جديدة</button>
                <button class="btn btn-outline" onclick="refreshPage()"><i class="fas fa-sync-alt"></i> تحديث</button>
            </div>
        </div>

        <div class="panel">
            <div class="search-grid">
                <input id="tripSearch" class="form-input" type="text" placeholder="ابحث برقم الرحلة أو العنوان..." oninput="applyFilters()">
                <select id="tripStatusFilter" class="form-select" onchange="applyFilters()">
                    <option value="all">كل الحالات</option>
                    <option value="planned">مخطط لها</option>
                    <option value="active">نشطة</option>
                    <option value="completed">منتهية</option>
                    <option value="cancelled">ملغية</option>
                </select>
                <select id="tripTypeFilter" class="form-select" onchange="applyFilters()">
                    <option value="all">كل الأنواع</option>
                    <option value="one_day">يوم واحد</option>
                    <option value="multiple_days">عدة أيام</option>
                </select>
                <select id="tripSort" class="form-select" onchange="applyFilters()">
                    <option value="date_desc">أحدث أولاً</option>
                    <option value="date_asc">أقدم أولاً</option>
                    <option value="regs">الأكثر تسجيلًا</option>
                    <option value="price">السعر</option>
                    <option value="name">الاسم</option>
                </select>
            </div>
        </div>

        <div class="panel-grid" style="margin-top:20px;">
            <div class="panel">
                <div class="list-header"><h2 style="margin:0;font-size:1.1rem;">قائمة الرحلات</h2><span id="tripCount" style="color:var(--muted);"></span></div>
                <div id="tripsList"></div>
            </div>

            <div class="panel detail-panel hidden" id="detailPanel">
                <div class="detail-header">
                    <div class="topline">
                        <div>
                            <h2 id="detailTitle" style="margin:0;font-size:1.2rem;"></h2>
                            <div id="detailSubtitle" style="color:var(--muted);font-size:0.95rem;margin-top:6px;"></div>
                        </div>
                        <div class="page-actions" style="justify-content:flex-end;">
                            <button class="btn btn-outline btn-sm" onclick="openTripForm(true)"><i class="fas fa-edit"></i> تعديل الرحلة</button>
                            <button class="btn btn-outline btn-sm" onclick="exportTripData(currentTripId)"><i class="fas fa-file-csv"></i> تصدير الوتائق والدفعات</button>
                            <button class="btn btn-outline btn-sm" onclick="copyTripLink()"><i class="fas fa-link"></i> نسخ الرابط</button>
                        </div>
                    </div>
                    <div class="detail-tabs">
                        <span class="tab-pill active" data-tab="info" onclick="switchDetailTab('info')">الملخص</span>
                        <span class="tab-pill" data-tab="regs" onclick="switchDetailTab('regs')">المسجلون</span>
                        <span class="tab-pill" data-tab="exp" onclick="switchDetailTab('exp')">المصروفات</span>
                    </div>
                </div>
                <div class="detail-body">
                    <div id="detailInfo" class="detail-tab-panel"></div>
                    <div id="detailRegs" class="detail-tab-panel hidden"></div>
                    <div id="detailExp" class="detail-tab-panel hidden"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal-backdrop" id="tripFormModal">
        <div class="modal">
            <div class="modal-head"><h2 id="tripFormTitle">إضافة رحلة</h2><button class="modal-close" onclick="closeModal('tripFormModal')"><i class="fas fa-times"></i></button></div>
            <form id="tripForm" onsubmit="saveTrip(event)">
                <input type="hidden" id="editTripId">
                <div class="grid-2">
                    <div>
                        <label>العنوان *</label>
                        <input id="tripTitle" class="form-input" required>
                    </div>
                    <div>
                        <label>السعر (جنيه)</label>
                        <input id="tripPrice" class="form-input" type="number" min="0" step="1">
                    </div>
                </div>
                <div class="grid-2">
                    <div>
                        <label>النوع</label>
                        <select id="tripType" class="form-select" onchange="toggleTripEndDate()">
                            <option value="one_day">يوم واحد</option>
                            <option value="multiple_days">عدة أيام</option>
                        </select>
                    </div>
                    <div>
                        <label>حالة الرحلة</label>
                        <select id="tripStatus" class="form-select">
                            <option value="planned">مخطط لها</option>
                            <option value="active">نشطة</option>
                            <option value="completed">منتهية</option>
                            <option value="cancelled">ملغية</option>
                        </select>
                    </div>
                </div>
                <div class="grid-2">
                    <div>
                        <label>تاريخ البدء *</label>
                        <input id="tripStartDate" class="form-input" type="date" required>
                    </div>
                    <div id="tripEndDateGroup" style="display:none;">
                        <label>تاريخ الانتهاء</label>
                        <input id="tripEndDate" class="form-input" type="date">
                    </div>
                </div>
                <div class="grid-2">
                    <div>
                        <label>الخصم</label>
                        <input id="tripDiscount" class="form-input" type="number" min="0" step="1" value="0">
                    </div>
                    <div>
                        <label>نوع الخصم</label>
                        <select id="tripDiscountType" class="form-select">
                            <option value="percentage">%</option>
                            <option value="fixed">جنيه</option>
                        </select>
                    </div>
                </div>
                <div>
                    <label>الحد الأقصى للمشاركين</label>
                    <input id="tripMaxParticipants" class="form-input" type="number" min="0" step="1">
                </div>
                <div>
                    <label>الوصف</label>
                    <textarea id="tripDescription" class="form-textarea"></textarea>
                </div>
                <div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:14px;">
                    <button type="submit" class="btn btn-primary">حفظ الرحلة</button>
                    <button type="button" class="btn btn-outline" onclick="closeModal('tripFormModal')">إلغاء</button>
                </div>
            </form>
        </div>
    </div>

    <div class="modal-backdrop" id="registerKidModal">
        <div class="modal">
            <div class="modal-head"><h2>تسجيل طفل في الرحلة</h2><button class="modal-close" onclick="closeModal('registerKidModal')"><i class="fas fa-times"></i></button></div>
            <form id="registerKidForm" onsubmit="registerKid(event)">
                <input type="hidden" id="registerTripId">
                <div style="margin-bottom:12px;">
                    <label>ابحث عن طفل</label>
                    <input id="registerSearch" class="form-input" type="text" placeholder="ابحث بالاسم أو الفصل" oninput="filterRegisterKids()">
                </div>
                <div id="kidsGrid" style="display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;max-height:320px;overflow:auto;padding-right:4px;"></div>
                <div style="margin-top:14px;display:grid;grid-template-columns:1fr 1fr;gap:12px;">
                    <div>
                        <label>دفعة مقدمة (ج)</label>
                        <input id="registerDeposit" class="form-input" type="number" min="0" step="1" value="0">
                    </div>
                    <div>
                        <label>ملاحظات</label>
                        <input id="registerNotes" class="form-input" type="text">
                    </div>
                </div>
                <div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:16px;">
                    <button type="submit" class="btn btn-primary">تسجيل الطفل</button>
                    <button type="button" class="btn btn-outline" onclick="closeModal('registerKidModal')">إلغاء</button>
                </div>
            </form>
        </div>
    </div>

    <div class="modal-backdrop" id="paymentModal">
        <div class="modal">
            <div class="modal-head"><h2>إضافة دفعة</h2><button class="modal-close" onclick="closeModal('paymentModal')"><i class="fas fa-times"></i></button></div>
            <form id="paymentForm" onsubmit="submitPayment(event)">
                <input type="hidden" id="paymentRegistrationId">
                <div id="paymentInfo" style="margin-bottom:14px;color:var(--muted);"></div>
                <div class="grid-2">
                    <div>
                        <label>المبلغ *</label>
                        <input id="paymentAmount" class="form-input" type="number" min="1" step="1" required>
                    </div>
                    <div>
                        <label>تبرع إضافي</label>
                        <input id="paymentDonation" class="form-input" type="number" min="0" step="1" value="0">
                    </div>
                </div>
                <div class="grid-2">
                    <div>
                        <label>طريقة الدفع</label>
                        <select id="paymentMethod" class="form-select">
                            <option value="cash">نقداً</option>
                            <option value="card">بطاقة</option>
                            <option value="bank_transfer">تحويل بنكي</option>
                            <option value="other">أخرى</option>
                        </select>
                    </div>
                    <div>
                        <label>ملاحظات</label>
                        <input id="paymentNotes" class="form-input" type="text">
                    </div>
                </div>
                <div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:16px;">
                    <button type="submit" class="btn btn-success">إضافة الدفعة</button>
                    <button type="button" class="btn btn-outline" onclick="closeModal('paymentModal')">إلغاء</button>
                </div>
            </form>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        const API_URL = '/api.php';
        let trips = [];
        let filteredTrips = [];
        let currentTripId = null;
        let currentTripTab = 'info';
        let allKids = [];
        let selectedKidId = null;

        function mkFd(action) {
            const fd = new FormData();
            fd.append('action', action);
            return fd;
        }
        function escHtml(value) {
            return String(value || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
        }
        function showToast(message, type='info') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.style.background = type === 'success' ? 'rgba(5,150,105,0.95)' : type === 'danger' ? 'rgba(220,38,38,0.95)' : 'rgba(20,20,20,0.95)';
            toast.classList.add('open');
            toast.style.display = 'block';
            clearTimeout(window.toastTimer);
            window.toastTimer = setTimeout(() => { toast.style.display = 'none'; }, 2600);
        }
        function openModal(id) {
            document.getElementById(id).classList.add('open');
        }
        function closeModal(id) {
            document.getElementById(id).classList.remove('open');
        }

        async function init() {
            await loadTrips();
            applyHash();
            window.addEventListener('hashchange', applyHash);
        }

        async function loadTrips() {
            const fd = mkFd('getTrips');
            fd.append('status', 'all');
            fd.append('type', 'all');
            const response = await fetch(API_URL, {method:'POST', body: fd}).then(r => r.json()).catch(() => ({success:false}));
            if (response.success && Array.isArray(response.trips)) {
                trips = response.trips;
                trips.forEach(t => t.start_date_formatted = t.start_date ? new Date(t.start_date).toLocaleDateString('ar-EG') : '');
                filteredTrips = [...trips];
                renderTrips();
                if (currentTripId) {
                    const stillExists = trips.some(t => t.id === currentTripId);
                    if (!stillExists) { closeDetails(); }
                }
            } else {
                document.getElementById('tripsList').innerHTML = '<div style="padding:24px;color:var(--muted);">فشل في تحميل الرحلات.</div>';
            }
        }

        function renderTrips() {
            const list = document.getElementById('tripsList');
            document.getElementById('tripCount').textContent = `(${filteredTrips.length} رحلة)`;
            if (!filteredTrips.length) {
                list.innerHTML = `<div style="padding:36px;text-align:center;color:var(--muted);">لا توجد رحلات مطابقة.</div>`;
                return;
            }
            list.innerHTML = `<div class="trips-grid">${filteredTrips.map(trip => {
                const price = calcFinalPrice(trip);
                const statusText = trip.status === 'planned' ? 'مخطط لها' : trip.status === 'active' ? 'نشطة' : trip.status === 'completed' ? 'منتهية' : 'ملغية';
                const statusClass = trip.status === 'active' ? 'badge-active' : trip.status === 'completed' ? 'badge-paid' : trip.status === 'cancelled' ? 'badge-pending' : 'badge-active';
                return `<div class="trip-card" onclick="openTrip(${trip.id})">
                    <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:10px;">
                        <div><h3 class="card-title">${escHtml(trip.title)}</h3><div class="trip-meta"><span><i class="fas fa-calendar"></i>${escHtml(trip.start_date_formatted)}</span><span><i class="fas fa-bus"></i>${trip.type === 'one_day' ? 'يوم واحد' : 'عدة أيام'}</span></div></div>
                        <span class="badge ${statusClass}">${statusText}</span>
                    </div>
                    <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:center;"> <strong style="font-size:1.1rem;color:var(--primary);">${price} ج</strong> ${trip.discount > 0 ? `<span style="color:var(--muted);text-decoration:line-through;">${trip.price} ج</span>` : ''}</div>
                    <div class="stat-row">
                        <div class="stat-box"><small>مسجل</small><strong>${trip.registered_count || 0}</strong></div>
                        <div class="stat-box"><small>مدفوع</small><strong>${trip.paid_count || 0}</strong></div>
                        <div class="stat-box"><small>الحد الأقصى</small><strong>${trip.max_participants || '∞'}</strong></div>
                    </div>
                    <div class="trip-footer">
                        <button class="btn btn-sm btn-outline" onclick="event.stopPropagation(); exportTripData(${trip.id})"><i class="fas fa-file-csv"></i> تصدير</button>
                        <button class="btn btn-sm btn-outline" onclick="event.stopPropagation(); deleteTrip(${trip.id})"><i class="fas fa-trash"></i> حذف</button>
                    </div>
                </div>`;
            }).join('')}</div>`;
        }

        function calcFinalPrice(trip) {
            if (!trip.discount || trip.discount == 0) return Math.round(trip.price || 0);
            if (trip.discount_type === 'percentage') return Math.round((trip.price || 0) - ((trip.price || 0) * trip.discount / 100));
            return Math.round(Math.max(0, (trip.price || 0) - trip.discount));
        }

        function applyFilters() {
            const query = document.getElementById('tripSearch').value.trim().toLowerCase();
            const status = document.getElementById('tripStatusFilter').value;
            const type = document.getElementById('tripTypeFilter').value;
            const sort = document.getElementById('tripSort').value;
            filteredTrips = trips.filter(t => {
                const matchesQuery = !query || `${t.title} ${t.id}`.toLowerCase().includes(query);
                const matchesStatus = status === 'all' || t.status === status;
                const matchesType = type === 'all' || t.type === type;
                return matchesQuery && matchesStatus && matchesType;
            });
            if (sort === 'date_asc') filteredTrips.sort((a,b) => new Date(a.start_date) - new Date(b.start_date));
            else if (sort === 'date_desc') filteredTrips.sort((a,b) => new Date(b.start_date) - new Date(a.start_date));
            else if (sort === 'price') filteredTrips.sort((a,b) => calcFinalPrice(a) - calcFinalPrice(b));
            else if (sort === 'name') filteredTrips.sort((a,b) => (a.title||'').localeCompare(b.title || '', 'ar'));
            else if (sort === 'regs') filteredTrips.sort((a,b) => (b.registered_count||0) - (a.registered_count||0));
            renderTrips();
        }

        async function openTrip(id) {
            currentTripId = id;
            window.location.hash = `trip-${id}`;
            await loadTripDetail(id);
            document.getElementById('detailPanel').classList.remove('hidden');
        }

        async function loadTripDetail(id) {
            const fdTrip = mkFd('getTripDetails'); fdTrip.append('trip_id', id);
            const fdExp = mkFd('getTripExpenses'); fdExp.append('trip_id', id);
            const [tripResp, expResp] = await Promise.all([
                fetch(API_URL, {method:'POST', body: fdTrip}).then(r=>r.json()).catch(()=>({success:false})),
                fetch(API_URL, {method:'POST', body: fdExp}).then(r=>r.json()).catch(()=>({success:false}))
            ]);
            if (!tripResp.success) {
                showToast('فشل في جلب تفاصيل الرحلة', 'danger');
                return;
            }
            const trip = tripResp.trip;
            const expenses = expResp.success ? expResp.expenses || [] : [];
            renderTripDetail(trip, expenses);
            if (currentTripTab) switchDetailTab(currentTripTab);
            else switchDetailTab('info');
        }

        function renderTripDetail(trip, expenses) {
            currentTripId = trip.id;
            const price = calcFinalPrice(trip);
            const expPerKid = Math.round(expenses.reduce((sum, item) => sum + Number(item.perKid || item.per_kid || 0), 0));
            const totalPerKid = price + expPerKid;
            document.getElementById('detailTitle').textContent = trip.title || 'تفاصيل الرحلة';
            document.getElementById('detailSubtitle').textContent = `${trip.start_date_formatted || trip.start_date || ''} • ${trip.type === 'one_day' ? 'يوم واحد' : 'عدة أيام'}`;
            document.getElementById('detailInfo').innerHTML = `
                <div class="grid-3" style="margin-bottom:18px;">
                    <div class="stat-box"><small>السعر النهائي</small><strong>${price} ج</strong></div>
                    <div class="stat-box"><small>مصروفات لكل طفل</small><strong>+${expPerKid} ج</strong></div>
                    <div class="stat-box"><small>الإجمالي لكل طفل</small><strong>${totalPerKid} ج</strong></div>
                </div>
                ${trip.description ? `<div style="background:#fff;border-radius:18px;padding:16px;border:1px solid var(--border);margin-bottom:16px;">${escHtml(trip.description)}</div>` : ''}
                <div style="display:flex;gap:10px;flex-wrap:wrap;">
                    <button class="btn btn-primary btn-sm" onclick="openRegisterKidModal(${trip.id})"><i class="fas fa-user-plus"></i> تسجيل طفل</button>
                    <button class="btn btn-outline btn-sm" onclick="switchDetailTab('regs')"><i class="fas fa-users"></i> عرض المسجلين</button>
                    <button class="btn btn-outline btn-sm" onclick="switchDetailTab('exp')"><i class="fas fa-receipt"></i> عرض المصروفات</button>
                </div>
            `;
            document.getElementById('detailRegs').innerHTML = (() => {
                const regs = trip.registrations || [];
                if (!regs.length) return `<div style="text-align:center;padding:36px;color:var(--muted);">لا يوجد أطفال مسجلون بعد.</div>`;
                return `
                    <div style="display:flex;gap:12px;flex-wrap:wrap;margin-bottom:18px;align-items:center;justify-content:space-between;">
                        <div style="font-weight:700;">${regs.length} طفل مسجل</div>
                        <div style="color:var(--muted);">الإجمالي المطلوب: <strong>${totalPerKid * regs.length} ج</strong></div>
                    </div>
                    <table class="table"><thead><tr><th>الطفل</th><th>الفصل</th><th>المدفوع</th><th>المتبقي</th><th>الحالة</th><th>إجراءات</th></tr></thead><tbody>
                        ${regs.map(r => {
                            const paid = Math.round(parseFloat(r.total_paid || 0));
                            const remaining = Math.max(0, totalPerKid - paid);
                            const status = remaining <= 0 ? 'مدفوع بالكامل' : paid > 0 ? 'مدفوع جزئياً' : 'غير مدفوع';
                            return `<tr>
                                <td>${escHtml(r.student_name)}</td>
                                <td>${escHtml(r.student_class || '')}</td>
                                <td>${paid} ج</td>
                                <td>${remaining} ج</td>
                                <td>${status}</td>
                                <td style="white-space:nowrap;display:flex;gap:6px;justify-content:flex-end;">
                                    <button class="btn btn-sm btn-outline" onclick="event.stopPropagation(); openPaymentModal(${r.id}, '${escHtml(r.student_name)}', ${totalPerKid}, ${paid})"><i class="fas fa-money-bill"></i></button>
                                    <button class="btn btn-sm btn-danger" onclick="event.stopPropagation(); cancelRegistration(${r.id}, ${trip.id})"><i class="fas fa-times"></i></button>
                                </td>
                            </tr>`;
                        }).join('')}
                    </tbody></table>
                `;
            })();
            document.getElementById('detailExp').innerHTML = expenses.length ? `
                <div style="display:grid;gap:12px;">
                    ${expenses.map(exp => `<div class="card">
                        <div style="display:flex;justify-content:space-between;align-items:center;gap:10px;"><strong>${escHtml(exp.name)}</strong><span>${escHtml(exp.payment_type || exp.type || '')}</span></div>
                        <div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:8px;color:var(--muted);font-size:0.92rem;"><span>المبلغ: ${Math.round(exp.amount || 0)} ج</span><span>لطفل: ${Math.round(exp.perKid || exp.per_kid || 0)} ج</span></div>
                        ${exp.notes ? `<div style="margin-top:10px;color:var(--muted);">${escHtml(exp.notes)}</div>` : ''}
                    </div>`).join('')}
                </div>
            ` : `<div style="padding:26px;text-align:center;color:var(--muted);">لا توجد مصروفات لهذه الرحلة.</div>`;
        }

        function switchDetailTab(tab) {
            currentTripTab = tab;
            document.querySelectorAll('.tab-pill').forEach(el => el.classList.toggle('active', el.dataset.tab === tab));
            document.querySelectorAll('.detail-tab-panel').forEach(el => el.classList.toggle('hidden', el.id !== `detail${tab.charAt(0).toUpperCase() + tab.slice(1)}`));
            updateHash();
        }

        function openTripForm(edit = false) {
            document.getElementById('tripForm').reset();
            document.getElementById('tripEndDateGroup').style.display = 'none';
            document.getElementById('editTripId').value = '';
            document.getElementById('tripFormTitle').textContent = edit ? 'تعديل الرحلة' : 'إضافة رحلة';
            if (edit && currentTripId) {
                const trip = trips.find(t => t.id === currentTripId);
                if (!trip) return;
                document.getElementById('editTripId').value = trip.id;
                document.getElementById('tripTitle').value = trip.title || '';
                document.getElementById('tripPrice').value = Math.round(trip.price || 0);
                document.getElementById('tripType').value = trip.type || 'one_day';
                document.getElementById('tripStatus').value = trip.status || 'planned';
                document.getElementById('tripStartDate').value = trip.start_date ? trip.start_date.split('T')[0] : '';
                document.getElementById('tripEndDate').value = trip.end_date ? trip.end_date.split('T')[0] : '';
                document.getElementById('tripDiscount').value = Math.round(trip.discount || 0);
                document.getElementById('tripDiscountType').value = trip.discount_type || 'percentage';
                document.getElementById('tripMaxParticipants').value = trip.max_participants || '';
                document.getElementById('tripDescription').value = trip.description || '';
                if (trip.type === 'multiple_days') document.getElementById('tripEndDateGroup').style.display = 'block';
            }
            openModal('tripFormModal');
        }

        function toggleTripEndDate() {
            const show = document.getElementById('tripType').value === 'multiple_days';
            document.getElementById('tripEndDateGroup').style.display = show ? 'block' : 'none';
        }

        async function saveTrip(event) {
            event.preventDefault();
            const id = document.getElementById('editTripId').value;
            const fd = mkFd(id ? 'updateTrip' : 'addTrip');
            if (id) fd.append('trip_id', id);
            fd.append('title', document.getElementById('tripTitle').value.trim());
            fd.append('price', Math.round(parseFloat(document.getElementById('tripPrice').value) || 0));
            fd.append('type', document.getElementById('tripType').value);
            fd.append('status', document.getElementById('tripStatus').value);
            fd.append('start_date', document.getElementById('tripStartDate').value);
            fd.append('end_date', document.getElementById('tripEndDate').value);
            fd.append('discount', Math.round(parseFloat(document.getElementById('tripDiscount').value) || 0));
            fd.append('discount_type', document.getElementById('tripDiscountType').value);
            fd.append('max_participants', document.getElementById('tripMaxParticipants').value || 0);
            fd.append('description', document.getElementById('tripDescription').value.trim());
            const response = await fetch(API_URL, {method:'POST', body: fd}).then(r => r.json()).catch(() => ({success:false}));
            if (response.success) {
                showToast(id ? 'تم تحديث الرحلة' : 'تم إضافة الرحلة', 'success');
                closeModal('tripFormModal');
                await loadTrips();
                if (response.trip_id || id) {
                    openTrip(response.trip_id || parseInt(id));
                }
            } else {
                showToast(response.message || 'فشل في حفظ الرحلة', 'danger');
            }
        }

        async function deleteTrip(id) {
            if (!confirm('هل أنت متأكد من حذف هذه الرحلة؟')) return;
            const fd = mkFd('deleteTrip'); fd.append('trip_id', id);
            const response = await fetch(API_URL, {method:'POST', body: fd}).then(r=>r.json()).catch(()=>({success:false}));
            if (response.success) {
                showToast('تم حذف الرحلة', 'success');
                await loadTrips();
                if (currentTripId === id) closeDetails();
            } else {
                showToast(response.message || 'فشل في حذف الرحلة', 'danger');
            }
        }

        function closeDetails() {
            currentTripId = null;
            document.getElementById('detailPanel').classList.add('hidden');
            window.location.hash = '';
        }

        function updateHash() {
            if (currentTripId) {
                window.location.hash = `trip-${currentTripId}&tab=${currentTripTab}`;
            }
        }

        function applyHash() {
            const hash = window.location.hash.replace('#', '');
            if (!hash) return;
            const [part, param] = hash.split('&');
            if (part.startsWith('trip-')) {
                const id = parseInt(part.replace('trip-', ''));
                const tab = param?.startsWith('tab=') ? param.replace('tab=', '') : 'info';
                currentTripTab = tab;
                if (id && id !== currentTripId) {
                    openTrip(id);
                } else if (id && id === currentTripId) {
                    switchDetailTab(tab);
                }
            }
        }

        async function openRegisterKidModal(tripId) {
            selectedKidId = null;
            document.getElementById('registerTripId').value = tripId;
            document.getElementById('registerSearch').value = '';
            document.getElementById('registerDeposit').value = '0';
            document.getElementById('registerNotes').value = '';
            document.getElementById('kidsGrid').innerHTML = '<div style="padding:24px;color:var(--muted);">جاري تحميل الأطفال...</div>';
            openModal('registerKidModal');
            if (!allKids.length) {
                const fd = mkFd('getData');
                const response = await fetch(API_URL, {method:'POST', body: fd}).then(r => r.json()).catch(() => ({success:false}));
                if (response.success && Array.isArray(response.data)) {
                    allKids = response.data;
                } else {
                    document.getElementById('kidsGrid').innerHTML = '<div style="padding:24px;color:var(--muted);">فشل في تحميل الأطفال.</div>';
                    return;
                }
            }
            renderKidCards(allKids);
        }

        function renderKidCards(kids) {
            const grid = document.getElementById('kidsGrid');
            if (!kids.length) {
                grid.innerHTML = '<div style="padding:24px;color:var(--muted);">لا يوجد أطفال.</div>';
                return;
            }
            grid.innerHTML = kids.map(k => {
                const id = k.id || k._studentId || k.student_id || 0;
                const name = k['الاسم'] || k.name || 'طفل';
                const cls = k['الفصل'] || k.class || k.class_name || '';
                return `<button type="button" class="chip${id === selectedKidId ? ' active' : ''}" data-kid-id="${id}" onclick="selectKid(${id})">${escHtml(name)}${cls ? ' — ' + escHtml(cls) : ''}</button>`;
            }).join('');
        }

        function filterRegisterKids() {
            const query = document.getElementById('registerSearch').value.trim().toLowerCase();
            const filtered = allKids.filter(k => {
                const name = (k['الاسم'] || k.name || '').toLowerCase();
                const cls = (k['الفصل'] || k.class || '').toLowerCase();
                return !query || name.includes(query) || cls.includes(query);
            });
            renderKidCards(filtered);
        }

        function selectKid(id) {
            selectedKidId = id;
            document.querySelectorAll('#kidsGrid .chip').forEach(el => {
                el.classList.toggle('active', Number(el.dataset.kidId) === id);
            });
        }

        async function registerKid(event) {
            event.preventDefault();
            const tripId = document.getElementById('registerTripId').value;
            if (!selectedKidId) { showToast('اختر طفلاً أولاً', 'danger'); return; }
            const fd = mkFd('registerStudentForTrip');
            fd.append('trip_id', tripId);
            fd.append('student_id', selectedKidId);
            fd.append('deposit', document.getElementById('registerDeposit').value || 0);
            fd.append('notes', document.getElementById('registerNotes').value || '');
            const response = await fetch(API_URL, {method:'POST', body: fd}).then(r => r.json()).catch(() => ({success:false}));
            if (response.success) {
                showToast('تم تسجيل الطفل', 'success');
                closeModal('registerKidModal');
                await loadTrips();
                if (currentTripId) openTrip(currentTripId);
            } else {
                showToast(response.message || 'فشل في تسجيل الطفل', 'danger');
            }
        }

        function openPaymentModal(regId, name, totalPrice, paid) {
            document.getElementById('paymentRegistrationId').value = regId;
            document.getElementById('paymentAmount').value = totalPrice - paid > 0 ? totalPrice - paid : 0;
            document.getElementById('paymentDonation').value = 0;
            document.getElementById('paymentMethod').value = 'cash';
            document.getElementById('paymentNotes').value = '';
            document.getElementById('paymentInfo').innerHTML = `الطفل: <strong>${escHtml(name)}</strong> • المدفوع: ${paid} ج • المتبقي: ${Math.max(0, totalPrice - paid)} ج`;
            openModal('paymentModal');
        }

        async function submitPayment(event) {
            event.preventDefault();
            const fd = mkFd('addTripPayment');
            fd.append('registration_id', document.getElementById('paymentRegistrationId').value);
            fd.append('amount', Math.round(parseFloat(document.getElementById('paymentAmount').value) || 0));
            fd.append('donation', Math.round(parseFloat(document.getElementById('paymentDonation').value) || 0));
            fd.append('payment_method', document.getElementById('paymentMethod').value);
            fd.append('notes', document.getElementById('paymentNotes').value || '');
            const response = await fetch(API_URL, {method:'POST', body: fd}).then(r => r.json()).catch(() => ({success:false}));
            if (response.success) {
                showToast('تمت إضافة الدفعة', 'success');
                closeModal('paymentModal');
                await loadTrips();
                if (currentTripId) openTrip(currentTripId);
            } else {
                showToast(response.message || 'فشل في إضافة الدفعة', 'danger');
            }
        }

        async function cancelRegistration(regId, tripId) {
            if (!confirm('إلغاء تسجيل هذا الطفل؟')) return;
            const fd = mkFd('cancelTripRegistration'); fd.append('registration_id', regId);
            const response = await fetch(API_URL, {method:'POST', body: fd}).then(r=>r.json()).catch(()=>({success:false}));
            if (response.success) {
                showToast('تم الإلغاء', 'success');
                await loadTrips();
                if (tripId === currentTripId) openTrip(tripId);
            } else {
                showToast(response.message || 'فشل في الإلغاء', 'danger');
            }
        }

        function exportTripData(id) {
            window.location.href = `${API_URL}?action=exportTripData&trip_id=${id}&format=csv`;
        }

        function copyTripLink() {
            if (!currentTripId) return;
            const url = window.location.origin + window.location.pathname + `#trip-${currentTripId}&tab=${currentTripTab}`;
            navigator.clipboard.writeText(url).then(() => showToast('تم نسخ رابط الرحلة', 'success')).catch(() => showToast('فشل في نسخ الرابط', 'danger'));
        }

        function refreshPage() {
            loadTrips();
            if (currentTripId) openTrip(currentTripId);
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
