<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>لوحة تحكم مدارس الأحد</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
@import url('https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&display=swap');

/* ── RESET ──────────────────────────────────────────────────────── */
*, *::before, *::after {
  margin: 0; padding: 0; box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}
html { -webkit-text-size-adjust: 100%; scroll-behavior: smooth; }

/* ── DESIGN TOKENS ──────────────────────────────────────────────── */
:root {
  /* Brand */
  --indigo-50:  #eef0ff;
  --indigo-100: #dde2ff;
  --indigo-200: #c0c8ff;
  --indigo-400: #818cf8;
  --indigo-500: #6366f1;
  --indigo-600: #4f46e5;
  --indigo-700: #4338ca;
  --indigo-800: #3730a3;
  --indigo-900: #1e1b4b;
  --indigo-950: #13112e;

  /* Semantic */
  --primary:        #4f46e5;
  --primary-dark:   #3730a3;
  --primary-light:  #eef0ff;
  --primary-glow:   rgba(99,102,241,0.14);
  --primary-glow-lg:rgba(99,102,241,0.22);

  --success:        #059669;
  --success-light:  #ecfdf5;
  --success-mid:    #a7f3d0;
  --danger:         #dc2626;
  --danger-light:   #fef2f2;
  --danger-mid:     #fca5a5;
  --warning:        #d97706;
  --warning-light:  #fffbeb;
  --warning-mid:    #fcd34d;
  --info:           #0284c7;
  --info-light:     #f0f9ff;
  --dev:            #7c3aed;
  --dev-light:      #f5f3ff;

  /* Surfaces */
  --bg:           #f5f5f8;
  --bg-2:         #ededf3;
  --card:         #ffffff;
  --card-hover:   #fafafa;
  --sidebar-bg:   #13112e;
  --sidebar-mid:  #1c1940;
  --sidebar-top:  #221e4a;

  /* Text */
  --text:         #0f0e1a;
  --text-2:       #3d3c52;
  --text-3:       #6e6d85;
  --text-inv:     #ffffff;
  --muted:        #9898b0;

  /* Borders */
  --border:       rgba(15,14,26,0.08);
  --border-2:     rgba(15,14,26,0.14);
  --border-focus: var(--indigo-500);
  --border-sidebar: rgba(255,255,255,0.07);

  /* Dimensions */
  --sidebar-w:        272px;
  --sidebar-collapsed: 70px;
  --topbar-h:         64px;
  --radius-xs:        6px;
  --radius-sm:        8px;
  --radius:           12px;
  --radius-lg:        16px;
  --radius-xl:        20px;
  --radius-pill:      999px;

  /* Shadow */
  --shadow-xs:  0 1px 3px rgba(15,14,26,0.05), 0 1px 2px rgba(15,14,26,0.06);
  --shadow-sm:  0 2px 8px rgba(15,14,26,0.06), 0 1px 3px rgba(15,14,26,0.08);
  --shadow-md:  0 4px 16px rgba(15,14,26,0.08), 0 2px 6px rgba(15,14,26,0.06);
  --shadow-lg:  0 12px 36px rgba(15,14,26,0.10), 0 4px 12px rgba(15,14,26,0.07);
  --shadow-xl:  0 24px 64px rgba(15,14,26,0.12), 0 8px 24px rgba(15,14,26,0.08);
  --shadow-glow:0 0 0 4px var(--primary-glow);

  /* Motion */
  --ease:   cubic-bezier(0.4, 0, 0.2, 1);
  --ease-out: cubic-bezier(0, 0, 0.2, 1);
  --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
  --t-fast: 0.15s;
  --t-base: 0.22s;
  --t-slow: 0.35s;
  --transition: var(--t-base) var(--ease);
}

/* ── BASE ───────────────────────────────────────────────────────── */
body {
  font-family: 'Cairo', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}

/* ── SCROLLBAR ──────────────────────────────────────────────────── */
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border-2); border-radius: var(--radius-pill); }
::-webkit-scrollbar-thumb:hover { background: var(--muted); }

/* ═══════════════════════════════════════════════════════════════════
   SIDEBAR
═══════════════════════════════════════════════════════════════════ */
.sidebar {
  position: fixed; inset: 0 0 0 auto;
  width: var(--sidebar-w);
  background: var(--sidebar-bg);
  display: flex; flex-direction: column;
  z-index: 300;
  transition: width var(--t-slow) var(--ease), transform var(--t-slow) var(--ease);
  overflow: hidden;
  border-left: 1px solid rgba(255,255,255,0.04);
}

/* Subtle gradient shimmer on sidebar top */
.sidebar::before {
  content: '';
  position: absolute; inset: 0;
  background: radial-gradient(ellipse 280px 200px at 100% 0%, rgba(99,102,241,0.12) 0%, transparent 70%);
  pointer-events: none;
}

.sidebar.collapsed { width: var(--sidebar-collapsed); }

/* Brand */
.sidebar-brand {
  display: flex; align-items: center; gap: 12px;
  padding: 20px 16px 18px;
  border-bottom: 1px solid var(--border-sidebar);
  min-height: 72px; flex-shrink: 0; position: relative;
}
.brand-icon {
  width: 38px; height: 38px; flex-shrink: 0;
  background: linear-gradient(135deg, #6366f1, #818cf8);
  border-radius: var(--radius-sm);
  display: flex; align-items: center; justify-content: center;
  color: white; font-size: 1rem;
  box-shadow: 0 4px 16px rgba(99,102,241,0.45), inset 0 1px 0 rgba(255,255,255,0.2);
}
.brand-icon img {width: 100%;height: 100%;object-fit: cover;}
.brand-text { overflow: hidden; flex: 1; }
.brand-text h2 {
  font-size: 0.95rem; font-weight: 800; color: white;
  white-space: nowrap; letter-spacing: -0.01em;
  transition: opacity var(--transition), width var(--transition);
}
.brand-text p {
  font-size: 0.7rem; font-weight: 400;
  color: rgba(255,255,255,0.35); white-space: nowrap; margin-top: 1px;
}
.sidebar.collapsed .brand-text { opacity: 0; width: 0; }

/* Sidebar toggle */
.sidebar-toggle {
  position: absolute; top: 42%; transform: translateY(-50%);
  left: 14px; width: 28px; height: 28px;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: var(--radius-xs);
  color: rgba(255,255,255,0.6); cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 0.75rem; transition: all var(--transition); z-index: 10;
}
.sidebar-toggle:hover {
  background: var(--primary); color: white;
  border-color: var(--primary);
  box-shadow: 0 4px 12px rgba(99,102,241,0.4);
}
.sidebar.collapsed .sidebar-toggle {
}

/* Nav */
.sidebar-nav { flex: 1; overflow-y: auto; overflow-x: hidden; padding: 10px 0; }
.sidebar-nav::-webkit-scrollbar { width: 3px; }
.sidebar-nav::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); }

.nav-section-label {
  font-size: 0.62rem; font-weight: 700; letter-spacing: 1.8px;
  color: rgba(255,255,255,0.22); text-transform: uppercase;
  padding: 18px 18px 6px;
  white-space: nowrap; transition: opacity var(--transition);
}
.sidebar.collapsed .nav-section-label { opacity: 0; pointer-events: none; }

.nav-item {
  display: flex; align-items: center; gap: 12px;
  padding: 5px 14px; margin: 1px 8px;
  border-radius: var(--radius-sm);
  cursor: pointer; transition: all var(--t-fast) var(--ease);
  color: rgba(255,255,255,0.5); font-size: 0.875rem; font-weight: 600;
  position: relative; white-space: nowrap;
  border: none; background: transparent;
  font-family: 'Cairo', sans-serif; text-align: right;
  width: calc(100% - 16px); letter-spacing: 0.01em;
}
.nav-item i {
  width: 18px; text-align: center; font-size: 0.9rem; flex-shrink: 0;
  transition: transform var(--t-fast) var(--ease);
}
.nav-item:hover {
  background: rgba(255,255,255,0.07);
  color: rgba(255,255,255,0.9);
}
.nav-item:hover i { transform: scale(1.1); }
.nav-item.active {
  background: linear-gradient(135deg, rgba(99,102,241,0.9), rgba(79,70,229,0.95));
  color: white;
  box-shadow: 0 4px 16px rgba(99,102,241,0.3), inset 0 1px 0 rgba(255,255,255,0.15);
}
.nav-item.active i { transform: none; }

/* Dev items */
.nav-item.dev-item { color: rgba(167,139,250,0.7); }
.nav-item.dev-item:hover { background: rgba(139,92,246,0.12); color: #c4b5fd; }
.nav-item.dev-item.active {
  background: linear-gradient(135deg, #7c3aed, #9333ea);
  box-shadow: 0 4px 16px rgba(139,92,246,0.3);
  color: white;
}

/* Nav badge */
.nav-badge {
  margin-right: auto; min-width: 20px;
  background: var(--danger); color: white;
  font-size: 0.6rem; font-weight: 800; padding: 2px 6px;
  border-radius: var(--radius-pill); flex-shrink: 0; text-align: center;
  transition: all var(--transition);
}
.nav-badge[data-count="0"], .nav-badge:empty { display: none !important; }
.sidebar.collapsed .nav-badge { display: none; }
.sidebar.collapsed .nav-item span.label { display: none; }
.sidebar.collapsed .nav-item { justify-content: center; padding: 10px;text-align: center;}

/* Tooltip on collapsed */
.sidebar.collapsed .nav-item::after {
  content: attr(data-tooltip);
  position: absolute; left: calc(100% + 10px); top: 50%; transform: translateY(-50%);
  background: var(--sidebar-top); color: white;
  font-size: 0.78rem; font-weight: 600; padding: 6px 12px; border-radius: var(--radius-sm);
  white-space: nowrap; opacity: 0; pointer-events: none; transition: opacity 0.15s;
  border: 1px solid rgba(255,255,255,0.1); font-family: 'Cairo', sans-serif;
  box-shadow: var(--shadow-md);
}
.sidebar.collapsed .nav-item:hover::after { opacity: 1; }

/* Sidebar footer */
.sidebar-footer { border-top: 1px solid var(--border-sidebar); padding: 12px 10px; flex-shrink: 0; }
.sidebar-footer-user {
  display: flex; align-items: center; gap: 10px; padding: 8px 8px;
  border-radius: var(--radius-sm); cursor: pointer;
  transition: background var(--transition);
}
.sidebar-footer-user:hover { background: rgba(255,255,255,0.06); }
.user-avatar {
  width: 34px; height: 34px;
  background: linear-gradient(135deg, #6366f1, #8b5cf6);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  color: white; font-size: 0.82rem; font-weight: 700; flex-shrink: 0;
  box-shadow: 0 2px 8px rgba(99,102,241,0.4);
}
.user-info { overflow: hidden; flex: 1; }
.user-info strong { font-size: 0.82rem; color: rgba(255,255,255,0.9); display: block; white-space: nowrap; }
.user-info span { font-size: 0.68rem; color: rgba(255,255,255,0.35); white-space: nowrap; }
.footer-actions { display: flex; gap: 5px; margin-top: 8px; }
.footer-btn {
  flex: 1; padding: 7px 6px; border: 1px solid rgba(255,255,255,0.07); border-radius: var(--radius-xs);
  background: rgba(255,255,255,0.04); color: rgba(255,255,255,0.45);
  cursor: pointer; font-size: 0.72rem; font-family: 'Cairo', sans-serif; font-weight: 600;
  display: flex; align-items: center; justify-content: center; gap: 5px;
  transition: all var(--t-fast) var(--ease); white-space: nowrap;
}
.footer-btn:hover { background: rgba(255,255,255,0.1); color: white; border-color: rgba(255,255,255,0.15); }
.footer-btn.danger:hover { background: var(--danger); border-color: var(--danger); color: white; }
.sidebar.collapsed .footer-actions { flex-direction: column; }
.sidebar.collapsed .footer-btn span { display: none; }

/* ═══════════════════════════════════════════════════════════════════
   MAIN LAYOUT
═══════════════════════════════════════════════════════════════════ */
.main-wrapper {
  margin-right: var(--sidebar-w);
  transition: margin-right var(--t-slow) var(--ease);
  min-height: 100vh; display: flex; flex-direction: column;
}
.main-wrapper.collapsed { margin-right: var(--sidebar-collapsed); }

/* ── TOPBAR ─────────────────────────────────────────────────────── */
.topbar {
  background: rgba(255,255,255,0.88);
  backdrop-filter: blur(16px) saturate(1.4);
  -webkit-backdrop-filter: blur(16px) saturate(1.4);
  border-bottom: 1px solid var(--border);
  padding: 0 24px; height: var(--topbar-h);
  display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 100;
  box-shadow: 0 1px 0 var(--border), 0 2px 8px rgba(15,14,26,0.04);
}
.topbar-left { display: flex; align-items: center; gap: 14px; }
.topbar-title { font-size: 1rem; font-weight: 700; color: var(--text); letter-spacing: -0.02em; }
.topbar-breadcrumb { font-size: 0.75rem; color: var(--muted); margin-top: 1px; }
.topbar-breadcrumb span { color: var(--primary); font-weight: 600; }
.topbar-right { display: flex; align-items: center; gap: 8px; }
.topbar-btn {
  width: 38px; height: 38px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  background: var(--card); color: var(--muted);
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  font-size: 0.9rem; transition: all var(--t-fast) var(--ease); position: relative;
}
.topbar-btn:hover {
  border-color: var(--primary); color: var(--primary);
  background: var(--primary-light);
  box-shadow: var(--shadow-glow);
}
.topbar-btn .dot {
  position: absolute; top: 6px; left: 8px; width: 7px; height: 7px;
  background: var(--danger); border-radius: 50%; border: 2px solid white;
}
.mobile-menu-btn {
  display: none; width: 38px; height: 38px;
  border: 1px solid var(--border); border-radius: var(--radius-sm);
  background: var(--card); cursor: pointer;
  align-items: center; justify-content: center;
  font-size: 0.95rem; color: var(--text); transition: all var(--t-fast) var(--ease);
}
.mobile-menu-btn:hover { border-color: var(--primary); color: var(--primary); }

/* ── MAIN CONTENT ───────────────────────────────────────────────── */
.main-content { flex: 1; padding: 24px; }
.tab-panel { display: none; animation: fadeSlide 0.28s var(--ease-out); }
.tab-panel.active { display: block; }
@keyframes fadeSlide {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ═══════════════════════════════════════════════════════════════════
   STAT CARDS
═══════════════════════════════════════════════════════════════════ */
.stats-row {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 14px; margin-bottom: 20px;
}
.stat-card {
  background: var(--card);
  border-radius: var(--radius);
  padding: 18px 20px;
  border: 1px solid var(--border);
  box-shadow: var(--shadow-xs);
  display: flex; align-items: center; gap: 14px;
  transition: all var(--t-base) var(--ease);
  position: relative; overflow: hidden;
  cursor: default;
  text-align: center;
}

/* Subtle top accent line */
.stat-card::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
  background: linear-gradient(90deg, transparent, transparent);
  transition: background var(--t-base) var(--ease);
}
.stat-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); border-color: var(--border-2); }
.stat-card:hover::before { background: linear-gradient(90deg, transparent, var(--_accent, var(--primary)), transparent); }
.stat-card:nth-child(1) { --_accent: var(--primary); }
.stat-card:nth-child(2) { --_accent: var(--success); }
.stat-card:nth-child(3) { --_accent: var(--warning); }
.stat-card:nth-child(4) { --_accent: var(--danger); }

.stat-icon {
  width: 48px; height: 48px; border-radius: var(--radius-sm);
  display: flex; align-items: center; justify-content: center;
  font-size: 1.2rem; flex-shrink: 0;
}
.stat-icon.purple { background: var(--primary-light); color: var(--primary); }
.stat-icon.green  { background: var(--success-light); color: var(--success); }
.stat-icon.amber  { background: var(--warning-light); color: var(--warning); }
.stat-icon.red    { background: var(--danger-light);  color: var(--danger);  }
.stat-icon.dev    { background: var(--dev-light);     color: var(--dev);     }
.stat-info { flex: 1; min-width: 0; }
.stat-info p {
  font-size: 0.72rem; color: var(--muted); font-weight: 600;
  margin-bottom: 4px; letter-spacing: 0.02em; text-transform: uppercase;
}
.stat-info h3 { font-size: 1.85rem; font-weight: 900; color: var(--text); line-height: 1; letter-spacing: -0.03em; }

/* ═══════════════════════════════════════════════════════════════════
   CARDS
═══════════════════════════════════════════════════════════════════ */
.card {
  background: var(--card);
  border-radius: var(--radius-lg);
  border: 1px solid var(--border);
  box-shadow: var(--shadow-xs);
  margin-bottom: 18px; overflow: hidden;
  transition: box-shadow var(--t-base) var(--ease);
}
.card:hover { box-shadow: var(--shadow-sm); }

.card-header {
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  gap: 12px; flex-wrap: wrap;
  background: rgba(245,245,248,0.5);
}
.card-title {
  display: flex; align-items: center; gap: 10px;
  font-size: 0.95rem; font-weight: 700; color: var(--text); letter-spacing: -0.01em;
}
.card-title i {
  width: 32px; height: 32px;
  background: var(--primary-light); color: var(--primary);
  border-radius: var(--radius-xs);
  display: flex; align-items: center; justify-content: center; font-size: 0.85rem;
}
.card-title i.dev-icon { background: var(--dev-light); color: var(--dev); }
.card-body { padding: 20px; }

/* ── TOOLBAR ────────────────────────────────────────────────────── */
.toolbar {
  display: flex; gap: 8px; margin-bottom: 16px;
  flex-wrap: wrap; align-items: center;
}
.search-wrap { position: relative; flex: 1; min-width: 200px; }
.search-wrap i {
  position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
  color: var(--muted); font-size: 0.82rem; pointer-events: none;
}
.search-wrap input {
  width: 100%; padding: 9px 36px 9px 12px;
  border: 1px solid var(--border); border-radius: var(--radius-sm);
  font-family: 'Cairo', sans-serif; font-size: 0.875rem;
  background: var(--bg); color: var(--text);
  transition: all var(--t-fast) var(--ease); outline: none;
}
.search-wrap input::placeholder { color: var(--muted); }
.search-wrap input:focus {
  border-color: var(--primary);
  background: white;
  box-shadow: 0 0 0 3px var(--primary-glow);
}

/* ═══════════════════════════════════════════════════════════════════
   BUTTONS
═══════════════════════════════════════════════════════════════════ */
.btn {
  padding: 9px 18px; border: none; border-radius: var(--radius-sm);
  cursor: pointer; font-family: 'Cairo', sans-serif;
  font-weight: 700; font-size: 0.85rem;
  display: inline-flex; align-items: center; justify-content: center;
  gap: 7px; transition: all var(--t-fast) var(--ease);
  white-space: nowrap; letter-spacing: 0.01em;
  outline: none; position: relative;
}
.btn:active { transform: scale(0.97); }

.btn-primary {
  background: var(--primary); color: white;
  box-shadow: 0 2px 8px rgba(79,70,229,0.35), inset 0 1px 0 rgba(255,255,255,0.15);
}
.btn-primary:hover {
  background: var(--indigo-700);
  box-shadow: 0 4px 14px rgba(79,70,229,0.45), inset 0 1px 0 rgba(255,255,255,0.15);
  transform: translateY(-1px);
}
.btn-success {
  background: var(--success); color: white;
  box-shadow: 0 2px 8px rgba(5,150,105,0.35);
}
.btn-success:hover { background: #047857; transform: translateY(-1px); box-shadow: 0 4px 14px rgba(5,150,105,0.45); }
.btn-danger {
  background: var(--danger); color: white;
  box-shadow: 0 2px 8px rgba(220,38,38,0.3);
}
.btn-danger:hover { background: #b91c1c; transform: translateY(-1px); }
.btn-warning {
  background: var(--warning); color: white;
  box-shadow: 0 2px 8px rgba(217,119,6,0.3);
}
.btn-warning:hover { background: #b45309; transform: translateY(-1px); }
.btn-dev {
  background: var(--dev); color: white;
  box-shadow: 0 2px 8px rgba(124,58,237,0.35);
}
.btn-dev:hover { background: #6d28d9; transform: translateY(-1px); }
.btn-outline {
  background: white; border: 1px solid var(--border-2); color: var(--text-2);
}
.btn-outline:hover { border-color: var(--primary); color: var(--primary); background: var(--primary-light); }
.btn-sm { padding: 6px 12px; font-size: 0.78rem; border-radius: var(--radius-xs); }
.btn-icon { width: 34px; height: 34px; padding: 0; border-radius: var(--radius-xs); }

/* Loading state */
@keyframes spin { to { transform: rotate(360deg); } }
.btn-loading { color: transparent !important; pointer-events: none; }
.btn-loading::after {
  content: ''; position: absolute; width: 14px; height: 14px;
  border: 2px solid rgba(255,255,255,0.35); border-top-color: white;
  border-radius: 50%; animation: spin 0.65s linear infinite;
  top: 50%; left: 50%; transform: translate(-50%, -50%);
}
.btn-loading.dark::after { border-color: rgba(79,70,229,.25); border-top-color: var(--primary); }

/* ── SELECT ─────────────────────────────────────────────────────── */
select.form-select {
  padding: 9px 12px; border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  font-family: 'Cairo', sans-serif; font-size: 0.875rem;
  background: var(--card); color: var(--text);
  cursor: pointer; transition: all var(--t-fast) var(--ease); outline: none;
}
select.form-select:focus { border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-glow); }

/* ═══════════════════════════════════════════════════════════════════
   TABLE
═══════════════════════════════════════════════════════════════════ */
.table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
table { width: 100%; border-collapse: collapse; min-width: 560px; }
thead th {
  padding: 10px 14px; text-align: right;
  font-size: 0.7rem; font-weight: 700; color: var(--muted);
  text-transform: uppercase; letter-spacing: 0.6px;
  background: var(--bg); border-bottom: 1px solid var(--border);
  white-space: nowrap;
}
tbody td {
  padding: 13px 14px; border-bottom: 1px solid var(--border);
  font-size: 0.85rem; vertical-align: middle; color: var(--text-2);
}
tbody tr { transition: background var(--t-fast) var(--ease); }
tbody tr:hover td { background: rgba(79,70,229,0.025); }
tbody tr:last-child td { border-bottom: none; }

/* ═══════════════════════════════════════════════════════════════════
   BADGES
═══════════════════════════════════════════════════════════════════ */
.badge {
  display: inline-flex; align-items: center;
  padding: 2px 9px; border-radius: var(--radius-pill);
  font-size: 0.68rem; font-weight: 700; white-space: nowrap; letter-spacing: 0.02em;
}
.badge-success { background: var(--success-light); color: #065f46; }
.badge-danger  { background: var(--danger-light);  color: #991b1b; }
.badge-warning { background: var(--warning-light); color: #92400e; }
.badge-info    { background: var(--info-light);    color: #0c4a6e; }
.badge-primary { background: var(--primary-light); color: var(--primary-dark); }
.badge-dev     { background: var(--dev-light);     color: #4c1d95; }
.funded-badge  { background: #ecfdf5; color: #064e3b; }
.paid-badge    { background: #eff6ff; color: #1e3a5f; }
.divided-badge { background: #fefce8; color: #713f12; }

/* ── ACTION BUTTONS ─────────────────────────────────────────────── */
.actions { display: flex; gap: 4px; align-items: center; }
.act-btn {
  width: 30px; height: 30px; border: none; border-radius: var(--radius-xs);
  cursor: pointer; display: inline-flex; align-items: center; justify-content: center;
  font-size: 0.75rem; transition: all var(--t-fast) var(--ease); color: white;
}
.act-btn:hover { transform: scale(1.08); filter: brightness(1.1); }
.act-edit   { background: var(--warning); }
.act-delete { background: var(--danger); }
.act-view   { background: var(--info); }
.act-pay    { background: var(--success); }
.act-img    { background: var(--dev); }

/* ── AVATAR ─────────────────────────────────────────────────────── */
.avatar { width: 36px; height: 36px; border-radius: 50%; object-fit: cover; border: 2px solid var(--primary-light); }
.avatar-text {
  width: 36px; height: 36px; border-radius: 50%; background: var(--primary-light);
  color: var(--primary); display: flex; align-items: center; justify-content: center;
  font-weight: 700; font-size: 0.9rem; border: 2px solid white;
  box-shadow: 0 0 0 1.5px var(--primary-light);
  flex-shrink: 0; overflow: hidden;
}
.avatar-text img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }

/* ═══════════════════════════════════════════════════════════════════
   FORMS
═══════════════════════════════════════════════════════════════════ */
.form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 14px; }
.form-group { display: flex; flex-direction: column; gap: 5px; }
.form-label { font-size: 0.78rem; font-weight: 700; color: var(--text-2); letter-spacing: 0.01em; }
.form-input, .form-textarea {
  padding: 9px 12px; border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  font-family: 'Cairo', sans-serif; font-size: 0.875rem;
  color: var(--text); background: white;
  transition: all var(--t-fast) var(--ease); outline: none;
}
.form-input::placeholder, .form-textarea::placeholder { color: var(--muted); }
.form-input:hover, .form-textarea:hover { border-color: var(--border-2); }
.form-input:focus, .form-textarea:focus {
  border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-glow);
}
.form-textarea { resize: vertical; min-height: 80px; }
.form-input:disabled { background: var(--bg); opacity: 0.65; cursor: not-allowed; }

/* ── PROGRESS ───────────────────────────────────────────────────── */
.progress { height: 5px; background: var(--bg-2); border-radius: var(--radius-pill); overflow: hidden; }
.progress-fill { height: 100%; background: linear-gradient(90deg, var(--success), #34d399); border-radius: var(--radius-pill); }

/* ═══════════════════════════════════════════════════════════════════
   CLASSES GRID
═══════════════════════════════════════════════════════════════════ */
.classes-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 12px; }
.class-chip {
  background: white; border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px 12px; text-align: center; cursor: pointer;
  transition: all var(--t-base) var(--ease);
}
.class-chip:hover {
  border-color: var(--primary); transform: translateY(-3px);
  box-shadow: var(--shadow-md);
}
.class-chip h3 { font-size: 0.82rem; color: var(--primary); font-weight: 700; margin-bottom: 6px; }
.class-chip .num { font-size: 1.85rem; font-weight: 900; color: var(--text); letter-spacing: -0.03em; }
.class-chip .lbl { font-size: 0.68rem; color: var(--muted); margin-top: 2px; }

/* ═══════════════════════════════════════════════════════════════════
   ACTIVITY
═══════════════════════════════════════════════════════════════════ */
.activity-item {
  display: flex; align-items: center; gap: 12px;
  padding: 11px 0; border-bottom: 1px solid var(--border);
}
.activity-item:last-child { border-bottom: none; }
.activity-dot {
  width: 34px; height: 34px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 0.8rem; flex-shrink: 0;
}
.activity-info { flex: 1; }
.activity-info strong { font-size: 0.84rem; display: block; color: var(--text); }
.activity-info span { font-size: 0.72rem; color: var(--muted); }

/* ═══════════════════════════════════════════════════════════════════
   TRIP CARDS
═══════════════════════════════════════════════════════════════════ */
.trips-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
.trip-card {
  background: white; border: 1px solid var(--border);
  border-radius: var(--radius-lg); overflow: hidden; cursor: pointer;
  transition: all var(--t-base) var(--ease); box-shadow: var(--shadow-xs);
}
.trip-card:hover {
  transform: translateY(-3px); box-shadow: var(--shadow-lg);
  border-color: var(--primary);
}
.trip-img {
  height: 150px; background: linear-gradient(135deg, var(--indigo-100), var(--indigo-50));
  position: relative; overflow: hidden;
  display: flex; align-items: center; justify-content: center;
}
.trip-img img { width: 100%; height: 100%; object-fit: cover; }
.trip-img i { font-size: 0.9rem; color: var(--primary-light); }
.trip-status-pill {
  position: absolute; top: 10px; right: 10px;
  font-size: 0.68rem; font-weight: 800; padding: 3px 10px;
  border-radius: var(--radius-pill); background: white;
  box-shadow: var(--shadow-sm); letter-spacing: 0.02em;
}
.trip-actions-overlay {
  position: absolute; top: 10px; left: 10px;
  display: flex; gap: 5px; opacity: 0; transition: opacity var(--transition);
}
.trip-card:hover .trip-actions-overlay { opacity: 1; }
.trip-body { padding: 14px 16px; }
.trip-body h3 { font-size: 0.92rem; font-weight: 700; margin-bottom: 6px; color: var(--text); }
.trip-meta-row { display: flex; gap: 10px; color: var(--muted); font-size: 0.74rem; margin-bottom: 8px; flex-wrap: wrap; }
.trip-meta-row i { color: var(--primary); margin-left: 3px; }
.trip-price-row { display: flex; align-items: baseline; gap: 8px; margin-bottom: 10px; }
.trip-price-row .curr { font-size: 1.25rem; font-weight: 900; color: var(--primary); letter-spacing: -0.03em; }
.trip-price-row .orig { font-size: 0.78rem; color: var(--muted); text-decoration: line-through; }
.trip-stats-row { display: flex; justify-content: space-between; padding-top: 10px; border-top: 1px solid var(--border); }
.trip-stat-item { text-align: center; }
.trip-stat-item .n { font-size: 1rem; font-weight: 800; color: var(--text); }
.trip-stat-item .l { font-size: 0.66rem; color: var(--muted); }

/* ═══════════════════════════════════════════════════════════════════
   MODAL
═══════════════════════════════════════════════════════════════════ */
.modal {
  display: none; position: fixed; inset: 0;
  background: rgba(10,8,26,0.6);
  backdrop-filter: blur(8px) saturate(1.2);
  -webkit-backdrop-filter: blur(8px) saturate(1.2);
  z-index: 1000; justify-content: center; align-items: center; padding: 16px;
}
.modal.open { display: flex; animation: fadeIn 0.2s var(--ease-out); }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
.modal-box {
  background: white; border-radius: var(--radius-xl); width: 100%; max-width: 540px;
  max-height: 92vh; overflow-y: auto;
  box-shadow: var(--shadow-xl), 0 0 0 1px rgba(255,255,255,0.08);
  animation: popIn 0.3s var(--ease-);
}
.modal-box.wide { max-width: 760px; }
.modal-box.xl   { max-width: 940px; }
@keyframes popIn {
  from { transform: scale(0.94) translateY(16px); opacity: 0; }
  to   { transform: scale(1) translateY(0); opacity: 1; }
}
.modal-head {
  padding: 18px 22px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; background: white; z-index: 1;
  border-radius: var(--radius-xl) var(--radius-xl) 0 0;
}
.modal-head h2 {
  font-size: 1rem; font-weight: 700; color: var(--primary);
  display: flex; align-items: center; gap: 9px; letter-spacing: -0.01em;
}
.modal-head h2.dev-title { color: var(--dev); }
.modal-close {
  width: 34px; height: 34px; border: none; background: none;
  border-radius: 50%; cursor: pointer; color: var(--muted);
  display: flex; align-items: center; justify-content: center;
  font-size: 1rem; transition: all var(--t-fast) var(--ease);
}
.modal-close:hover { background: var(--danger-light); color: var(--danger); }
.modal-body { padding: 22px; }

/* ═══════════════════════════════════════════════════════════════════
   TOAST
═══════════════════════════════════════════════════════════════════ */
.toast {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
  background: var(--sidebar-bg); padding: 12px 20px;
  border-radius: var(--radius-pill);
  box-shadow: var(--shadow-xl); display: none; align-items: center; gap: 10px;
  z-index: 9999; font-size: 0.85rem; font-weight: 600; color: white;
  min-width: 240px; white-space: nowrap;
  border: 1px solid rgba(255,255,255,0.1);
}
.toast.show { display: flex; animation: toastIn 0.3s var(--ease-spring); }
.toast.success::before { content: ''; width: 6px; height: 6px; background: var(--success-mid); border-radius: 50%; flex-shrink: 0; }
.toast.error::before   { content: ''; width: 6px; height: 6px; background: var(--danger-mid); border-radius: 50%; flex-shrink: 0; }
.toast.warning::before { content: ''; width: 6px; height: 6px; background: var(--warning-mid); border-radius: 50%; flex-shrink: 0; }
@keyframes toastIn {
  from { opacity: 0; transform: translate(-50%, 10px) scale(0.96); }
  to   { opacity: 1; transform: translate(-50%, 0) scale(1); }
}

/* ═══════════════════════════════════════════════════════════════════
   EMPTY STATE
═══════════════════════════════════════════════════════════════════ */
.empty-state { text-align: center; padding: 56px 20px; color: var(--muted); }
.empty-state i { font-size: 3rem; opacity: 0.18; margin-bottom: 14px; display: block; }
.empty-state h3 { font-size: 0.95rem; color: var(--text-2); margin-bottom: 5px; font-weight: 700; }

/* ═══════════════════════════════════════════════════════════════════
   MISC UTILITIES
═══════════════════════════════════════════════════════════════════ */
.name-link {
  color: var(--primary); font-weight: 700; background: var(--primary-light);
  padding: 2px 9px; border-radius: var(--radius-pill); cursor: pointer;
  transition: all var(--t-fast) var(--ease); font-size: 0.84rem;
}
.name-link:hover { background: var(--primary); color: white; }

.divider-line { border: none; border-top: 1px solid var(--border); margin: 14px 0; }
.info-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px,1fr)); gap: 8px; }
.info-box { background: var(--bg); padding: 10px 12px; border-radius: var(--radius-sm); border: 1px solid var(--border); }
.info-box small { color: var(--muted); font-size: 0.7rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; }
.info-box div { font-weight: 700; font-size: 0.9rem; margin-top: 3px; color: var(--text); }

.att-present td { background: rgba(5,150,105,0.04) !important; }
.att-absent  td { background: rgba(220,38,38,0.04)  !important; }

/* Export buttons */
.export-row { display: flex; gap: 7px; flex-wrap: wrap; }
.exp-btn {
  padding: 6px 14px; border: none; border-radius: var(--radius-xs);
  cursor: pointer; font-family: 'Cairo', sans-serif; font-size: 0.74rem; font-weight: 700;
  display: flex; align-items: center; gap: 6px; transition: all var(--t-fast) var(--ease); color: white;
}
.exp-btn:hover { transform: translateY(-1px); filter: brightness(1.1); }
.exp-csv  { background: var(--info); }
.exp-pdf  { background: var(--danger); }
.exp-copy { background: var(--warning); }
