<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="light">

<head>
    <!-- Instant Theme Bootstrap -->
    <script>
        (function () {
            var t = localStorage.getItem('app_theme') || 'light';
            document.documentElement.setAttribute('data-theme', t);

            var phpType = localStorage.getItem('churchType') || 'kids';
            if (phpType === 'youth') {
                var s = document.createElement('style');
                s.id = 'youth-theme-boot';
                s.textContent = ':root{--brand:#7c3aed!important;--brand-dark:#5b21b6!important;--brand-light:#c4b5fd!important;--brand-bg:#ede9fe!important;--brand-glow:rgba(124,58,237,.18)!important;}';
                document.head.appendChild(s);
            }
        })();
    </script>

    <!-- Font Ready Guard -->
    <style id="font-guard">
        body {
            visibility: hidden
        }
    </style>
    <script>
        (function () {
            var show = function () {
                var g = document.getElementById('font-guard');
                if (g) g.remove();
            };
            if (document.fonts && document.fonts.ready) {
                var timer = setTimeout(show, 300);
                document.fonts.ready.then(function () {
                    clearTimeout(timer);
                    show();
                });
            } else {
                setTimeout(show, 50);
            }
        })();
    </script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#5b6cf5">
    <title>إدارة نقاط الرحلة</title>
    <link rel="apple-touch-icon" href="/logo.png">
    <link rel="manifest" href="/manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            /* Brand */
            --brand: #5b6cf5;
            --brand-dark: #4354e8;
            --brand-light: #a5b0ff;
            --brand-bg: #eef0ff;
            --brand-glow: rgba(91, 108, 245, .18);

            /* Semantic */
            --success: #10b981;
            --success-dark: #059669;
            --success-bg: #d1fae5;
            --danger: #ef4444;
            --danger-dark: #dc2626;
            --danger-bg: #fee2e2;
            --warning: #f59e0b;
            --warning-dark: #d97706;
            --warning-bg: #fef3c7;

            /* Surface */
            --bg: #f3f4f9;
            --surface: #ffffff;
            --surface-2: #f7f8fc;
            --surface-3: #eef0f8;
            --border: rgba(91, 108, 245, .12);
            --border-solid: #e4e6f0;
            --text: #1a1d2e;
            --text-2: #4b5068;
            --text-3: #8b90a8;
            --shadow-sm: 0 2px 8px -2px rgba(0, 0, 0, .07);
            --shadow-md: 0 8px 24px -4px rgba(0, 0, 0, .10);
            --shadow-lg: 0 20px 48px -8px rgba(0, 0, 0, .14);
            --shadow-xl: 0 32px 64px -12px rgba(0, 0, 0, .18);

            /* Radius */
            --r-xs: 6px;
            --r-sm: 10px;
            --r-md: 14px;
            --r-lg: 18px;
            --r-xl: 24px;
            --r-2xl: 32px;
            --r-full: 9999px;

            /* Motion */
            --t: .22s;
            --ease: cubic-bezier(.4, 0, .2, 1);
            --spring: cubic-bezier(.16, 1, .3, 1);
        }

        [data-theme="dark"] {
            --bg: #0f1117;
            --surface: #181b26;
            --surface-2: #1e2132;
            --surface-3: #252840;
            --border: rgba(91, 108, 245, .18);
            --border-solid: #2a2d42;
            --text: #e8eaf6;
            --text-2: #9299be;
            --text-3: #565c7a;
            --shadow-sm: 0 2px 8px -2px rgba(0, 0, 0, .4);
            --shadow-md: 0 8px 24px -4px rgba(0, 0, 0, .5);
            --shadow-lg: 0 20px 48px -8px rgba(0, 0, 0, .6);
            --shadow-xl: 0 32px 64px -12px rgba(0, 0, 0, .7);
            --brand-bg: rgba(91, 108, 245, .15);
            --success-bg: rgba(16, 185, 129, .15);
            --danger-bg: rgba(239, 68, 68, .15);
            --warning-bg: rgba(245, 158, 11, .15);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', 'Segoe UI', Tahoma, 'Arabic Typesetting', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            transition: background var(--t) var(--ease), color var(--t) var(--ease);
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background:
                radial-gradient(ellipse 80% 50% at 10% -10%, rgba(91, 108, 245, .07) 0%, transparent 60%),
                radial-gradient(ellipse 60% 40% at 90% 110%, rgba(139, 92, 246, .05) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
        }

        [data-theme="dark"] body::before {
            background:
                radial-gradient(ellipse 80% 50% at 10% -10%, rgba(91, 108, 245, .12) 0%, transparent 60%),
                radial-gradient(ellipse 60% 40% at 90% 110%, rgba(139, 92, 246, .08) 0%, transparent 60%);
        }

        .topbar {
            position: sticky;
            top: 0;
            z-index: 300;
            background: var(--bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 0 16px;
            height: 58px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            transition: background var(--t) var(--ease), border-color var(--t) var(--ease);
        }

        .topbar-brand {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            flex-shrink: 0;
        }

        .topbar-logo {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            background: var(--brand-bg);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--brand);
        }

        .topbar-logo i {
            font-size: 1rem;
        }

        .topbar-title {
            font-size: 0.95rem;
            font-weight: 800;
            color: var(--text);
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 140px;
            line-break: auto;
            line-height: 18px;
        }

        .topbar-search-container {
            flex: 1;
            max-width: 300px;
            position: relative;
        }

        .topbar-search-input {
            width: 100%;
            padding: 8px 12px;
            border: 1.5px solid var(--border-solid);
            border-radius: var(--r-md);
            font-size: 0.85rem;
            background: var(--bg);
            color: var(--text);
            transition: all var(--t) var(--ease);
        }

        .topbar-search-input:focus {
            outline: none;
            border-color: var(--brand);
            box-shadow: 0 0 0 3px var(--brand-bg);
        }

        .topbar-search-results {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: var(--surface);
            border: 1px solid var(--border-solid);
            border-radius: var(--r-md);
            margin-top: 5px;
            max-height: 300px;
            overflow-y: auto;
            display: none;
            z-index: 400;
            box-shadow: var(--shadow-lg);
        }

        .topbar-search-results.show {
            display: block;
        }

        .search-result-item {
            padding: 10px 12px;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            transition: all 0.2s;
        }

        .search-result-item:hover {
            background: var(--brand-bg);
            color: var(--brand);
        }

        .search-result-item:last-child {
            border-bottom: none;
        }

        .topbar-actions {
            display: flex;
            align-items: center;
            gap: 6px;
            padding-left: 4px;
        }

        .topbar-btn {
            height: 38px;
            min-width: 38px;
            padding: 0 11px;
            border-radius: var(--r-md);
            display: flex;
            align-items: center;
            gap: 5px;
            background: var(--surface);
            border: 1.5px solid var(--border-solid);
            color: var(--text-2);
            font-size: 0.88rem;
            cursor: pointer;
            text-decoration: none;
            flex-shrink: 0;
            transition: all var(--t) var(--ease);
        }

        .topbar-btn:hover {
            background: var(--brand-bg);
            color: var(--brand);
            border-color: var(--brand);
            transform: translateY(-1px);
            box-shadow: 0 3px 8px var(--brand-glow);
        }

        .container {
            flex: 1;
            padding: 15px;
            max-width: 500px;
            margin: 0 auto;
            width: 100%;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            scrollbar-width: none;
        }

        .container::-webkit-scrollbar {
            display: none;
        }

        .profile-card {
            background: var(--surface);
            border-radius: var(--r-xl);
            padding: 20px 15px;
            text-align: center;
            box-shadow: var(--shadow-sm);
            position: relative;
            margin-bottom: 15px;
            flex-shrink: 0;
            border: 1px solid var(--border);
            transition: all var(--t) var(--spring);
        }

        .profile-card:hover {
            transform: translateY(-3px);
            box-shadow: var(--shadow-md);
            border-color: var(--brand);
        }

        .btn-naughty-sm {
            position: absolute;
            top: 15px;
            left: 15px;
            width: auto;
            gap: 5px;
            height: 36px;
            border-radius: var(--r-full);
            background: var(--surface-3);
            color: var(--text-2);
            border: 1px solid var(--border-solid);
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all var(--t) var(--spring);
            box-shadow: var(--shadow-sm);
            z-index: 10;
            padding: 10px;
        }

        .btn-naughty-sm:hover {
            transform: scale(1.06);
            background: var(--danger-bg);
            color: var(--danger);
            border-color: var(--danger);
        }

        .btn-naughty-sm:active {
            transform: scale(0.9);
        }

        .avatar-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-bottom: 15px;
        }

        .avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 3px solid var(--brand-light);
            background: var(--brand-light);
            color: var(--brand);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-weight: 800;
            object-fit: cover;
            flex-shrink: 0;
        }

        .info-col {
            text-align: right;
            display: flex;
            flex-direction: column;
            justify-content: center;
            flex: 1;
            min-width: 0;
        }

        .name {
            font-size: 1.2rem;
            font-weight: 800;
            color: var(--text);
            margin-bottom: 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .class-name {
            font-size: 0.85rem;
            color: var(--text-3);
            font-weight: 600;
        }

        .points-display {
            background: var(--surface);
            color: var(--brand-dark);
            font-size: 2rem;
            font-weight: 900;
            padding: 5px 20px;
            border-radius: var(--r-full);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border: 2px solid var(--brand);
            transition: all var(--t) var(--spring);
            position: relative;
            min-width: 100px;
            min-height: 60px;
            text-align: center;
        }

        .points-display.naughty {
            background: var(--danger-bg);
            color: var(--danger-dark);
            border-color: var(--danger);
            font-size: 1.5rem;
        }

        .points-display.settling {
            opacity: 0.7;
            pointer-events: none;
            color: transparent !important;
        }

        .points-display.settling::before {
            content: "";
            position: absolute;
            inset: 0;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50px;
            z-index: 1;
        }

        .points-display.settling::after {
            content: "\f110";
            font-family: "Font Awesome 6 Free";
            font-weight: 900;
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            animation: fa-spin 1s infinite linear;
            z-index: 2;
            color: var(--brand-dark) !important;
        }

        .points-display.naughty.settling::after {
            color: var(--danger-dark) !important;
        }

        .points-display:not(.settling)::after {
            display: none;
        }

        .btn-action:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            filter: grayscale(0.5);
        }

        .custom-tags {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 6px;
            margin-top: 15px;
        }

        .tag {
            background: var(--bg);
            color: var(--text-3);
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 700;
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .tag i {
            font-size: 0.8rem;
        }

        .control-panel {
            background: var(--surface);
            border-radius: 16px;
            padding: 15px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
            border: 1px solid var(--border);
            flex-shrink: 0;
        }

        .section-title {
            font-size: 0.9rem;
            font-weight: 800;
            color: var(--text-3);
            margin-bottom: 10px;
            text-align: center;
        }

        .points-selector {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            margin-bottom: 15px;
        }

        .point-chip {
            padding: 10px 0;
            border-radius: 10px;
            font-size: 1.2rem;
            font-weight: 800;
            border: 2px solid var(--border);
            background: var(--surface);
            color: var(--text-2);
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .point-chip.selected {
            border-color: var(--brand);
            background: var(--brand-light);
            color: var(--brand-dark);
            transform: scale(1.05);
            box-shadow: 0 4px 8px rgba(79, 70, 229, 0.2);
        }

        .action-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .btn-action {
            padding: 15px;
            border-radius: 12px;
            font-size: 1.2rem;
            font-weight: 800;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .btn-action:active {
            transform: scale(0.95);
        }

        .btn-add {
            background: var(--success);
            color: white;
            border-bottom: 4px solid var(--success-dark);
        }

        .btn-add:hover {
            background: var(--success-dark);
        }

        .btn-sub {
            background: var(--warning);
            color: white;
            border-bottom: 4px solid var(--warning-dark);
        }

        .btn-sub:hover {
            background: var(--warning-dark);
        }

        .loading {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--text-3);
            text-align: center;
            min-height: 300px;
        }

        .loading i {
            font-size: 2.5rem;
            color: var(--brand);
            margin-bottom: 10px;
        }

        .toast {
            position: fixed;
            bottom: -100px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--text);
            color: white;
            padding: 10px 20px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 0.9rem;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.2);
            transition: bottom 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            z-index: 1000;
            display: flex;
            align-items: center;
            gap: 8px;
            white-space: nowrap;
        }

        .toast.show {
            bottom: 20px;
        }

        .toast.success {
            background: var(--success);
        }

        .toast.error {
            background: var(--danger);
        }

        #fireworks {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 999;
        }

        .btn-naughty-sm.active {
            background: var(--danger);
            color: white;
            box-shadow: 0 0 10px var(--danger);
        }

        .naughty-tag {
            background: var(--danger);
            color: white;
            font-size: 0.7rem;
            padding: 2px 10px;
            border-radius: 6px;
            font-weight: 800;
            margin-left: 8px;
            display: none;
            animation: tagPulse 2s infinite;
        }

        @keyframes tagPulse {
            0% {
                opacity: 1;
            }

            50% {
                opacity: 0.7;
            }

            100% {
                opacity: 1;
            }
        }

        .naughty-tag.show {
            display: inline-block;
        }

        @media (max-width: 480px) {
            .container {
                padding: 10px;
            }

            .profile-card {
                padding: 15px 10px;
            }

            .avatar {
                width: 70px;
                height: 70px;
                font-size: 1.8rem;
            }

            .name {
                font-size: 1.1rem;
            }

            .points-display {
                font-size: 1.8rem;
                min-width: 90px;
                min-height: 55px;
            }

            .control-panel {
                padding: 12px;
            }

            .points-selector {
                grid-template-columns: repeat(2, 1fr);
                gap: 6px;
            }

            .point-chip {
                padding: 8px 0;
                font-size: 1.1rem;
            }

            .action-row {
                gap: 8px;
            }

            .btn-action {
                padding: 12px;
                font-size: 1.1rem;
            }
        }
    </style>
</head>

<body>

    <div class="topbar">
        <a href="/uncle/dashboard/" class="topbar-brand">
            <div class="topbar-logo" style="overflow:hidden;"><img src="/logo.png"
                    style="width:100%;height:100%;object-fit:cover;"
                    onerror="this.outerHTML='<i class=\'fas fa-cross\'></i>'"></div>
        </a>
        <div class="topbar-search-container">
            <input type="text" class="topbar-search-input" id="topbarSearch" placeholder="ابحث..."
                oninput="topbarSearchHandler()">
            <div class="topbar-search-results" id="topbarSearchResults"></div>
        </div>
        <div class="topbar-actions">
            <button class="topbar-btn" onclick="startScanner()" title="مسح QR" style="width: 38px; height: 38px; padding: 0; display: inline-flex; align-items: center; justify-content: center;">
                <span class="fa-stack" style="font-size: 0.85rem; width: 1.5em; height: 1.5em; line-height: 1.5em; display: inline-flex; align-items: center; justify-content: center; margin: 0;">
                    <i class="fas fa-expand fa-stack-2x" style="font-size: 1.3rem;"></i>
                    <i class="fas fa-qrcode fa-stack-1x" style="font-size: 0.75rem;"></i>
                </span>
            </button>
        </div>
    </div>

    <div class="container" id="mainContainer">
        <div class="loading" id="loadingView">
            <i class="fas fa-circle-notch fa-spin"></i>
            <h3>جاري تحميل البيانات...</h3>
        </div>

        <div id="contentView" style="display:none; width: 100%;">
            <!-- Trip Header Info -->
            <div class="trip-header-card" style="
                background: linear-gradient(135deg, var(--brand-light, #eef2ff), var(--surface, #ffffff));
                border: 1px solid var(--border, #e5e7eb);
                border-radius: 16px;
                padding: 12px 16px;
                margin-bottom: 16px;
                display: flex;
                align-items: center;
                gap: 12px;
                box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
                direction: rtl;
            ">
                <img id="tripImage" src="/logo.png" style="
                    width: 50px;
                    height: 50px;
                    object-fit: cover;
                    border-radius: 12px;
                    border: 2px solid var(--brand, #4f46e5);
                    background: white;
                " onerror="this.src='/logo.png'">
                <div style="text-align: right; flex: 1;">
                    <div style="font-size: 0.75rem; font-weight: 700; color: var(--brand, #4f46e5); margin-bottom: 2px;">مسابقة رحلة:</div>
                    <div id="tripTitle" style="font-size: 1.1rem; font-weight: 900; color: var(--text, #1f2937); line-height: 1.3;">اسم الرحلة</div>
                </div>
            </div>

            <div class="profile-card">
                <button id="btnNaughty" class="btn-naughty-sm" onclick="markNaughty()" title="وضع الشغب"><i
                        class="fas fa-exclamation-triangle"></i> <span id="btnNaughtyLabel" style="
    font-size: 0.9rem;
">تعيين شغب</span>
                </button>

                <div class="avatar-container">
                    <div id="studentAvatar" class="avatar">؟</div>
                    <div class="info-col">
                        <div class="name"><span id="studentName">اسم الطفل</span> <span id="naughtyTag"
                                class="naughty-tag">شغب</span></div>
                        <div id="studentClass" class="class-name">الفصل</div>
                    </div>
                </div>

                <div id="pointsDisplay" class="points-display settling">--</div>
                <div style="font-size:0.8rem; color:var(--text-3); font-weight:700; margin-top:2px;">النقاط الحالية
                </div>

                <div id="customTags" class="custom-tags"></div>
            </div>

            <div class="control-panel">
                <div class="section-title">اختر قيمة النقاط</div>
                <div class="points-selector">
                    <div class="point-chip" data-val="10" onclick="selectPoint(10)">10</div>
                    <div class="point-chip" data-val="30" onclick="selectPoint(30)">30</div>
                    <div class="point-chip" data-val="50" onclick="selectPoint(50)">50</div>
                    <div class="point-chip" data-val="100" onclick="selectPoint(100)">100</div>
                </div>

                <div class="action-row">
                    <button class="btn-action btn-add" onclick="executeAction('increment')"><i class="fas fa-plus"></i>
                        إضافة</button>
                    <button class="btn-action btn-sub" onclick="executeAction('decrement')"><i class="fas fa-minus"></i>
                        خصم</button>
                </div>
            </div>
        </div>
    </div>

    <div id="toast" class="toast"><i class="fas fa-info-circle"></i> <span id="toastMsg">رسالة</span></div>
    <canvas id="fireworks"></canvas>

    <!-- Scanner Modal -->
    <div id="scannerModal"
        style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:9999; align-items:center; justify-content:center; flex-direction:column;">
        <div
            style="background:var(--surface); padding:20px; border-radius:16px; width:90%; max-width:400px; text-align:center;">
            <h3 style="margin-bottom:15px; font-weight: 800;"><i class="fas fa-qrcode"></i> مسح كود المسابقة</h3>
            <div id="reader"
                style="width:100%; min-height:300px; background:#000; border-radius: 12px; overflow: hidden;"></div>
            <button class="topbar-btn" onclick="stopScanner()"
                style="margin:20px auto 0; width:100%; justify-content:center; background:var(--danger); color:white; border-color:var(--danger);"><i
                    class="fas fa-times"></i> إلغاء</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>

    <script>
        const API_URL = '/api.php';
        const urlParams = new URLSearchParams(window.location.search);
        const tripId = urlParams.get('trip_id');
        const studentId = urlParams.get('student_id');

        let studentData = null;
        let tripData = null;
        let currentSelectedPoint = 10;
        let allStudents = [];

        document.addEventListener('DOMContentLoaded', () => {
            if (!tripId || !studentId) {
                showToast('رابط غير صالح', 'error');
                document.getElementById('loadingView').innerHTML = '<i class="fas fa-exclamation-circle" style="color:var(--danger)"></i><h2>رابط غير صالح</h2>';
                return;
            }

            // Load preferred point value
            const savedPoint = localStorage.getItem('trip_game_preferred_point');
            if (savedPoint && [10, 30, 50, 100].includes(parseInt(savedPoint))) {
                currentSelectedPoint = parseInt(savedPoint);
            }
            updatePointChips();

            loadStudentData();
        });

        function selectPoint(val) {
            currentSelectedPoint = val;
            localStorage.setItem('trip_game_preferred_point', val);
            updatePointChips();
        }

        function updatePointChips() {
            document.querySelectorAll('.point-chip').forEach(chip => {
                if (parseInt(chip.dataset.val) === currentSelectedPoint) {
                    chip.classList.add('selected');
                } else {
                    chip.classList.remove('selected');
                }
            });
        }

        function showToast(msg, type = 'info') {
            const t = document.getElementById('toast');
            t.className = 'toast show ' + type;
            if (type === 'success') t.innerHTML = `<i class="fas fa-check-circle"></i> <span id="toastMsg">${msg}</span>`;
            else if (type === 'error') t.innerHTML = `<i class="fas fa-exclamation-circle"></i> <span id="toastMsg">${msg}</span>`;
            else t.innerHTML = `<i class="fas fa-info-circle"></i> <span id="toastMsg">${msg}</span>`;

            setTimeout(() => t.classList.remove('show'), 3000);
        }

        async function apiCall(action, data = {}) {
            const fd = new FormData();
            fd.append('action', action);
            for (let k in data) fd.append(k, data[k]);
            try {
                const res = await fetch(API_URL, { method: 'POST', body: fd });
                return await res.json();
            } catch (e) { return { success: false, message: e.message }; }
        }

        async function loadStudentData() {
            const data = await apiCall('getTripDetails', { trip_id: tripId });
            if (data.access_denied && data.trip) {
                const ownerName = data.trip.owner_church_name || 'الكنيسة المالكة';
                const pending = data.pending_request ? '<p style="margin-top:12px;color:var(--brand);font-weight:700;"><i class="fas fa-hourglass-half"></i> طلب المشاركة قيد المراجعة</p>' : '';
                document.getElementById('loadingView').innerHTML = `
                    <i class="fas fa-lock" style="color:var(--warning);font-size:2.5rem;"></i>
                    <h2 style="margin-top:12px;">${data.trip.title || 'رحلة'}</h2>
                    <p style="color:var(--text-2);margin-top:8px;max-width:360px;line-height:1.6;">
                        ليس لديك صلاحية لعرض نقاط هذه الرحلة. اطلب المشاركة من <strong>${ownerName}</strong> من صفحة الرحلة في لوحة الكنيسة.
                    </p>${pending}`;
                return;
            }
            if (data.success && data.trip && data.trip.registrations) {
                tripData = data.trip;
                allStudents = data.trip.registrations;
                
                // Update Trip Header
                const tImg = document.getElementById('tripImage');
                const tTitle = document.getElementById('tripTitle');
                if (tTitle) tTitle.textContent = tripData.title || '';
                if (tImg) {
                    if (tripData.image_url) {
                        tImg.src = tripData.image_url;
                    } else {
                        tImg.src = '/logo.png';
                    }
                }

                const reg = data.trip.registrations.find(r => String(r.student_id) === String(studentId));
                if (reg) {
                    studentData = reg;
                    renderStudent();
                    fetchPoints();
                    return;
                }
            }
            showToast('لم يتم العثور على بيانات الطفل', 'error');
            document.getElementById('loadingView').innerHTML = '<i class="fas fa-user-slash" style="color:var(--danger)"></i><h2>لم يتم العثور على بيانات الطفل</h2>';
        }

        function topbarSearchHandler() {
            const searchTerm = document.getElementById('topbarSearch').value.toLowerCase().trim();
            const resultsDiv = document.getElementById('topbarSearchResults');

            if (!searchTerm) {
                resultsDiv.classList.remove('show');
                return;
            }

            const filtered = allStudents.filter(r => {
                const name = r.student_name || '';
                return name.toLowerCase().includes(searchTerm);
            });

            if (filtered.length === 0) {
                resultsDiv.innerHTML = '<div class="search-result-item" style="cursor:default;">لا توجد نتائج</div>';
                resultsDiv.classList.add('show');
                return;
            }

            resultsDiv.innerHTML = filtered.map(r => {
                const name = r.student_name || '؟';
                return `<div class="search-result-item" onclick="openKidPoints('${tripId}', '${r.student_id}')">${name}</div>`;
            }).join('');

            resultsDiv.classList.add('show');
        }

        function openKidPoints(tId, sId) {
            window.location.href = `/uncle/trip/points/?trip_id=${tId}&student_id=${sId}`;
        }

        async function fetchPoints() {
            const display = document.getElementById('pointsDisplay');
            display.classList.add('settling');

            const res = await apiCall('processGameQRCode', {
                trip_id: tripId,
                student_id: studentId,
                game_action: 'increment',
                amount: 0
            });

            display.classList.remove('settling');
            if (res.success) {
                updatePointsDisplay(res.points, res.is_naughty);
            }
        }

        function renderStudent() {
            const name = studentData.student_name || '؟';
            const init = name.charAt(0);
            const img = studentData.student_image || '';

            document.getElementById('studentName').textContent = name;
            document.getElementById('studentClass').textContent = studentData.student_class || 'بدون فصل';

            if (img) {
                document.getElementById('studentAvatar').innerHTML = `<img src="${img}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;" onerror="this.style.display='none';this.parentElement.innerHTML='${init}'">`;
            } else {
                document.getElementById('studentAvatar').textContent = init;
            }

            let tagsHtml = '';
            if (studentData.custom_data) {
                try {
                    const cd = JSON.parse(studentData.custom_data);
                    const cfIcons = tripData.custom_field_icons || {};

                    Object.entries(cd).forEach(([key, value]) => {
                        let iconHtml = '<i class="fas fa-tag"></i>';
                        let labelHtml = '';

                        // Check if this is a sub_group field (e.g. Building__sf__Room)
                        if (key.includes('__sf__')) {
                            const [parentName, sfName] = key.split('__sf__');
                            const parentMeta = cfIcons[parentName] || {};
                            const subFields = Array.isArray(parentMeta.sub_fields) ? parentMeta.sub_fields : [];
                            const sfMeta = subFields.find(sf => sf.name === sfName) || {};
                            const iconClass = sfMeta.icon || parentMeta.icon || 'fas fa-tag';
                            iconHtml = `<i class="${iconClass}"></i>`;
                            labelHtml = `<small style="opacity:.6">${escHtml(parentName)} •</small> ${escHtml(sfName)}: <strong>${escHtml(value)}</strong>`;
                        } else {
                            // Normal field
                            const meta = cfIcons[key];
                            if (meta) {
                                const iconClass = (typeof meta === 'string') ? meta : (meta.icon || 'fas fa-tag');
                                iconHtml = `<i class="${iconClass}"></i>`;
                            }
                            labelHtml = escHtml(value);
                        }

                        // make tag clickable to open filtered list of kids for this field/value
                        tagsHtml += `<button class="tag" onclick="window.open('/uncle/trip/filter/?trip_id=${tripId}&field=${encodeURIComponent(key)}&value=${encodeURIComponent(value)}','_blank')">${iconHtml} ${labelHtml}</button>`;
                    });
                } catch (e) {
                    // Fallback for old format
                    tagsHtml = Object.entries(JSON.parse(studentData.custom_data)).map(([k, v]) => `<span class="tag"><i class="fas fa-tag"></i> ${v}</span>`).join('');
                }
            }
            document.getElementById('customTags').innerHTML = tagsHtml;

            document.getElementById('loadingView').style.display = 'none';
            document.getElementById('contentView').style.display = 'block';
        }

        function updatePointsDisplay(points, isNaughty = false) {
            const display = document.getElementById('pointsDisplay');
            const tag = document.getElementById('naughtyTag');
            const btn = document.getElementById('btnNaughty');

            // show a star icon and points to make it more magical
            display.innerHTML = `<i class="fas fa-star" style="color: #4254e8;margin-left:10px;margin-right:8px;"></i>${points}`;
            display.className = "points-display" + (isNaughty ? " naughty" : "");

            const label = document.getElementById('btnNaughtyLabel');
            if (isNaughty) {
                tag.classList.add('show');
                btn.classList.add('active');
                if (label) { label.textContent = 'إلغاء الشغب'; label.style.color = 'white'; }
            } else {
                tag.classList.remove('show');
                btn.classList.remove('active');
                if (label) { label.textContent = 'تعيين شغب'; label.style.color = 'var(--text-2)'; }
            }

            display.style.transform = 'scale(1.2)';
            setTimeout(() => display.style.transform = 'scale(1)', 250);
        }

        async function markNaughty() {
            const isCurrentlyNaughty = document.getElementById('naughtyTag').classList.contains('show');
            const msg = isCurrentlyNaughty ? 'هل تريد إلغاء وضع الشغب لهذا الطفل؟' : 'هل أنت متأكد من تعيين هذا الطفل في وضع الشغب (Naughty)؟';
            if (await customConfirm(msg)) {
                updatePoints('naughty', 0);
            }
        }

        function executeAction(action) {
            updatePoints(action, currentSelectedPoint);
        }

        let isUpdating = false;
        async function updatePoints(action, amount) {
            if (isUpdating) return;
            isUpdating = true;

            const display = document.getElementById('pointsDisplay');
            const btns = document.querySelectorAll('.btn-action');
            display.classList.add('settling');
            btns.forEach(b => b.disabled = true);

            const res = await apiCall('processGameQRCode', {
                trip_id: tripId,
                student_id: studentId,
                game_action: action,
                amount: amount
            });

            display.classList.remove('settling');
            btns.forEach(b => b.disabled = false);
            isUpdating = false;

            if (res.success) {
                updatePointsDisplay(res.points, res.is_naughty);
                if (action === 'increment') {
                    showToast(`تم إضافة ${amount} نقطة بنجاح`, 'success');
                    fireworks();
                } else if (action === 'decrement') {
                    showToast(`تم خصم ${amount} نقطة`, 'warning');
                } else if (action === 'naughty') {
                    showToast(res.is_naughty ? 'تم تفعيل وضع الشغب' : 'تم إلغاء وضع الشغب', res.is_naughty ? 'error' : 'success');
                }
            } else {
                showToast(res.message || 'فشل في تحديث النقاط', 'error');
            }
        }

        // QR Code Scanner Logic
        let html5QrcodeScanner = null;

        function startScanner() {
            document.getElementById('scannerModal').style.display = 'flex';
            if (!html5QrcodeScanner) {
                html5QrcodeScanner = new Html5Qrcode("reader");
            }
            html5QrcodeScanner.start(
                { facingMode: "environment" },
                { fps: 10, qrbox: { width: 250, height: 250 } },
                async (decodedText, decodedResult) => {
                    // Success
                    html5QrcodeScanner.stop().then(async () => {
                        document.getElementById('scannerModal').style.display = 'none';
                        
                        let parsedUrl;
                        try {
                            parsedUrl = new URL(decodedText);
                        } catch (e) {
                            showToast('الكود الممسوح غير صحيح', 'error');
                            return;
                        }
                        const scannedTripId = parsedUrl.searchParams.get('trip_id');
                        const scannedStudentId = parsedUrl.searchParams.get('student_id');
                        
                        if (!scannedTripId || !scannedStudentId) {
                            showToast('الكود الممسوح غير صحيح', 'error');
                            return;
                        }

                        if (String(scannedTripId) === String(tripId)) {
                            // Same trip - navigate directly
                            window.location.href = decodedText;
                            return;
                        }

                        // Different trip - check church
                        showToast('جاري التحقق من كود الرحلة...', 'info');
                        const res = await apiCall('getTripDetails', { trip_id: scannedTripId });
                        const currentChurchId = tripData ? tripData.church_id : null;
                        if (res.success && res.trip && currentChurchId && String(res.trip.church_id) === String(currentChurchId)) {
                            // Same church, different trip -> Ask to redirect
                            if (await customConfirm(`هذا الكود يخص رحلة أخرى ("${res.trip.title}") لنفس الكنيسة. هل تريد الانتقال إليها لتسجيل النقاط؟`, 'نعم، انتقال', 'إلغاء')) {
                                window.location.href = decodedText;
                            }
                        } else {
                            // Different church or unauthorized -> Block and alert
                            await customAlert('عذراً، هذا الكود يخص رحلة لكنيسة أخرى ولا يمكن تشغيله في كنيستك.');
                            showToast('كود غير صالح لكنيستك', 'error');
                        }
                    });
                },
                (errorMessage) => {
                    // Ignore parse errors
                }
            ).catch(async (err) => {
                await customAlert("حدث خطأ في الوصول للكاميرا: " + err);
                stopScanner();
            });
        }

        function stopScanner() {
            if (html5QrcodeScanner) {
                html5QrcodeScanner.stop().then(() => {
                    document.getElementById('scannerModal').style.display = 'none';
                }).catch(e => {
                    document.getElementById('scannerModal').style.display = 'none';
                });
            } else {
                document.getElementById('scannerModal').style.display = 'none';
            }
        }

        // Fireworks animation
        function fireworks() {
            const canvas = document.getElementById('fireworks');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            const particles = [];
            for (let i = 0; i < 50; i++) {
                particles.push({
                    x: canvas.width / 2,
                    y: canvas.height / 2,
                    vx: (Math.random() - 0.5) * 8,
                    vy: (Math.random() - 0.5) * 8,
                    life: 1,
                    color: ['#5b6cf5', '#10b981', '#f59e0b'][Math.floor(Math.random() * 3)]
                });
            }

            function animate() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                let hasAlive = false;

                particles.forEach(p => {
                    if (p.life > 0) {
                        hasAlive = true;
                        p.x += p.vx;
                        p.y += p.vy;
                        p.vy += 0.2; // gravity
                        p.life -= 0.02;

                        ctx.fillStyle = p.color;
                        ctx.globalAlpha = p.life;
                        ctx.beginPath();
                        ctx.arc(p.x, p.y, 5, 0, Math.PI * 2);
                        ctx.fill();
                    }
                });
                ctx.globalAlpha = 1;

                if (hasAlive) requestAnimationFrame(animate);
            }
            animate();
        }

        function customAlert(message) {
            return new Promise(resolve => {
                const overlay = document.createElement('div');
                overlay.style = `
                    position: fixed;
                    top: 0; left: 0; width: 100%; height: 100%;
                    background: rgba(0, 0, 0, 0.6);
                    backdrop-filter: blur(4px);
                    z-index: 100000;
                    display: flex; align-items: center; justify-content: center;
                    opacity: 0; transition: opacity 0.2s ease-out;
                    direction: rtl;
                `;
                const box = document.createElement('div');
                box.style = `
                    background: var(--surface, #ffffff);
                    border-radius: 16px;
                    padding: 24px;
                    width: 90%; max-width: 400px;
                    box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1), 0 10px 10px -5px rgba(0,0,0,0.04);
                    transform: scale(0.9); transition: transform 0.2s ease-out;
                    text-align: center;
                    border: 1px solid var(--border, #e5e7eb);
                `;
                box.innerHTML = `
                    <div style="font-size: 2.5rem; color: var(--danger, #ef4444); margin-bottom: 12px;">
                        <i class="fas fa-exclamation-circle"></i>
                    </div>
                    <h3 style="font-size: 1.1rem; font-weight: 800; color: var(--text, #1f2937); margin-bottom: 16px; line-height: 1.5; text-align: center;">${message}</h3>
                    <button id="customAlertBtn" style="
                        background: var(--brand, #4f46e5); color: white;
                        border: none; padding: 10px 24px; border-radius: 8px;
                        font-weight: 700; font-size: 1rem; cursor: pointer;
                        transition: background 0.15s; width: 100%;
                    ">موافق</button>
                `;
                overlay.appendChild(box);
                document.body.appendChild(overlay);

                setTimeout(() => {
                    overlay.style.opacity = '1';
                    box.style.transform = 'scale(1)';
                }, 10);

                const btn = box.querySelector('#customAlertBtn');
                btn.addEventListener('click', () => {
                    overlay.style.opacity = '0';
                    box.style.transform = 'scale(0.9)';
                    setTimeout(() => {
                        document.body.removeChild(overlay);
                        resolve();
                    }, 200);
                });
            });
        }

        function customConfirm(message, yesLabel = 'نعم', noLabel = 'إلغاء') {
            return new Promise(resolve => {
                const overlay = document.createElement('div');
                overlay.style = `
                    position: fixed;
                    top: 0; left: 0; width: 100%; height: 100%;
                    background: rgba(0, 0, 0, 0.6);
                    backdrop-filter: blur(4px);
                    z-index: 100000;
                    display: flex; align-items: center; justify-content: center;
                    opacity: 0; transition: opacity 0.2s ease-out;
                    direction: rtl;
                `;
                const box = document.createElement('div');
                box.style = `
                    background: var(--surface, #ffffff);
                    border-radius: 16px;
                    padding: 24px;
                    width: 90%; max-width: 400px;
                    box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1), 0 10px 10px -5px rgba(0,0,0,0.04);
                    transform: scale(0.9); transition: transform 0.2s ease-out;
                    text-align: center;
                    border: 1px solid var(--border, #e5e7eb);
                `;
                box.innerHTML = `
                    <div style="font-size: 2.5rem; color: var(--brand, #4f46e5); margin-bottom: 12px;">
                        <i class="fas fa-question-circle"></i>
                    </div>
                    <h3 style="font-size: 1.1rem; font-weight: 800; color: var(--text, #1f2937); margin-bottom: 20px; line-height: 1.5; text-align: center;">${message}</h3>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
                        <button id="customConfirmYes" style="
                            background: var(--brand, #4f46e5); color: white;
                            border: none; padding: 10px 16px; border-radius: 8px;
                            font-weight: 700; font-size: 1rem; cursor: pointer;
                            transition: background 0.15s;
                        ">${yesLabel}</button>
                        <button id="customConfirmNo" style="
                            background: var(--bg, #f3f4f6); color: var(--text-2, #4b5563);
                            border: 1px solid var(--border, #e5e7eb); padding: 10px 16px; border-radius: 8px;
                            font-weight: 700; font-size: 1rem; cursor: pointer;
                            transition: background 0.15s;
                        ">${noLabel}</button>
                    </div>
                `;
                overlay.appendChild(box);
                document.body.appendChild(overlay);

                setTimeout(() => {
                    overlay.style.opacity = '1';
                    box.style.transform = 'scale(1)';
                }, 10);

                const yesBtn = box.querySelector('#customConfirmYes');
                const noBtn = box.querySelector('#customConfirmNo');

                const close = (result) => {
                    overlay.style.opacity = '0';
                    box.style.transform = 'scale(0.9)';
                    setTimeout(() => {
                        document.body.removeChild(overlay);
                        resolve(result);
                    }, 200);
                };

                yesBtn.addEventListener('click', () => close(true));
                noBtn.addEventListener('click', () => close(false));
            });
        }
    </script>
</body>
