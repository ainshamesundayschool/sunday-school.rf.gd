    <!-- Instant Theme Bootstrap -->
    <script>
        (function () {
            var t = localStorage.getItem('app_theme') || 'light';
            document.documentElement.setAttribute('data-theme', t);

            var phpType = localStorage.getItem('churchType') || 'kids';
            if (phpType === 'youth') {
                var s = document.createElement('style');
                s.id = 'youth-theme-boot';
                s.textContent = ':root{--brand:#7c3aed!important;--brand-dark:#5b21b6!important;--brand-light:#c4b5fd!important;--brand-bg:#ede9fe!important;--brand-glow:rgba(124,58,237,.18)!important;}';
                document.head.appendChild(s);
            }
        })();
    </script>

    <!-- Font Ready Guard -->
    <style id="font-guard">
        body {
            visibility: hidden
        }
    </style>
    <script>
        (function () {
            var show = function () {
                var g = document.getElementById('font-guard');
                if (g) g.remove();
            };
            if (document.fonts && document.fonts.ready) {
                var timer = setTimeout(show, 300);
                document.fonts.ready.then(function () {
                    clearTimeout(timer);
                    show();
                });
            } else {
                setTimeout(show, 50);
            }
        })();
    </script>

    <style>
        /* Essential tokens from dashboard */
        :root {
            /* Brand */
            --brand: #5b6cf5;
            --brand-dark: #4354e8;
            --brand-light: #a5b0ff;
            --brand-bg: #eef0ff;
            --brand-glow: rgba(91, 108, 245, .18);

            /* Semantic */
            --success: #10b981;
            --success-dark: #059669;
            --success-bg: #d1fae5;
            --danger: #ef4444;
            --danger-dark: #dc2626;
            --danger-bg: #fee2e2;
            --warning: #f59e0b;
            --warning-dark: #d97706;
            --warning-bg: #fef3c7;

            /* Surface */
            --bg: #f3f4f9;
            --surface: #ffffff;
            --surface-2: #f7f8fc;
            --surface-3: #eef0f8;
            --border: rgba(91, 108, 245, .12);
            --border-solid: #e4e6f0;
            --text: #1a1d2e;
            --text-2: #4b5068;
            --text-3: #8b90a8;
            --shadow-sm: 0 2px 8px -2px rgba(0, 0, 0, .07);
            --shadow-md: 0 8px 24px -4px rgba(0, 0, 0, .10);
            --shadow-lg: 0 20px 48px -8px rgba(0, 0, 0, .14);
            --shadow-xl: 0 32px 64px -12px rgba(0, 0, 0, .18);

            /* Radius */
            --r-xs: 6px;
            --r-sm: 10px;
            --r-md: 14px;
            --r-lg: 18px;
            --r-xl: 24px;
            --r-2xl: 32px;
            --r-full: 9999px;

            /* Motion */
            --t: .22s;
            --ease: cubic-bezier(.4, 0, .2, 1);
            --spring: cubic-bezier(.16, 1, .3, 1);
        }

        [data-theme="dark"] {
            --bg: #0f1117;
            --surface: #181b26;
            --surface-2: #1e2132;
            --surface-3: #252840;
            --border: rgba(91, 108, 245, .18);
            --border-solid: #2a2d42;
            --text: #e8eaf6;
            --text-2: #9299be;
            --text-3: #565c7a;
            --shadow-sm: 0 2px 8px -2px rgba(0, 0, 0, .4);
            --shadow-md: 0 8px 24px -4px rgba(0, 0, 0, .5);
            --shadow-lg: 0 20px 48px -8px rgba(0, 0, 0, .6);
            --shadow-xl: 0 32px 64px -12px rgba(0, 0, 0, .7);
            --brand-bg: rgba(91, 108, 245, .15);
            --success-bg: rgba(16, 185, 129, .15);
            --danger-bg: rgba(239, 68, 68, .15);
            --warning-bg: rgba(245, 158, 11, .15);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', 'Segoe UI', Tahoma, 'Arabic Typesetting', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding-bottom: 20px;
            transition: background var(--t) var(--ease), color var(--t) var(--ease);
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background:
                radial-gradient(ellipse 80% 50% at 10% -10%, rgba(91, 108, 245, .07) 0%, transparent 60%),
                radial-gradient(ellipse 60% 40% at 90% 110%, rgba(139, 92, 246, .05) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
        }

        [data-theme="dark"] body::before {
            background:
                radial-gradient(ellipse 80% 50% at 10% -10%, rgba(91, 108, 245, .12) 0%, transparent 60%),
                radial-gradient(ellipse 60% 40% at 90% 110%, rgba(139, 92, 246, .08) 0%, transparent 60%);
        }

        .topbar {
            position: sticky;
            top: 0;
            z-index: 300;
            background: var(--bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 0 16px;
            height: 58px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            transition: background var(--t) var(--ease), border-color var(--t) var(--ease);
        }

        .topbar-brand {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            flex-shrink: 0;
        }

        .topbar-logo {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            background: var(--brand-bg);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--brand);
            flex-shrink: 0;
        }

        .topbar-title {
            font-size: 0.95rem;
            font-weight: 800;
            color: var(--text);
        }

        .topbar-search-container {
            flex: 1;
            max-width: 300px;
            position: relative;
        }

        .topbar-search-input {
            width: 100%;
            padding: 8px 12px;
            border: 1.5px solid var(--border-solid);
            border-radius: var(--r-md);
            font-size: 0.85rem;
            background: var(--bg);
            color: var(--text);
            transition: all var(--t) var(--ease);
        }

        .topbar-search-input:focus {
            outline: none;
            border-color: var(--brand);
            box-shadow: 0 0 0 3px var(--brand-bg);
        }

        .topbar-search-results {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: var(--surface);
            border: 1px solid var(--border-solid);
            border-radius: var(--r-md);
            margin-top: 5px;
            max-height: 300px;
            overflow-y: auto;
            display: none;
            z-index: 400;
            box-shadow: var(--shadow-lg);
        }

        .topbar-search-results.show {
            display: block;
        }

        .search-result-item {
            padding: 10px 12px;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            transition: all 0.2s;
        }

        .search-result-item:hover {
            background: var(--brand-bg);
            color: var(--brand);
        }

        .search-result-item:last-child {
            border-bottom: none;
        }

        .topbar-actions {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .topbar-btn {
            height: 38px;
            padding: 0 12px;
            border-radius: var(--r-md);
            display: flex;
            align-items: center;
            gap: 6px;
            background: var(--surface);
            border: 1.5px solid var(--border-solid);
            color: var(--text-2);
            font-size: 0.88rem;
            font-weight: 700;
            cursor: pointer;
            text-decoration: none;
            transition: all var(--t) var(--ease);
            flex-shrink: 0;
        }

        .topbar-btn:hover {
            background: var(--brand-bg);
            color: var(--brand);
            border-color: var(--brand);
        }

        .page-wrap {
            max-width: 1440px;
            margin: 0 auto;
            padding: 20px;
        }

        .hero-strip {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            gap: 10px;
            flex-wrap: wrap;
        }

        .hero-greeting {
            font-size: 1.2rem;
            font-weight: 800;
        }

        /* Camera Button */
        .btn-camera-big {
            padding: 30px;
            border-radius: var(--r-xl);
            background: var(--success);
            color: white;
            border: none;
            cursor: pointer;
            font-size: 2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            box-shadow: var(--shadow-lg);
            transition: all var(--t) var(--spring);
            font-weight: 900;
            flex-direction: column;
            text-decoration: none;
            margin: 0 auto 20px;
            width: fit-content;
            min-width: 200px;
        }

        .btn-camera-big:hover {
            background: var(--success-dark);
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 25px 50px rgba(16, 185, 129, 0.3);
        }

        .btn-camera-big:active {
            transform: translateY(-2px) scale(0.98);
        }

        .btn-coupon-fast {
            background: var(--brand) !important;
        }

        .btn-coupon-fast:hover {
            background: #4338ca !important;
            box-shadow: 0 25px 50px rgba(91, 108, 245, 0.3) !important;
        }

        .btn-welcome-screen {
            background: #8b5cf6 !important;
        }

        .btn-welcome-screen:hover {
            background: #6d28d9 !important;
            box-shadow: 0 25px 50px rgba(139, 92, 246, 0.3) !important;
        }

        .btn-camera-text {
            font-size: 1.2rem;
        }

        /* Custom Field Cards */
        .fields-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .field-card {
            background: var(--surface);
            border-radius: var(--r-xl);
            padding: 20px;
            border: 1px solid var(--border);
            box-shadow: var(--shadow-sm);
            transition: all var(--t) var(--spring);
        }

        .field-card:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: var(--shadow-md);
            border-color: var(--brand);
        }

        .field-card-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 2px solid var(--border);
        }

        .field-card-icon {
            width: 40px;
            height: 40px;
            border-radius: var(--r-lg);
            background: var(--brand-bg);
            color: var(--brand);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            flex-shrink: 0;
        }

        .field-card-title {
            font-size: 1rem;
            font-weight: 800;
            color: var(--text);
        }

        .field-card-count {
            font-size: 0.75rem;
            color: var(--text-3);
            font-weight: 700;
        }

        .kids-in-field {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .kid-item {
            background: var(--bg);
            border-radius: var(--r-md);
            padding: 8px 10px;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .kid-item:hover {
            background: var(--brand-bg);
            transform: translateX(-5px);
        }

        .kid-avatar-sm {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: var(--brand-light);
            color: var(--brand);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            font-weight: 800;
            flex-shrink: 0;
            object-fit: cover;
        }

        .kid-name-sm {
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--text);
            flex: 1;
            min-width: 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .kid-points-sm {
            font-size: 0.75rem;
            color: var(--success);
            font-weight: 800;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: var(--text-3);
            display: none;
        }

        .loading i {
            font-size: 2rem;
            margin-bottom: 10px;
        }

        /* Print Styles */
        @media screen {
            #printArea {
                display: none !important;
            }
        }

        @media print {
            @page {
                size: auto;
                margin: 4mm;
            }

            body * {
                visibility: hidden !important;
            }
            #printArea, #printArea * {
                visibility: visible !important;
            }
            #printArea {
                position: absolute !important;
                left: 0 !important;
                top: 0 !important;
                width: 100% !important;
                display: flex !important;
                flex-wrap: wrap !important;
                justify-content: center !important;
                gap: 20px !important;
                padding: 20px !important;
                background: white !important;
            }

            .print-card {
                border: 2px dashed #000;
                padding: 15px;
                text-align: center;
                border-radius: 10px;
                break-inside: avoid;
                page-break-inside: avoid;
                display: flex !important;
                flex-direction: column;
                justify-content: space-between;
                align-items: center;
                width: 260px;
                height: 360px;
                margin: 0 !important;
                box-sizing: border-box;
                background: #fff;
            }

            .print-card img.avatar {
                width: 70px;
                height: 70px;
                border-radius: 50%;
                margin: 0;
                object-fit: cover;
                display: block !important;
            }

            .print-card h3 {
                font-size: 13px;
                font-weight: 700;
                margin: 0;
                color: #000 !important;
                overflow: hidden;
                text-overflow: ellipsis;
                white-space: nowrap;
                width: 100%;
            }

            .print-card h2 {
                font-size: 18px;
                font-weight: 800;
                margin: 0;
                color: #000 !important;
                overflow: hidden;
                text-overflow: ellipsis;
                white-space: nowrap;
                width: 100%;
            }

            .print-card .custom-info {
                font-size: 11px;
                font-weight: bold;
                color: #000 !important;
                margin: 0;
                display: flex;
                flex-wrap: wrap;
                justify-content: center;
                gap: 6px;
                width: 100%;
            }

            .print-card div[id^="qrcode_"] {
                width: 130px;
                height: 130px;
                display: flex !important;
                justify-content: center;
                align-items: center;
                margin: 0 auto;
            }

            .print-card div[id^="qrcode_"] canvas {
                display: none !important;
            }

            .print-card div[id^="qrcode_"] img {
                width: 130px !important;
                height: 130px !important;
                display: block !important;
                margin: 0 auto;
            }
        }
        .breadcrumb-item { cursor:pointer; color:var(--primary); font-weight:700; transition:opacity 0.2s; }
        .breadcrumb-item:hover { opacity:0.8; }
        .breadcrumb-item.active { color:var(--text); cursor:default; }
    </style>
    <script src="/js/og-meta.js"></script>
</head>

<body>

    <div class="topbar">
        <a href="/uncle/dashboard/" class="topbar-brand">
            <div class="topbar-logo" style="overflow:hidden;"><img src="/logo.png"
                    style="width:100%;height:100%;object-fit:cover;"
                    onerror="this.outerHTML='<i class=\'fas fa-cross\'></i>'"></div>
        </a>
        <div class="topbar-search-container">
            <input type="text" class="topbar-search-input" id="topbarSearch" placeholder="ابحث بالاسم..."
                oninput="topbarSearchHandler()">
            <div class="topbar-search-results" id="topbarSearchResults"></div>
        </div>
        <div class="topbar-actions">
            <button class="topbar-btn" onclick="startScannerV2()" title="مسح QR" style="width: 38px; height: 38px; padding: 0; display: inline-flex; align-items: center; justify-content: center;">
                <span class="fa-stack" style="font-size: 0.85rem; width: 1.5em; height: 1.5em; line-height: 1.5em; display: inline-flex; align-items: center; justify-content: center; margin: 0;">
                    <i class="fas fa-expand fa-stack-2x" style="font-size: 1.3rem;"></i>
                    <i class="fas fa-qrcode fa-stack-1x" style="font-size: 0.75rem;"></i>
                </span>
            </button>
        </div>
    </div>

    <div class="page-wrap">

        <!-- VIEW: TRIP DETAILS -->
        <div id="viewTripDetails" class="view-section active">
            <div class="hero-strip" style="justify-content: flex-start; gap: 12px;">
                <button class="topbar-btn" onclick="window.location.href='/uncle/dashboard/'"
                    style="border:none;background:var(--border-solid);color:var(--text-2);padding:8px 12px;border-radius:10px;margin:0;"><i
                        class="fas fa-arrow-right"></i> عودة</button>
                <div class="hero-greeting" id="detailTripTitle">الرحلة</div>
                <div id="adminActions" style="display:none; align-items:center; gap:10px; margin-right: auto;">
                    <button class="topbar-btn" onclick="printQRCards()"
                        style="background:var(--brand);color:white;border-color:var(--brand);margin:0;white-space:nowrap;"><i
                            class="fas fa-print"></i> طباعة الكروت</button>
                </div>
            </div>

            <!-- Scanner & Display Tools -->
            <div class="scanner-tools-container" style="display: flex; gap: 15px; justify-content: center; margin-bottom: 25px; flex-wrap: wrap;">
                <!-- Standard Scanner (Games/Points) -->
                <button class="btn-camera-big" onclick="startScannerV2()" title="مسح كود QR للأطفال" style="margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; padding: 12px 20px; background: var(--success); text-decoration: none;">
                    <span class="fa-stack" style="font-size: 1.1rem; width: 2em; height: 2em; line-height: 2em; display: inline-flex; align-items: center; justify-content: center;">
                        <i class="fas fa-expand fa-stack-2x" style="font-size: 1.8rem; color: white;"></i>
                        <i class="fas fa-qrcode fa-stack-1x" style="font-size: 1.0rem; color: white;"></i>
                    </span>
                    <span class="btn-camera-text" style="margin-top: 2px; color: white;">نقاط الرحلة (العاب)</span>
                </button>

                <!-- Fast Coupon Scanner -->
                <button class="btn-camera-big btn-coupon-fast" onclick="openFastCouponScanner()" title="مسح سريع للكوبونات" style="margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; padding: 12px 20px; text-decoration: none;">
                    <span class="fa-stack" style="font-size: 1.1rem; width: 2em; height: 2em; line-height: 2em; display: inline-flex; align-items: center; justify-content: center;">
                        <i class="fas fa-bolt fa-stack-2x" style="font-size: 1.8rem; color: white;"></i>
                        <i class="fas fa-ticket-alt fa-stack-1x" style="font-size: 0.9rem; color: white; transform: rotate(-15deg);"></i>
                    </span>
                    <span class="btn-camera-text" style="margin-top: 2px; color: white;">الماسح السريع للكوبونات</span>
                </button>

                <!-- Welcome Display Screen -->
                <button class="btn-camera-big btn-welcome-screen" onclick="openWelcomeScreen()" title="شاشة العرض والترحيب بالأطفال" style="margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; padding: 12px 20px; text-decoration: none;">
                    <span class="fa-stack" style="font-size: 1.1rem; width: 2em; height: 2em; line-height: 2em; display: inline-flex; align-items: center; justify-content: center;">
                        <i class="fas fa-tv fa-stack-2x" style="font-size: 1.8rem; color: white;"></i>
                        <i class="fas fa-volume-up fa-stack-1x" style="font-size: 0.9rem; color: white;"></i>
                    </span>
                    <span class="btn-camera-text" style="margin-top: 2px; color: white;">شاشة الترحيب بالأطفال</span>
                </button>
            </div>

            <div id="loadingDetails" class="loading">
                <i class="fas fa-circle-notch fa-spin"></i><br><br>جاري التحميل...
            </div>

            <!-- Custom Fields as Cards -->
            <div id="fieldsBreadcrumbs" style="display:none; gap:8px; align-items:center; margin-bottom:15px; font-size:0.85rem; color:var(--muted); background:var(--bg); padding:10px 15px; border-radius:12px; border:1px solid var(--border);">
            </div>
            <div class="fields-grid" id="fieldsGrid"></div>
        </div>

        <div id="printArea"></div>

        <!-- Scanner Modal -->
        <div id="scannerModal"
            style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:9999; align-items:center; justify-content:center; flex-direction:column;">
            <div
                style="background:var(--surface); padding:20px; border-radius:16px; width:90%; max-width:400px; text-align:center;">
                <h3 style="margin-bottom:15px; font-weight: 800;"><i class="fas fa-qrcode"></i> مسح كود المسابقة</h3>
                
                <!-- Scanner source selector (Camera vs. USB) -->
                <div class="scanner-source-tabs" style="display:flex;background:var(--surface-3, #e5e7eb);padding:4px;border-radius:10px;margin-bottom:12px;gap:4px;direction:rtl;">
                    <button type="button" id="scannerSourceTab_camera" class="scanner-source-tab" onclick="switchScannerSource('camera')" style="flex:1;padding:8px;border-radius:8px;border:none;background:none;font-weight:700;font-size:0.82rem;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;color:var(--muted, #888);transition:all 0.2s;">
                        <i class="fas fa-camera"></i> الكاميرا
                    </button>
                    <button type="button" id="scannerSourceTab_usb" class="scanner-source-tab" onclick="switchScannerSource('usb')" style="flex:1;padding:8px;border-radius:8px;border:none;background:none;font-weight:700;font-size:0.82rem;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;color:var(--muted, #888);transition:all 0.2s;">
                        <i class="fas fa-barcode"></i> ماسح خارجي
                    </button>
                </div>

                <div id="reader"
                    style="width:100%; min-height:300px; background:#000; border-radius: 12px; overflow: hidden;"></div>
                <button class="topbar-btn" onclick="stopScanner()"
                    style="margin:20px auto 0; width:100%; justify-content:center; background:var(--danger); color:white; border-color:var(--danger);"><i
                        class="fas fa-times"></i> إلغاء</button>
            </div>
        </div>

        <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
        <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>

        <script>
            const API_URL = '/api.php';
            let currentTrip = null;
            let regsList = [];
            let filterPath = []; // Array of { type: 'field'|'choice'|'subfield', name: string, fieldName?: string, choiceVal?: string }
            let currentFilter = null;

            document.addEventListener('DOMContentLoaded', () => {
                // Get trip ID from URL parameters
                const urlParams = new URLSearchParams(window.location.search);
                const tripId = urlParams.get('trip_id');

                if (tripId) {
                    openTrip(tripId);
                } else {
                    // If no trip ID, redirect to dashboard
                    window.location.href = '/uncle/dashboard/';
                }
            });

            async function openTrip(tripId) {
                document.getElementById('loadingDetails').style.display = 'block';
                document.getElementById('fieldsGrid').innerHTML = '';

                const fd = new FormData();
                fd.append('action', 'getTripDetails');
                fd.append('trip_id', tripId);

                try {
                    const res = await fetch(API_URL, { method: 'POST', body: fd }).then(r => r.json());
                    document.getElementById('loadingDetails').style.display = 'none';

                    if (res.success && res.trip) {
                        currentTrip = res.trip;

                        // Admin & Developer check
                        if (['admin', 'developer', 'dev'].includes(res.user_role)) {
                            const adminActions = document.getElementById('adminActions');
                            if (adminActions) adminActions.style.display = 'flex';
                        }
                        regsList = res.trip.registrations || [];
                        document.getElementById('detailTripTitle').textContent = currentTrip.title;
                        renderFieldCards();
                    } else {
                        document.getElementById('fieldsGrid').innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--text-3);">لم يتم العثور على الرحلة</div>';
                    }
                } catch (e) {
                    document.getElementById('loadingDetails').style.display = 'none';
                    document.getElementById('fieldsGrid').innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--text-3);">حدث خطأ في تحميل البيانات</div>';
                }
            }
            function renderBreadcrumbs() {
                const bc = document.getElementById('fieldsBreadcrumbs');
                if (!bc) return;
                if (filterPath.length === 0) {
                    bc.style.display = 'none';
                    return;
                }
                bc.style.display = 'flex';
                let html = `<div class="breadcrumb-item" onclick="clearFilterPath()">الرئيسية</div>`;
                filterPath.forEach((p, i) => {
                    html += `<i class="fas fa-chevron-left" style="font-size:0.7rem;opacity:0.5;"></i>`;
                    html += `<div class="breadcrumb-item ${i === filterPath.length - 1 ? 'active' : ''}" onclick="sliceFilterPath(${i})">${p.name}</div>`;
                });
                bc.innerHTML = html;
            }

            function clearFilterPath() {
                filterPath = [];
                renderBreadcrumbs();
                renderFieldCards();
            }

            function sliceFilterPath(index) {
                filterPath = filterPath.slice(0, index + 1);
                renderBreadcrumbs();
                renderFieldCards();
            }

            function renderFieldCards() {
                const grid = document.getElementById('fieldsGrid');
                grid.innerHTML = '';
                renderBreadcrumbs();

                const JUNK = new Set(['0', 'null', 'undefined', 'none', '']);
                const fields = currentTrip.custom_fields
                    ? currentTrip.custom_fields.split(',').map(f => f.trim()).filter(f => f && !JUNK.has(f.toLowerCase()))
                    : [];

                if (fields.length === 0) {
                    renderByClass();
                    return;
                }

                // ── Level 0: Show Main Fields ──────────────────────────────────────────
                if (filterPath.length === 0) {
                    fields.forEach(field => {
                        const card = document.createElement('div');
                        card.className = 'field-card';
                        card.onclick = () => {
                            filterPath.push({ type: 'field', name: field, fieldName: field });
                            renderFieldCards();
                        };
                        
                        let icon = 'fas fa-folder';
                        const meta = currentTrip.custom_field_icons?.[field];
                        if (meta) icon = (typeof meta === 'string') ? meta : (meta.icon || 'fas fa-folder');

                        card.innerHTML = `
                            <div class="field-card-header" style="border-bottom:none; margin-bottom:0; padding-bottom:0;">
                                <div class="field-card-icon"><i class="${icon}"></i></div>
                                <div>
                                    <div class="field-card-title">${field}</div>
                                    <div class="field-card-count">عرض الخيارات</div>
                                </div>
                            </div>
                        `;
                        grid.appendChild(card);
                    });
                    return;
                }

                // ── Level 1: Show Choices for a Field ──────────────────────────────────
                const last = filterPath[filterPath.length - 1];
                if (last.type === 'field') {
                    const fieldName = last.fieldName;
                    const meta = currentTrip.custom_field_icons?.[fieldName] || {};
                    const choices = Array.isArray(meta.choices) ? meta.choices : [];
                    
                    // Group kids by this field value
                    const groups = {};
                    regsList.forEach(r => {
                        let val = 'بدون تحديد';
                        try {
                            const cd = JSON.parse(r.custom_data || '{}');
                            val = cd[fieldName] || 'بدون تحديد';
                        } catch(e){}
                        if (!groups[val]) groups[val] = [];
                        groups[val].push(r);
                    });

                    Object.keys(groups).sort().forEach(val => {
                        const kids = groups[val];
                        const card = document.createElement('div');
                        card.className = 'field-card';
                        card.onclick = () => {
                            // If this field is a sub_group AND the choice has subfields, drill down
                            if (meta.type === 'sub_group' && meta.sub_fields?.[val]) {
                                filterPath.push({ type: 'choice', name: val, fieldName: fieldName, choiceVal: val });
                                renderFieldCards();
                            } else {
                                // Otherwise show kids directly
                                openFilterKids(fieldName, val);
                            }
                        };

                        card.innerHTML = `
                            <div class="field-card-header" style="border-bottom:none; margin-bottom:0; padding-bottom:0;">
                                <div class="field-card-icon"><i class="${meta.icon || 'fas fa-tag'}"></i></div>
                                <div>
                                    <div class="field-card-title">${val}</div>
                                    <div class="field-card-count">${kids.length} طفل</div>
                                </div>
                            </div>
                        `;
                        grid.appendChild(card);
                    });
                    return;
                }

                // ── Level 2: Show Sub-fields for a Choice ──────────────────────────────
                if (last.type === 'choice') {
                    const fieldName = last.fieldName;
                    const choiceVal = last.choiceVal;
                    const meta = currentTrip.custom_field_icons?.[fieldName] || {};
                    const subFields = meta.sub_fields?.[choiceVal] || [];

                    subFields.forEach(sf => {
                        const sfKey = fieldName + '__sf__' + sf.name;
                        const card = document.createElement('div');
                        card.className = 'field-card';
                        card.onclick = () => {
                            filterPath.push({ type: 'subfield', name: sf.name, fieldName: sfKey });
                            renderFieldCards();
                        };

                        card.innerHTML = `
                            <div class="field-card-header" style="border-bottom:none; margin-bottom:0; padding-bottom:0;">
                                <div class="field-card-icon"><i class="${sf.icon || 'fas fa-sitemap'}"></i></div>
                                <div>
                                    <div class="field-card-title">${sf.name}</div>
                                    <div class="field-card-count">عرض خيارات الحقل الفرعي</div>
                                </div>
                            </div>
                        `;
                        grid.appendChild(card);
                    });
                    return;
                }

                // ── Level 3: Show Choices for a Sub-field ──────────────────────────────
                if (last.type === 'subfield') {
                    const sfKey = last.fieldName;
                    const groups = {};
                    regsList.forEach(r => {
                        let val = 'بدون تحديد';
                        try {
                            const cd = JSON.parse(r.custom_data || '{}');
                            val = cd[sfKey] || 'بدون تحديد';
                        } catch(e){}
                        if (!groups[val]) groups[val] = [];
                        groups[val].push(r);
                    });

                    Object.keys(groups).sort().forEach(val => {
                        const kids = groups[val];
                        const card = document.createElement('div');
                        card.className = 'field-card';
                        card.onclick = () => openFilterKids(sfKey, val);

                        card.innerHTML = `
                            <div class="field-card-header" style="border-bottom:none; margin-bottom:0; padding-bottom:0;">
                                <div class="field-card-icon"><i class="fas fa-tag"></i></div>
                                <div>
                                    <div class="field-card-title">${val}</div>
                                    <div class="field-card-count">${kids.length} طفل</div>
                                </div>
                            </div>
                        `;
                        grid.appendChild(card);
                    });
                }
            }

            // Fallback: group by student class when the trip has no custom fields
            function renderByClass() {
                const grid = document.getElementById('fieldsGrid');
                const byClass = {};

                regsList.forEach(r => {
                    const cls = r.student_class || 'بدون فصل';
                    if (!byClass[cls]) byClass[cls] = [];
                    byClass[cls].push(r);
                });

                const sorted = Object.keys(byClass).sort();
                sorted.forEach(cls => {
                    const kids = byClass[cls];
                    const card = document.createElement('div');
                    card.className = 'field-card';
                    card.style.cursor = 'pointer';
                    card.onclick = () => openFilterKids('__class__', cls);

                    card.innerHTML = `
            <div class="field-card-header" style="border-bottom:none; margin-bottom:0; padding-bottom:0;">
                <div class="field-card-icon"><i class="fas fa-layer-group"></i></div>
                <div>
                    <div class="field-card-title">${cls}</div>
                    <div class="field-card-count">${kids.length} طفل</div>
                </div>
            </div>
        `;
                    grid.appendChild(card);
                });
            }

            function openFilterKids(field, value) {
                const f = encodeURIComponent(field);
                const v = encodeURIComponent(value || '');
                window.location.href = `/uncle/trip/filter/?trip_id=${currentTrip.id}&field=${f}&value=${v}`;
            }

            function getFieldIcon(field) {
                const icons = {
                    'الفصل': { icon: 'fas fa-layer-group' },
                    'المستوى': { icon: 'fas fa-chart-line' },
                    'المجموعة': { icon: 'fas fa-users' },
                    'الفريق': { icon: 'fas fa-users' },
                    'الكنيسة': { icon: 'fas fa-church' }
                };
                return icons[field] || null;
            }

            function topbarSearchHandler() {
                const searchTerm = document.getElementById('topbarSearch').value.toLowerCase().trim();
                const resultsDiv = document.getElementById('topbarSearchResults');

                if (!searchTerm) {
                    resultsDiv.classList.remove('show');
                    return;
                }

                const filtered = regsList.filter(r => {
                    const name = r.student_name || '';
                    return name.toLowerCase().includes(searchTerm);
                });

                if (filtered.length === 0) {
                    resultsDiv.innerHTML = '<div class="search-result-item" style="cursor:default;">لا توجد نتائج</div>';
                    resultsDiv.classList.add('show');
                    return;
                }

                resultsDiv.innerHTML = filtered.map(r => {
                    const name = r.student_name || '؟';
                    return `<div class="search-result-item" onclick="openKidPoints('${currentTrip.id}', '${r.student_id}')">${name}</div>`;
                }).join('');

                resultsDiv.classList.add('show');
            }

            function openKidPoints(tripId, studentId) {
                window.location.href = `/uncle/trip/points/?trip_id=${tripId}&student_id=${studentId}`;
            }

            // QR Code Scanner Logic
            let html5QrcodeScanner = null;
            let scannerSource = 'camera';

            function getKidIdFromQrText(decodedText) {
                if (!decodedText) return '';
                try {
                    const cleaned = String(decodedText).trim();
                    // If it's a URL
                    if (cleaned.includes('://') || cleaned.includes('?')) {
                        const url = new URL(cleaned, window.location.origin);
                        const id = url.searchParams.get('student_id') ||
                                   url.searchParams.get('studentId') ||
                                   url.searchParams.get('id');
                        if (id) return id.trim();
                    }
                    
                    // If it's a raw integer
                    if (/^\d+$/.test(cleaned)) {
                        return cleaned;
                    }
                    
                    // Direct lookup fallback if regsList is populated
                    const match = regsList.find(r => String(r.student_id) === cleaned || String(r.id) === cleaned);
                    if (match) return String(match.student_id);
                    
                    return cleaned;
                } catch (e) {
                    return '';
                }
            }

            function switchScannerSource(source) {
                if (['camera', 'usb'].includes(source)) {
                    scannerSource = source;
                    localStorage.setItem('scanner_source_preference', source);
                    
                    // Update tabs styling
                    document.querySelectorAll('.scanner-source-tab').forEach(btn => {
                        btn.style.background = 'none';
                        btn.style.color = 'var(--muted, #888)';
                    });
                    const activeBtn = document.getElementById('scannerSourceTab_' + source);
                    if (activeBtn) {
                        activeBtn.style.background = 'var(--surface, #fff)';
                        activeBtn.style.color = 'var(--primary, #5b6cf5)';
                    }
                    
                    const readerEl = document.getElementById('reader');
                    if (source === 'usb') {
                        // Stop camera scanner if running
                        if (html5QrcodeScanner) {
                            const scanner = html5QrcodeScanner;
                            html5QrcodeScanner = null;
                            scanner.stop().then(() => {}).catch(() => {});
                        }
                        // Show a clean placeholder in readerEl
                        if (readerEl) {
                            readerEl.style.minHeight = '200px';
                            readerEl.style.background = 'var(--bg, #f3f4f6)';
                            readerEl.style.border = '2px dashed var(--border, #e5e7eb)';
                            readerEl.style.display = 'flex';
                            readerEl.style.flexDirection = 'column';
                            readerEl.style.alignItems = 'center';
                            readerEl.style.justifyContent = 'center';
                            readerEl.style.color = 'var(--primary, #5b6cf5)';
                            readerEl.style.gap = '10px';
                            readerEl.style.padding = '20px';
                            readerEl.innerHTML = `
                                <i class="fas fa-barcode" style="font-size:2.8rem;opacity:0.85;"></i>
                                <div style="font-weight:800;font-size:1.0rem;text-align:center;">الماسح الخارجي نشط</div>
                                <div style="font-size:0.8rem;color:var(--muted, #888);text-align:center;max-width:280px;line-height:1.4;">قم بتوجيه قارئ الـ QR الخارجي نحو الكارت والمسح.</div>
                            `;
                        }
                    } else {
                        // Source is camera
                        if (readerEl) {
                            readerEl.style.minHeight = '300px';
                            readerEl.style.background = '#000';
                            readerEl.style.border = 'none';
                            readerEl.innerHTML = '';
                        }
                        // Restart camera
                        restartCameraOnly();
                    }
                }
            }

            async function restartCameraOnly() {
                if (html5QrcodeScanner) return;
                const modal = document.getElementById('scannerModal');
                if (!modal || modal.style.display === 'none') return;
                if (scannerSource !== 'camera') return;

                html5QrcodeScanner = new Html5Qrcode("reader");
                const activeTripId = currentTrip?.id || '';
                
                html5QrcodeScanner.start(
                    { facingMode: "environment" },
                    { fps: 10, qrbox: { width: 250, height: 250 } },
                    async (decodedText, decodedResult) => {
                        handleScannedText(decodedText);
                    },
                    (errorMessage) => {}
                ).catch((err) => {
                    alert("حدث خطأ في الوصول للكاميرا: " + err);
                    stopScanner();
                });
            }

            async function handleScannedText(decodedText) {
                // If scanner is active, stop it first
                if (html5QrcodeScanner) {
                    const scanner = html5QrcodeScanner;
                    html5QrcodeScanner = null;
                    try {
                        await scanner.stop();
                    } catch(e){}
                }
                document.getElementById('scannerModal').style.display = 'none';

                const scannedStudentId = getKidIdFromQrText(decodedText);
                if (!scannedStudentId) {
                    alert('الكود الممسوح غير صحيح');
                    return;
                }

                let parsedUrl = null;
                try {
                    parsedUrl = new URL(decodedText, window.location.origin);
                } catch (e) { }
                const scannedTripId = parsedUrl ? parsedUrl.searchParams.get('trip_id') : null;
                const activeTripId = currentTrip?.id || '';

                if (activeTripId && String(scannedTripId || activeTripId) === String(activeTripId)) {
                    window.location.href = `/uncle/trip/points/?trip_id=${activeTripId}&student_id=${scannedStudentId}`;
                    return;
                }

                if (!scannedTripId) {
                    window.location.href = `/uncle/trip/points/?trip_id=${activeTripId}&student_id=${scannedStudentId}`;
                    return;
                }

                const fd = new FormData();
                fd.append('action', 'getTripDetails');
                fd.append('trip_id', scannedTripId);

                try {
                    const res = await fetch(API_URL, { method: 'POST', body: fd }).then(r => r.json());
                    const currentChurchId = currentTrip ? currentTrip.church_id : null;
                    if (res.success && res.trip && currentChurchId && String(res.trip.church_id) === String(currentChurchId)) {
                        if (await customConfirm(`هذا الكود يخص رحلة أخرى ("${res.trip.title}") لنفس الكنيسة. هل تريد الانتقال إليها لتسجيل النقاط؟`, 'نعم، انتقال', 'إلغاء')) {
                            window.location.href = `/uncle/trip/points/?trip_id=${scannedTripId}&student_id=${scannedStudentId}`;
                        }
                    } else {
                        await customAlert('عذراً، هذا الكود يخص رحلة لكنيسة أخرى ولا يمكن تشغيله في كنيستك.');
                    }
                } catch (err) {
                    await customAlert('عذراً، هذا الكود يخص رحلة لكنيسة أخرى ولا يمكن تشغيله في كنيستك.');
                }
            }

            function startScannerV2() {
                document.getElementById('scannerModal').style.display = 'flex';
                const pref = localStorage.getItem('scanner_source_preference') || 'camera';
                switchScannerSource(pref);
            }

            function startScanner() {
                startScannerV2();
            }

            function stopScanner() {
                if (html5QrcodeScanner) {
                    html5QrcodeScanner.stop().then(() => {
                        document.getElementById('scannerModal').style.display = 'none';
                    }).catch(e => {
                        document.getElementById('scannerModal').style.display = 'none';
                    });
                    html5QrcodeScanner = null;
                } else {
                    document.getElementById('scannerModal').style.display = 'none';
                }
            }

            // Global USB/Wireless Keyboard Scanner Listener
            (function() {
                let scanBuffer = '';
                let lastKeyTime = 0;
                const SCAN_TIMEOUT = 50; // ms

                document.addEventListener('keydown', function(e) {
                    if (e.ctrlKey || e.altKey || e.metaKey) return;
                    
                    const modal = document.getElementById('scannerModal');
                    const isModalActive = modal && modal.style.display === 'flex';
                    
                    // If focusing editing input field and scanner modal is NOT active, ignore
                    const activeTag = document.activeElement ? document.activeElement.tagName.toLowerCase() : '';
                    const isEditing = activeTag === 'input' || activeTag === 'textarea';
                    if (isEditing && !isModalActive) {
                        return;
                    }

                    const now = Date.now();
                    if (e.key.length === 1) {
                        if (scanBuffer === '' || (now - lastKeyTime) < SCAN_TIMEOUT) {
                            scanBuffer += e.key;
                            lastKeyTime = now;
                        } else {
                            scanBuffer = e.key;
                            lastKeyTime = now;
                        }
                    } else if (e.key === 'Enter') {
                        if (scanBuffer.length > 0) {
                            const kidId = getKidIdFromQrText(scanBuffer);
                            if (kidId) {
                                e.preventDefault();
                                handleScannedText(scanBuffer);
                                scanBuffer = '';
                            }
                        }
                    }
                });
            })();

            function printQRCards() {
                if (!currentTrip || !currentTrip.id) {
                    alert('لم يتم تحميل بيانات الرحلة بعد');
                    return;
                }

                window.location.href = `/uncle/church/trips/#trips?trip_id=${encodeURIComponent(currentTrip.id)}&action=print`;
            }

            function customAlert(message) {
                return new Promise(resolve => {
                    const overlay = document.createElement('div');
                    overlay.style = `
                        position: fixed;
                        top: 0; left: 0; width: 100%; height: 100%;
                        background: rgba(0, 0, 0, 0.6);
                        backdrop-filter: blur(4px);
                        z-index: 100000;
                        display: flex; align-items: center; justify-content: center;
                        opacity: 0; transition: opacity 0.2s ease-out;
                        direction: rtl;
                    `;
                    const box = document.createElement('div');
                    box.style = `
                        background: var(--surface, #ffffff);
                        border-radius: 16px;
                        padding: 24px;
                        width: 90%; max-width: 400px;
                        box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1), 0 10px 10px -5px rgba(0,0,0,0.04);
                        transform: scale(0.9); transition: transform 0.2s ease-out;
                        text-align: center;
                        border: 1px solid var(--border, #e5e7eb);
                    `;
                    box.innerHTML = `
                        <div style="font-size: 2.5rem; color: var(--danger, #ef4444); margin-bottom: 12px;">
                            <i class="fas fa-exclamation-circle"></i>
                        </div>
                        <h3 style="font-size: 1.1rem; font-weight: 800; color: var(--text, #1f2937); margin-bottom: 16px; line-height: 1.5; text-align: center;">${message}</h3>
                        <button id="customAlertBtn" style="
                            background: var(--brand, #4f46e5); color: white;
                            border: none; padding: 10px 24px; border-radius: 8px;
                            font-weight: 700; font-size: 1rem; cursor: pointer;
                            transition: background 0.15s; width: 100%;
                        ">موافق</button>
                    `;
                    overlay.appendChild(box);
                    document.body.appendChild(overlay);

                    setTimeout(() => {
                        overlay.style.opacity = '1';
                        box.style.transform = 'scale(1)';
                    }, 10);

                    const btn = box.querySelector('#customAlertBtn');
                    btn.addEventListener('click', () => {
                        overlay.style.opacity = '0';
                        box.style.transform = 'scale(0.9)';
                        setTimeout(() => {
                            document.body.removeChild(overlay);
                            resolve();
                        }, 200);
                    });
                });
            }

            function customConfirm(message, yesLabel = 'نعم', noLabel = 'إلغاء') {
                return new Promise(resolve => {
                    const overlay = document.createElement('div');
                    overlay.style = `
                        position: fixed;
                        top: 0; left: 0; width: 100%; height: 100%;
                        background: rgba(0, 0, 0, 0.6);
                        backdrop-filter: blur(4px);
                        z-index: 100000;
                        display: flex; align-items: center; justify-content: center;
                        opacity: 0; transition: opacity 0.2s ease-out;
                        direction: rtl;
                    `;
                    const box = document.createElement('div');
                    box.style = `
                        background: var(--surface, #ffffff);
                        border-radius: 16px;
                        padding: 24px;
                        width: 90%; max-width: 400px;
                        box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1), 0 10px 10px -5px rgba(0,0,0,0.04);
                        transform: scale(0.9); transition: transform 0.2s ease-out;
                        text-align: center;
                        border: 1px solid var(--border, #e5e7eb);
                    `;
                    box.innerHTML = `
                        <div style="font-size: 2.5rem; color: var(--brand, #4f46e5); margin-bottom: 12px;">
                            <i class="fas fa-question-circle"></i>
                        </div>
                        <h3 style="font-size: 1.1rem; font-weight: 800; color: var(--text, #1f2937); margin-bottom: 20px; line-height: 1.5; text-align: center;">${message}</h3>
                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
                            <button id="customConfirmYes" style="
                                background: var(--brand, #4f46e5); color: white;
                                border: none; padding: 10px 16px; border-radius: 8px;
                                font-weight: 700; font-size: 1rem; cursor: pointer;
                                transition: background 0.15s;
                            ">${yesLabel}</button>
                            <button id="customConfirmNo" style="
                                background: var(--bg, #f3f4f6); color: var(--text-2, #4b5563);
                                border: 1px solid var(--border, #e5e7eb); padding: 10px 16px; border-radius: 8px;
                                font-weight: 700; font-size: 1rem; cursor: pointer;
                                transition: background 0.15s;
                            ">${noLabel}</button>
                        </div>
                    `;
                    overlay.appendChild(box);
                    document.body.appendChild(overlay);

                    setTimeout(() => {
                        overlay.style.opacity = '1';
                        box.style.transform = 'scale(1)';
                    }, 10);

                    const yesBtn = box.querySelector('#customConfirmYes');
                    const noBtn = box.querySelector('#customConfirmNo');

                    const close = (result) => {
                        overlay.style.opacity = '0';
                        box.style.transform = 'scale(0.9)';
                        setTimeout(() => {
                            document.body.removeChild(overlay);
                            resolve(result);
                        }, 200);
                    };

                    yesBtn.addEventListener('click', () => close(true));
                    noBtn.addEventListener('click', () => close(false));
                });
            }

            function openFastCouponScanner() {
                if (currentTrip && currentTrip.id) {
                    window.location.href = `/uncle/trip/fast_scan.php?trip_id=${currentTrip.id}`;
                }
            }
            function openWelcomeScreen() {
                if (currentTrip && currentTrip.id) {
                    window.open(`/uncle/trip/welcome.php?trip_id=${currentTrip.id}`, '_blank');
                }
            }
        </script>
</body>

</html>
