<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>إدارة مسابقة الرحلات</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Essential tokens from dashboard */
        :root {
          --brand:        #5b6cf5;
          --brand-dark:   #4354e8;
          --brand-light:  #a5b0ff;
          --brand-bg:     #eef0ff;
          --danger:       #ef4444;
          --bg:           #f3f4f9;
          --surface:      #ffffff;
          --text:         #1a1d2e;
          --text-2:       #4b5068;
          --text-3:       #8b90a8;
          --border:       rgba(91,108,245,.12);
          --border-solid: #e4e6f0;
          --shadow-sm:    0 2px 8px -2px rgba(0,0,0,.07);
          --shadow-lg:    0 20px 48px -8px rgba(0,0,0,.14);
          --r-md: 14px; --r-lg: 18px; --r-xl: 24px; --r-full: 9999px;
          --t: .22s; --ease: cubic-bezier(.4,0,.2,1); --spring: cubic-bezier(.16,1,.3,1);
        }
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Cairo',sans-serif; }
        body { background:var(--bg); color:var(--text); min-height:100vh; padding-bottom: 80px; }
        
        .topbar { position:sticky; top:0; z-index:300; background:var(--surface); padding:0 16px; height:58px; display:flex; align-items:center; justify-content:space-between; box-shadow:var(--shadow-sm); }
        .topbar-brand { display:flex; align-items:center; gap:10px; text-decoration:none; }
        .topbar-logo { width:36px; height:36px; border-radius:10px; background:var(--brand-bg); display:flex; align-items:center; justify-content:center; color:var(--brand); }
        .topbar-title { font-size:0.95rem; font-weight:800; color:var(--text); }
        .topbar-btn { height:38px; padding:0 12px; border-radius:var(--r-md); display:flex; align-items:center; gap:6px; background:var(--surface); border:1.5px solid var(--border-solid); color:var(--text-2); font-size:0.88rem; font-weight:700; cursor:pointer; text-decoration:none; transition:all var(--t) var(--ease); }
        .topbar-btn:hover { background:var(--brand-bg); color:var(--brand); border-color:var(--brand); }
        
        .page-wrap { max-width:1440px; margin:0 auto; padding:20px; }
        
        /* Grid */
        .classes-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(180px, 1fr)); gap:15px; margin-bottom:24px; }
        .class-card { background:var(--surface); border-radius:var(--r-xl); padding:20px 14px; text-align:center; cursor:pointer; border:1.5px solid var(--border); box-shadow:var(--shadow-sm); transition:all var(--t) var(--spring); position:relative; overflow:hidden; }
        .class-card::before { content:''; position:absolute; top:0; left:0; right:0; height:3px; background:var(--brand); transform:scaleX(0); transform-origin:left; transition:transform .3s var(--spring); }
        .class-card:hover { transform:translateY(-5px) scale(1.01); box-shadow:var(--shadow-lg); border-color:var(--brand); }
        .class-card:hover::before { transform:scaleX(1); }
        .class-icon { width:60px; height:60px; border-radius:var(--r-lg); background:var(--brand-bg); color:var(--brand); display:inline-flex; align-items:center; justify-content:center; font-size:1.5rem; margin-bottom:12px; font-weight:800; transition:all var(--t) var(--spring); }
        .class-card:hover .class-icon { background:var(--brand); color:#fff; transform:rotate(6deg) scale(1.1); }
        .class-name { font-size:.95rem; font-weight:700; color:var(--text); margin-bottom:8px; }
        .class-badge { display:inline-flex; align-items:center; gap:4px; background:var(--brand-bg); color:var(--brand); padding:3px 10px; border-radius:var(--r-full); font-size:.72rem; font-weight:700; }
        
        /* Inner View */
        .view-section { display:none; }
        .view-section.active { display:block; animation:fadeIn 0.3s ease; }
        @keyframes fadeIn { from{opacity:0; transform:translateY(10px);} to{opacity:1; transform:translateY(0);} }
        
        .hero-strip { display:flex; align-items:center; justify-content:space-between; margin-bottom:20px; gap: 10px; flex-wrap: wrap; }
        .hero-greeting { font-size:1.2rem; font-weight:800; }
        
        .filters-bar { display:flex; gap:8px; overflow-x:auto; padding-bottom:10px; margin-bottom:10px; align-items:center; scrollbar-width: none; }
        .filters-bar::-webkit-scrollbar { display:none; }
        .filter-chip { padding:6px 14px; background:var(--surface); border:1px solid var(--border-solid); border-radius:20px; font-size:0.85rem; font-weight:700; cursor:pointer; white-space:nowrap; transition:all 0.2s; color:var(--text-2); }
        .filter-chip.active { background:var(--brand); color:#fff; border-color:var(--brand); }
        
        .reg-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--r-md); margin-bottom:8px; display:flex; align-items:center; gap:10px; padding:10px 12px; transition:all 0.2s; position: relative; }
        .reg-card.naughty { border-color: var(--danger); background: var(--danger-bg); }
        .naughty-badge-sm { background: var(--danger); color: white; font-size: 0.65rem; padding: 2px 6px; border-radius: 4px; font-weight: 800; margin-right: 6px; }
        .reg-card:hover { box-shadow:var(--shadow-sm); border-color:var(--brand); }
        .reg-avatar { width:40px; height:40px; border-radius:50%; background:var(--brand-bg); display:flex; align-items:center; justify-content:center; color:var(--brand); font-weight:800; flex-shrink:0; object-fit:cover; }
        .reg-info { flex:1; min-width:0; }
        .reg-name { font-size:0.9rem; font-weight:800; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
        .reg-meta { font-size:0.75rem; color:var(--text-3); margin-top:3px; display:flex; gap:8px; flex-wrap:wrap; }
        .btn-game { padding:8px 12px; background:var(--brand-bg); color:var(--brand); border-radius:var(--r-md); text-decoration:none; font-weight:700; font-size:0.8rem; display:inline-flex; align-items:center; gap:5px; transition:all 0.2s; }
        .btn-game:hover { background:var(--brand); color:#fff; transform:translateY(-1px); }
        
        /* Print Styles */
        @media screen {
            #printArea { display: none !important; }
        }
        @media print {
            body > *:not(#printArea) { display: none !important; }
            #printArea { display: grid !important; grid-template-columns: repeat(2, 1fr); gap: 20px; align-content: start; position: absolute; top: 0; left: 0; width: 100%; padding: 20px; }
            .print-card { border: 2px dashed #000; padding: 20px; text-align: center; border-radius: 10px; break-inside: avoid; page-break-inside: avoid; display: block !important; }
            .print-card img.qr { width: 150px; height: 150px; margin: 10px auto; display: block !important; }
            .print-card img.avatar { width: 80px; height: 80px; border-radius: 50%; margin: 0 auto 10px; object-fit: cover; display: block !important; }
            .print-card h3 { font-size: 18px; margin-bottom: 5px; color: #000 !important; }
            .print-card p { font-size: 14px; color: #000 !important; margin-bottom: 5px; }
            .print-card .custom-info { font-size: 14px; font-weight: bold; color: #000 !important; }
        }
    </style>
</head>
<body>

<div class="topbar">
    <a href="/uncle/dashboard/" class="topbar-brand">
        <div class="topbar-logo"><i class="fas fa-trophy"></i></div>
        <div class="topbar-title">مسابقات الرحلات</div>
    </a>
</div>

<div class="page-wrap">
    
    <!-- VIEW: TRIP DETAILS -->
    <div id="viewTripDetails" class="view-section active">
        <div class="hero-strip" style="flex-wrap: nowrap; overflow-x: auto;">
            <div style="display:flex;align-items:center;gap:12px;">
                <button class="topbar-btn" onclick="window.location.href='/uncle/dashboard/'" style="border:none;background:var(--border-solid);color:var(--text-2);padding:8px 12px;border-radius:10px;margin:0;"><i class="fas fa-arrow-right"></i> عودة</button>
                <div class="hero-greeting" id="detailTripTitle" style="white-space: nowrap;">الرحلة</div>
            </div>
            <div style="display:flex;align-items:center;gap:10px; margin-right: auto;">
                <button class="topbar-btn" onclick="startScanner()" style="background:var(--success-bg);color:var(--success-dark);border-color:var(--success);margin:0;white-space:nowrap;"><i class="fas fa-camera"></i> مسح QR</button>
            </div>
        </div>
        
        <!-- Main Features: QR Code and Search -->
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:15px;margin-bottom:20px;">
            <!-- QR Code Access -->
            <div class="class-card" style="text-align:center;padding:25px;">
                <div style="width:120px;height:120px;background:#000;border-radius:12px;display:flex;align-items:center;justify-content:center;color:white;font-size:0.8rem;margin:0 auto 15px;" id="tripQRCode">QR Code</div>
                <div style="font-size:1rem;font-weight:800;color:var(--text);margin-bottom:8px;">كود QR للرحلة</div>
                <div style="font-size:0.85rem;color:var(--text-3);">امسح هذا الكود للوصول السريع للأطفال</div>
            </div>
            
            <!-- Search Bar -->
            <div class="class-card" style="padding:25px;">
                <div style="font-size:1rem;font-weight:800;color:var(--text);margin-bottom:15px;text-align:center;">البحث في الأطفال</div>
                <input type="text" id="globalStudentSearch" placeholder="ابحث بالاسم أو البيانات المخصصة..." style="width:100%;padding:12px 16px;border:2px solid var(--border-solid);border-radius:12px;font-size:1rem;background:var(--bg);color:var(--text);transition:all 0.2s;" oninput="filterStudents()">
                <div style="font-size:0.8rem;color:var(--text-3);margin-top:8px;text-align:center;">البحث في جميع الأطفال المسجلين</div>
            </div>
        </div>
        
        <div class="filters-bar" id="customFilters"></div>
        
        <div id="loadingDetails" style="text-align:center;padding:40px;color:var(--text-3);display:none;">
            <i class="fas fa-circle-notch fa-spin fa-2x"></i><br><br>جاري التحميل...
        </div>
        
        <div style="display:grid;grid-template-columns:repeat(auto-fill, minmax(300px, 1fr));gap:10px;" id="kidsGrid"></div>
    </div>
</div>

<div id="printArea"></div>

<!-- Scanner Modal -->
<div id="scannerModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:9999; align-items:center; justify-content:center; flex-direction:column;">
    <div style="background:var(--surface); padding:20px; border-radius:16px; width:90%; max-width:400px; text-align:center;">
        <h3 style="margin-bottom:15px; font-weight: 800;"><i class="fas fa-qrcode"></i> مسح كود المسابقة</h3>
        <div id="reader" style="width:100%; min-height:300px; background:#000; border-radius: 12px; overflow: hidden;"></div>
        <button class="topbar-btn" onclick="stopScanner()" style="margin:20px auto 0; width:100%; justify-content:center; background:var(--danger); color:white; border-color:var(--danger);"><i class="fas fa-times"></i> إلغاء</button>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>

<script>
const API_URL = '/api.php';
let tripsList = [];
let currentTrip = null;
let regsList = [];

document.addEventListener('DOMContentLoaded', () => {
    // Get trip ID from URL parameters
    const urlParams = new URLSearchParams(window.location.search);
    const tripId = urlParams.get('trip_id');
    
    if(tripId) {
        openTrip(tripId);
    } else {
        // If no trip ID, redirect to dashboard
        window.location.href = '/uncle/dashboard/';
    }
});

async function loadTrips() {
    const fd = new FormData();
    fd.append('action', 'getTrips');
    try {
        const res = await fetch(API_URL, {method:'POST', body:fd}).then(r=>r.json());
        if(res.success && res.trips) {
            tripsList = res.trips.filter(t => String(t.has_points_game) === '1');
        }
    } catch(e) {}
}

function showTripsView() {
    // Removed - no longer needed
}

async function openTrip(tripId) {
    document.getElementById('loadingDetails').style.display = 'block';
    document.getElementById('kidsGrid').innerHTML = '';
    document.getElementById('customFilters').innerHTML = '';
    
    const fd = new FormData();
    fd.append('action', 'getTripDetails');
    fd.append('trip_id', tripId);
    
    try {
        const res = await fetch(API_URL, {method:'POST', body:fd}).then(r=>r.json());
        document.getElementById('loadingDetails').style.display = 'none';
        
        if(res.success && res.trip) {
            currentTrip = res.trip;
            regsList = res.trip.registrations || [];
            document.getElementById('detailTripTitle').textContent = currentTrip.title;
            
            // Generate trip QR code
            generateTripQRCode();
            
            buildFilters();
            renderKids();
        } else {
            document.getElementById('kidsGrid').innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--text-3);">لم يتم العثور على الرحلة</div>';
        }
    } catch(e) {
        document.getElementById('loadingDetails').style.display = 'none';
        document.getElementById('kidsGrid').innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--text-3);">حدث خطأ في تحميل البيانات</div>';
    }
}

function generateTripQRCode() {
    const qrContainer = document.getElementById('tripQRCode');
    qrContainer.innerHTML = '';
    
    const link = `${window.location.origin}/uncle/trip/?trip_id=${currentTrip.id}`;
    
    new QRCode(qrContainer, {
        text: link,
        width: 120,
        height: 120,
        colorDark: "#000000",
        colorLight: "#ffffff",
        correctLevel: QRCode.CorrectLevel.H
    });
}

function filterStudents() {
    const searchTerm = document.getElementById('globalStudentSearch').value.toLowerCase().trim();
    
    if(!searchTerm) {
        currentFilter = {key: null, val: null};
        renderKids();
        return;
    }
    
    // Filter students by name, custom data, or church info (for collaborative trips)
    const filtered = regsList.filter(r => {
        const name = r.student_name || '';
        if(name.toLowerCase().includes(searchTerm)) return true;
        
        // Check custom data
        if(r.custom_data) {
            try {
                const cd = JSON.parse(r.custom_data);
                for(const [key, value] of Object.entries(cd)) {
                    if(String(value).toLowerCase().includes(searchTerm)) return true;
                }
            } catch(e) {}
        }
        
        // Check church info for collaborative trips
        if(currentTrip.collaborating_churches) {
            try {
                const collaborators = JSON.parse(currentTrip.collaborating_churches);
                if(collaborators.length > 0) {
                    // Could add church name search here if available
                    if(String(r.church_id || '').includes(searchTerm)) return true;
                }
            } catch(e) {}
        }
        
        return false;
    });
    
    // Temporarily render filtered results
    renderFilteredKids(filtered);
}

function renderFilteredKids(filteredList) {
    const grid = document.getElementById('kidsGrid');
    
    grid.innerHTML = filteredList.map(r => {
        const name = r.student_name || '؟';
        const img = r.student_image || '';
        const init = name.charAt(0);
        let customHtml = '';
        if(r.custom_data) {
            try {
                const cd = JSON.parse(r.custom_data);
                customHtml = Object.entries(cd).map(([k,v]) => `<span style="background:var(--brand-bg);color:var(--brand);padding:2px 6px;border-radius:4px;font-weight:700;"><i class="fas fa-tag"></i> ${v}</span>`).join('');
            } catch(e){}
        }
        
        return `
        <div class="reg-card ${r.is_naughty ? 'naughty' : ''}">
            ${img ? `<img class="reg-avatar" src="${img}" onerror="this.outerHTML='<div class=\\'reg-avatar\\'>${init}</div>'">` : `<div class="reg-avatar">${init}</div>`}
            <div class="reg-info">
                <div class="reg-name">
                    ${name}
                    ${r.is_naughty ? '<span class="naughty-badge-sm">شغب</span>' : ''}
                </div>
                <div class="reg-meta">
                    <span style="color:var(--text-2);"><i class="fas fa-layer-group"></i> ${r.student_class || 'بدون فصل'}</span>
                    <span style="color:var(--success); font-weight:700;"><i class="fas fa-star"></i> ${r.trip_points_val || 0}</span>
                    ${customHtml}
                </div>
            </div>
            <a href="/uncle/trip/points/?trip_id=${currentTrip.id}&student_id=${r.student_id}" class="btn-game"><i class="fas fa-star"></i> نقاط</a>
        </div>
        `;
    }).join('');
    
    if(filteredList.length === 0) {
        grid.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--text-3);border:1px dashed var(--border-solid);border-radius:12px;">لا يوجد أطفال يطابقون البحث</div>`;
    }
}

function buildFilters() {
    const container = document.getElementById('customFilters');
    container.innerHTML = `<div class="filter-chip active" data-filter="all" onclick="setFilter('all', this)">الكل (${regsList.length})</div>`;
    
    if(currentTrip.custom_fields) {
        const fields = currentTrip.custom_fields.split(',').map(f => f.trim()).filter(Boolean);
        
        fields.forEach(field => {
            const valuesCount = {};
            regsList.forEach(r => {
                if(r.custom_data) {
                    try {
                        const cd = JSON.parse(r.custom_data);
                        if(cd[field]) {
                            valuesCount[cd[field]] = (valuesCount[cd[field]]||0)+1;
                        }
                    } catch(e){}
                }
            });
            
            if(Object.keys(valuesCount).length > 0) {
                container.innerHTML += `<div style="width:1px;height:20px;background:var(--border-solid);margin:5px 5px;flex-shrink:0;"></div>`;
                Object.keys(valuesCount).sort().forEach(val => {
                    container.innerHTML += `<div class="filter-chip" data-key="${field}" data-val="${val}" onclick="setFilter(this)">${val} (${valuesCount[val]})</div>`;
                });
            }
        });
    }
}

let currentFilter = {key: null, val: null};

function setFilter(elOrType, el=null) {
    document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
    if(elOrType === 'all') {
        currentFilter = {key: null, val: null};
        el.classList.add('active');
    } else {
        elOrType.classList.add('active');
        currentFilter = {key: elOrType.dataset.key, val: elOrType.dataset.val};
    }
    renderKids();
}

function renderKids() {
    const grid = document.getElementById('kidsGrid');
    
    let filtered = regsList;
    if(currentFilter.key) {
        filtered = regsList.filter(r => {
            if(!r.custom_data) return false;
            try {
                const cd = JSON.parse(r.custom_data);
                return cd[currentFilter.key] === currentFilter.val;
            } catch(e){ return false; }
        });
    }
    
    grid.innerHTML = filtered.map(r => {
        const name = r.student_name || '؟';
        const img = r.student_image || '';
        const init = name.charAt(0);
        let customHtml = '';
        if(r.custom_data) {
            try {
                const cd = JSON.parse(r.custom_data);
                customHtml = Object.entries(cd).map(([k,v]) => `<span style="background:var(--brand-bg);color:var(--brand);padding:2px 6px;border-radius:4px;font-weight:700;"><i class="fas fa-tag"></i> ${v}</span>`).join('');
            } catch(e){}
        }
        
        return `
        <div class="reg-card ${r.is_naughty ? 'naughty' : ''}">
            ${img ? `<img class="reg-avatar" src="${img}" onerror="this.outerHTML='<div class=\\'reg-avatar\\'>${init}</div>'">` : `<div class="reg-avatar">${init}</div>`}
            <div class="reg-info">
                <div class="reg-name">
                    ${name}
                    ${r.is_naughty ? '<span class="naughty-badge-sm">شغب</span>' : ''}
                </div>
                <div class="reg-meta">
                    <span style="color:var(--text-2);"><i class="fas fa-layer-group"></i> ${r.student_class || 'بدون فصل'}</span>
                    <span style="color:var(--success); font-weight:700;"><i class="fas fa-star"></i> ${r.trip_points_val || 0}</span>
                    ${customHtml}
                </div>
            </div>
            <a href="/uncle/trip/points/?trip_id=${currentTrip.id}&student_id=${r.student_id}" class="btn-game"><i class="fas fa-star"></i> نقاط</a>
        </div>
        `;
    }).join('');
    
    if(filtered.length === 0) {
        grid.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--text-3);border:1px dashed var(--border-solid);border-radius:12px;">لا يوجد أطفال يطابقون الفلتر</div>`;
    }
}

function printQRCards() {
    const printArea = document.getElementById('printArea');
    printArea.innerHTML = '';
    
    let filtered = regsList;
    if(currentFilter.key) {
        filtered = regsList.filter(r => {
            if(!r.custom_data) return false;
            try {
                const cd = JSON.parse(r.custom_data);
                return cd[currentFilter.key] === currentFilter.val;
            } catch(e){ return false; }
        });
    }
    
    if(filtered.length === 0) {
        alert('لا يوجد أطفال لطباعة كروت لهم');
        return;
    }
    
    filtered.forEach(r => {
        const name = r.student_name || '؟';
        const img = r.student_image || 'https://via.placeholder.com/80/e0e7ff/4f46e5?text='+name.charAt(0);
        let customHtml = '';
        if(r.custom_data) {
            try {
                const cd = JSON.parse(r.custom_data);
                // Get custom field definitions and icons
                const fieldDefs = currentTrip.custom_fields ? currentTrip.custom_fields.split(',').map(f => f.trim()) : [];
                
                customHtml = Object.entries(cd).map(([key, value]) => {
                    let iconClass = 'fas fa-tag'; // default icon
                    if(currentTrip.custom_field_icons && currentTrip.custom_field_icons[key]) {
                        iconClass = currentTrip.custom_field_icons[key];
                    }
                    return `<i class="${iconClass}"></i> ${value}`;
                }).join(' | ');
            } catch(e){}
        }
        
        const cardId = 'qrcode_' + r.id;
        const link = `${window.location.origin}/uncle/trip/points/?trip_id=${currentTrip.id}&student_id=${r.student_id}`;
        
        printArea.innerHTML += `
        <div class="print-card">
            <h3>${currentTrip.title}</h3>
            <img src="${img}" class="avatar" onerror="this.src='https://via.placeholder.com/80/e0e7ff/4f46e5?text=?'">
            <h2>${name}</h2>
            <div class="custom-info" style="margin-bottom:10px;">${customHtml}</div>
            <div id="${cardId}" style="display:flex;justify-content:center;"></div>
        </div>
        `;
        
        setTimeout(() => {
            new QRCode(document.getElementById(cardId), {
                text: link,
                width: 150,
                height: 150,
                colorDark : "#000000",
                colorLight : "#ffffff",
                correctLevel : QRCode.CorrectLevel.H
            });
        }, 100);
    });
    
    setTimeout(() => {
        window.print();
        // clear print area after print
        setTimeout(() => { printArea.innerHTML = ''; }, 1000);
    }, 1000);
}

// QR Code Scanner Logic
let html5QrcodeScanner = null;

function startScanner() {
    document.getElementById('scannerModal').style.display = 'flex';
    if(!html5QrcodeScanner) {
        html5QrcodeScanner = new Html5Qrcode("reader");
    }
    html5QrcodeScanner.start(
        { facingMode: "environment" },
        { fps: 10, qrbox: {width: 250, height: 250} },
        (decodedText, decodedResult) => {
            // Success
            html5QrcodeScanner.stop().then(() => {
                document.getElementById('scannerModal').style.display = 'none';
                window.location.href = decodedText; // Redirect to the points page
            });
        },
        (errorMessage) => {
            // Ignore parse errors
        }
    ).catch((err) => {
        alert("حدث خطأ في الوصول للكاميرا: " + err);
        stopScanner();
    });
}

function stopScanner() {
    if(html5QrcodeScanner) {
        html5QrcodeScanner.stop().then(() => {
            document.getElementById('scannerModal').style.display = 'none';
        }).catch(e => {
            document.getElementById('scannerModal').style.display = 'none';
        });
    } else {
        document.getElementById('scannerModal').style.display = 'none';
    }
}
</script>
