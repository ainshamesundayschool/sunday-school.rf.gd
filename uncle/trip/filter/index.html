<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="light">

<head>
    <!-- Instant Theme Bootstrap -->
    <script>
        (function () {
            var t = localStorage.getItem('app_theme') || 'light';
            document.documentElement.setAttribute('data-theme', t);

            var phpType = localStorage.getItem('churchType') || 'kids';
            if (phpType === 'youth') {
                var s = document.createElement('style');
                s.id = 'youth-theme-boot';
                s.textContent = ':root{--brand:#7c3aed!important;--brand-dark:#5b21b6!important;--brand-light:#c4b5fd!important;--brand-bg:#ede9fe!important;--brand-glow:rgba(124,58,237,.18)!important;}';
                document.head.appendChild(s);
            }
        })();
    </script>

    <!-- Font Ready Guard -->
    <style id="font-guard">
        body {
            visibility: hidden
        }
    </style>
    <script>
        (function () {
            var show = function () {
                var g = document.getElementById('font-guard');
                if (g) g.remove();
            };
            if (document.fonts && document.fonts.ready) {
                var timer = setTimeout(show, 300);
                document.fonts.ready.then(function () {
                    clearTimeout(timer);
                    show();
                });
            } else {
                setTimeout(show, 50);
            }
        })();
    </script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>أطفال المجموعة</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            /* Brand */
            --brand: #5b6cf5;
            --brand-dark: #4354e8;
            --brand-light: #a5b0ff;
            --brand-bg: #eef0ff;
            --brand-glow: rgba(91, 108, 245, .18);

            /* Semantic */
            --success: #10b981;
            --success-dark: #059669;
            --success-bg: #d1fae5;
            --danger: #ef4444;
            --danger-dark: #dc2626;
            --danger-bg: #fee2e2;
            --warning: #f59e0b;
            --warning-dark: #d97706;
            --warning-bg: #fef3c7;

            /* Surface */
            --bg: #f3f4f9;
            --surface: #ffffff;
            --surface-2: #f7f8fc;
            --surface-3: #eef0f8;
            --border: rgba(91, 108, 245, .12);
            --border-solid: #e4e6f0;
            --text: #1a1d2e;
            --text-2: #4b5068;
            --text-3: #8b90a8;
            --shadow-sm: 0 2px 8px -2px rgba(0, 0, 0, .07);
            --shadow-md: 0 8px 24px -4px rgba(0, 0, 0, .10);
            --shadow-lg: 0 20px 48px -8px rgba(0, 0, 0, .14);
            --shadow-xl: 0 32px 64px -12px rgba(0, 0, 0, .18);

            /* Radius */
            --r-xs: 6px;
            --r-sm: 10px;
            --r-md: 14px;
            --r-lg: 18px;
            --r-xl: 24px;
            --r-2xl: 32px;
            --r-full: 9999px;

            /* Motion */
            --t: .22s;
            --ease: cubic-bezier(.4, 0, .2, 1);
            --spring: cubic-bezier(.16, 1, .3, 1);
        }

        [data-theme="dark"] {
            --bg: #0f1117;
            --surface: #181b26;
            --surface-2: #1e2132;
            --surface-3: #252840;
            --border: rgba(91, 108, 245, .18);
            --border-solid: #2a2d42;
            --text: #e8eaf6;
            --text-2: #9299be;
            --text-3: #565c7a;
            --shadow-sm: 0 2px 8px -2px rgba(0, 0, 0, .4);
            --shadow-md: 0 8px 24px -4px rgba(0, 0, 0, .5);
            --shadow-lg: 0 20px 48px -8px rgba(0, 0, 0, .6);
            --shadow-xl: 0 32px 64px -12px rgba(0, 0, 0, .7);
            --brand-bg: rgba(91, 108, 245, .15);
            --success-bg: rgba(16, 185, 129, .15);
            --danger-bg: rgba(239, 68, 68, .15);
            --warning-bg: rgba(245, 158, 11, .15);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', 'Segoe UI', Tahoma, 'Arabic Typesetting', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            transition: background var(--t) var(--ease), color var(--t) var(--ease);
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background:
                radial-gradient(ellipse 80% 50% at 10% -10%, rgba(91, 108, 245, .07) 0%, transparent 60%),
                radial-gradient(ellipse 60% 40% at 90% 110%, rgba(139, 92, 246, .05) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
        }

        [data-theme="dark"] body::before {
            background:
                radial-gradient(ellipse 80% 50% at 10% -10%, rgba(91, 108, 245, .12) 0%, transparent 60%),
                radial-gradient(ellipse 60% 40% at 90% 110%, rgba(139, 92, 246, .08) 0%, transparent 60%);
        }

        /* TOPBAR */
        .topbar {
            position: sticky;
            top: 0;
            z-index: 300;
            background: var(--bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 0 16px;
            height: 58px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            transition: background var(--t) var(--ease), border-color var(--t) var(--ease);
        }

        .topbar-brand {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            flex-shrink: 0;
        }

        .topbar-logo {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            overflow: hidden;
            background: var(--brand-bg);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--brand);
            flex-shrink: 0;
        }

        .topbar-logo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .topbar-title {
            font-size: 0.95rem;
            font-weight: 800;
            color: var(--text);
        }

        .topbar-actions {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .topbar-btn {
            height: 38px;
            padding: 0 12px;
            border-radius: var(--r-md);
            display: flex;
            align-items: center;
            gap: 6px;
            background: var(--surface);
            border: 1.5px solid var(--border-solid);
            color: var(--text-2);
            font-size: 0.88rem;
            font-weight: 700;
            cursor: pointer;
            text-decoration: none;
            transition: all var(--t) var(--ease);
            flex-shrink: 0;
        }

        .topbar-btn:hover {
            background: var(--brand-bg);
            color: var(--brand);
            border-color: var(--brand);
        }

        /* PAGE */
        .page-wrap {
            max-width: 700px;
            margin: 0 auto;
            padding: 20px 16px;
        }

        .page-header {
            margin-bottom: 20px;
        }

        .page-title {
            font-size: 1.35rem;
            font-weight: 900;
            color: var(--text);
        }

        .page-subtitle {
            font-size: 0.85rem;
            color: var(--text-3);
            margin-top: 4px;
            font-weight: 600;
        }

        /* SCAN BUTTON */
        .scan-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            width: 100%;
            padding: 18px;
            border-radius: var(--r-xl);
            background: var(--success);
            color: white;
            border: none;
            cursor: pointer;
            font-size: 1.1rem;
            font-weight: 900;
            box-shadow: 0 8px 24px rgba(16, 185, 129, 0.3);
            transition: all var(--t) var(--spring);
            margin-bottom: 20px;
            text-decoration: none;
        }

        .scan-btn:hover {
            background: var(--success-dark);
            transform: translateY(-3px);
            box-shadow: 0 12px 30px rgba(16, 185, 129, 0.4);
        }

        .scan-btn:active {
            transform: translateY(-1px);
        }

        /* PRINT BUTTON */
        .print-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            padding: 13px;
            border-radius: var(--r-xl);
            background: var(--brand);
            color: white;
            border: none;
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: 800;
            box-shadow: 0 6px 18px var(--brand-glow);
            transition: all var(--t) var(--spring);
            margin-bottom: 20px;
        }

        .print-btn:hover {
            background: var(--brand-dark);
            transform: translateY(-2px);
        }

        /* KIDS LIST */
        .kids-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .kid-card {
            background: var(--surface);
            border-radius: var(--r-xl);
            padding: 14px 18px;
            display: flex;
            align-items: center;
            gap: 14px;
            cursor: pointer;
            transition: all var(--t) var(--spring);
            border: 1px solid var(--border);
            box-shadow: var(--shadow-sm);
        }

        .kid-card:hover {
            border-color: var(--brand);
            background: var(--brand-bg);
            transform: translateY(-3px) scale(1.01) translateX(-4px);
            box-shadow: var(--shadow-md);
        }

        .kid-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: var(--brand-light);
            color: var(--brand);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            font-weight: 900;
            flex-shrink: 0;
            object-fit: cover;
        }

        .kid-info {
            flex: 1;
            min-width: 0;
        }

        .kid-name {
            font-size: 1rem;
            font-weight: 800;
            color: var(--text);
        }

        .kid-meta {
            font-size: 0.8rem;
            color: var(--text-3);
            margin-top: 2px;
            font-weight: 600;
        }

        .kid-points {
            display: flex;
            align-items: center;
            gap: 5px;
            background: var(--success-bg);
            color: var(--success-dark);
            padding: 5px 12px;
            border-radius: var(--r-full);
            font-size: 0.9rem;
            font-weight: 900;
            flex-shrink: 0;
        }

        .kid-arrow {
            color: var(--text-3);
            font-size: 0.85rem;
            flex-shrink: 0;
        }

        /* EMPTY STATE */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-3);
        }

        .empty-state i {
            font-size: 3rem;
            margin-bottom: 15px;
            display: block;
        }

        .empty-state h3 {
            font-size: 1.1rem;
            font-weight: 800;
            margin-bottom: 8px;
            color: var(--text-2);
        }

        /* LOADING */
        .loading {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-3);
        }

        .loading i {
            font-size: 2rem;
            margin-bottom: 10px;
            display: block;
        }

        /* SCANNER MODAL */
        #scannerModal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            z-index: 9999;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }

        #scannerModal.open {
            display: flex;
        }

        .scanner-box {
            background: var(--surface);
            padding: 24px;
            border-radius: var(--r-xl);
            width: 92%;
            max-width: 420px;
            text-align: center;
        }

        .scanner-box h3 {
            margin-bottom: 15px;
            font-weight: 900;
            font-size: 1.1rem;
        }

        #reader {
            width: 100%;
            min-height: 280px;
            background: #000;
            border-radius: var(--r-lg);
            overflow: hidden;
        }

        .scanner-cancel {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            padding: 12px;
            margin-top: 16px;
            border-radius: var(--r-md);
            background: var(--danger);
            color: white;
            border: none;
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: 800;
        }

        /* PRINT STYLES */
        @media screen {
            #printArea {
                display: none !important;
            }
        }

        @media print {
            body * {
                visibility: hidden !important;
            }
            #printArea, #printArea * {
                visibility: visible !important;
            }
            #printArea {
                position: absolute !important;
                left: 0 !important;
                top: 0 !important;
                width: 100% !important;
                display: grid !important;
                grid-template-columns: repeat(2, 1fr) !important;
                gap: 20px !important;
                padding: 20px !important;
                background: white !important;
            }

            .print-card {
                border: 2px dashed #000;
                padding: 15px;
                text-align: center;
                border-radius: 10px;
                break-inside: avoid;
                page-break-inside: avoid;
                display: flex !important;
                flex-direction: column;
                justify-content: space-between;
                align-items: center;
                width: 260px;
                height: 360px;
                margin: 0 auto;
                box-sizing: border-box;
                background: #fff;
            }

            .print-card img.avatar {
                width: 70px;
                height: 70px;
                border-radius: 50%;
                margin: 0;
                object-fit: cover;
                display: block !important;
            }

            .print-card h3 {
                font-size: 13px;
                font-weight: 700;
                margin: 0;
                color: #000 !important;
                overflow: hidden;
                text-overflow: ellipsis;
                white-space: nowrap;
                width: 100%;
            }

            .print-card h2 {
                font-size: 18px;
                font-weight: 800;
                margin: 0;
                color: #000 !important;
                overflow: hidden;
                text-overflow: ellipsis;
                white-space: nowrap;
                width: 100%;
            }

            .print-card .custom-info {
                font-size: 11px;
                font-weight: bold;
                color: #000 !important;
                margin: 0;
                display: flex;
                flex-wrap: wrap;
                justify-content: center;
                gap: 6px;
                width: 100%;
            }

            .print-card div[id^="qr_"] {
                width: 130px;
                height: 130px;
                display: flex !important;
                justify-content: center;
                align-items: center;
                margin: 0 auto;
            }

            .print-card div[id^="qr_"] canvas {
                display: none !important;
            }

            .print-card div[id^="qr_"] img {
                width: 130px !important;
                height: 130px !important;
                display: block !important;
                margin: 0 auto;
            }
        }
    </style>
</head>

<body>

    <div class="topbar">
        <a href="javascript:history.back()" class="topbar-btn" id="backBtn">
            <i class="fas fa-arrow-right"></i> عودة
        </a>
        <a href="/uncle/dashboard/" class="topbar-brand">
            <div class="topbar-logo"><img src="/logo.png" onerror="this.outerHTML='<i class=\'fas fa-cross\'></i>'">
            </div>
        </a>
        <div class="topbar-actions">
            <button class="topbar-btn" id="printBtn" onclick="printFilterQRCards()"
                style="display:none; background:var(--brand); color:white; border-color:var(--brand);"
                title="طباعة الكروت">
                <i class="fas fa-print"></i>
            </button>
            <button class="topbar-btn" id="scanBtn" onclick="startScanner()" title="مسح QR" style="width: 38px; height: 38px; padding: 0; display: inline-flex; align-items: center; justify-content: center;">
                <span class="fa-stack" style="font-size: 0.85rem; width: 1.5em; height: 1.5em; line-height: 1.5em; display: inline-flex; align-items: center; justify-content: center; margin: 0;">
                    <i class="fas fa-expand fa-stack-2x" style="font-size: 1.3rem;"></i>
                    <i class="fas fa-qrcode fa-stack-1x" style="font-size: 0.75rem;"></i>
                </span>
            </button>
        </div>
    </div>

    <div class="page-wrap">
        <div class="page-header">
            <div class="page-title" id="filterLabel">جاري التحميل...</div>
            <div class="page-subtitle" id="kidsCountLabel"></div>
        </div>

        <div id="loadingState" class="loading">
            <i class="fas fa-circle-notch fa-spin"></i>
            جاري التحميل...
        </div>

        <div class="kids-list" id="kidsList"></div>
    </div>

    <div id="printArea"></div>

    <!-- Scanner Modal -->
    <div id="scannerModal">
        <div class="scanner-box">
            <h3><i class="fas fa-qrcode"></i> مسح كود المسابقة</h3>
            <div id="reader"></div>
            <button class="scanner-cancel" onclick="stopScanner()">
                <i class="fas fa-times"></i> إلغاء
            </button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <script>
        const API_URL = '/api.php';

        const params = new URLSearchParams(window.location.search);
        const tripId = params.get('trip_id');
        const field = params.get('field');   // custom field name, e.g. "الفريق"
        const value = params.get('value');   // e.g. "أحمر"  (empty = show all)

        let currentTrip = null;
        let filteredKids = [];
        let html5QrcodeScanner = null;

        // ── INIT ─────────────────────────────────────────────────────────────────────
        document.addEventListener('DOMContentLoaded', () => {
            if (!tripId) { window.location.href = '/uncle/church/'; return; }

            const label = value
                ? (field === '__class__' ? `فصل: ${value}` : `${field.replace(/.*__sf__/, '')}: ${value}`)
                : (field ? field.replace(/.*__sf__/, '') : 'جميع الأطفال');

            document.getElementById('filterLabel').textContent = label;
            document.title = label;

            loadTrip();
        });

        async function loadTrip() {
            document.getElementById('loadingState').style.display = 'block';
            const fd = new FormData();
            fd.append('action', 'getTripDetails');
            fd.append('trip_id', tripId);

            try {
                const res = await fetch(API_URL, { method: 'POST', body: fd }).then(r => r.json());
                document.getElementById('loadingState').style.display = 'none';

                if (!res.success || !res.trip) {
                    document.getElementById('kidsList').innerHTML = '<div class="empty-state"><i class="fas fa-exclamation-circle"></i><h3>لم يتم العثور على الرحلة</h3></div>';
                    return;
                }

                currentTrip = res.trip;

                // Admin & Developer check for print button
                if (['admin', 'developer', 'dev'].includes(res.user_role)) {
                    const pBtn = document.getElementById('printBtn');
                    if (pBtn) pBtn.style.display = 'flex';
                }

                const regs = res.trip.registrations || [];

                const decodedField = field || null;
                const decodedValue = (value !== null && value !== undefined) ? value : null;

                // Filter kids
                if (decodedField && decodedValue !== null && decodedValue !== '') {
                    filteredKids = regs.filter(r => {
                        // Virtual field: filter by student class
                        if (decodedField === '__class__') {
                            return (r.student_class || 'بدون فصل') === decodedValue;
                        }
                        // Kids with no custom_data at all count as "بدون تحديد" for every field
                        if (!r.custom_data) {
                            return decodedValue === 'بدون تحديد';
                        }
                        try {
                            const cd = JSON.parse(r.custom_data);
                            const kidValue = cd[decodedField];
                            // No value set for this field → also "بدون تحديد"
                            if (kidValue === undefined || kidValue === null || kidValue === '') {
                                return decodedValue === 'بدون تحديد';
                            }
                            return kidValue === decodedValue;
                        } catch (e) {
                            return decodedValue === 'بدون تحديد';
                        }
                    });
                } else {
                    filteredKids = regs;
                }

                document.getElementById('kidsCountLabel').textContent = `${filteredKids.length} طفل`;

                // Render kids
                renderKids();
            } catch (e) {
                console.error("LoadTrip Error:", e);
                document.getElementById('loadingState').style.display = 'none';
                document.getElementById('kidsList').innerHTML = `<div class="empty-state"><i class="fas fa-wifi-slash"></i><h3>خطأ في الاتصال</h3><p style="font-size:0.8rem; margin-top:5px;">${e.message}</p></div>`;
            }
        }

        function renderKids() {
            const list = document.getElementById('kidsList');

            if (filteredKids.length === 0) {
                list.innerHTML = '<div class="empty-state"><i class="fas fa-user-slash"></i><h3>لا يوجد أطفال في هذه المجموعة</h3></div>';
                return;
            }

            list.innerHTML = filteredKids.map(k => {
                const name = k.student_name || '؟';
                const img = k.student_image || '';
                const init = name.charAt(0);
                const points = k.trip_points_val || 0;
                const icons = currentTrip?.custom_field_icons || {};

                let metaParts = [];
                // Always show the student's class first
                if (k.student_class) {
                    metaParts.push(`<i class="fas fa-layer-group" style="margin-left:4px;"></i>${k.student_class}`);
                }
                if (k.custom_data) {
                    try {
                        const cd = JSON.parse(k.custom_data);
                        Object.entries(cd).forEach(([fk, fv]) => {
                            let iconClass = '';
                            let displayName = fk;
                            
                            if (fk.includes('__sf__')) {
                                const parts = fk.split('__sf__');
                                const parentField = parts[0];
                                const subName = parts[1];
                                displayName = subName;
                                
                                const parentChoice = cd[parentField];
                                if (parentChoice && icons[parentField]?.sub_fields?.[parentChoice]) {
                                    const sfMeta = icons[parentField].sub_fields[parentChoice].find(x => x.name === subName);
                                    if (sfMeta) iconClass = sfMeta.icon;
                                }
                            } else {
                                const meta = icons[fk] || {};
                                iconClass = typeof meta === 'string' ? meta : (meta.icon || '');
                            }

                            const ic = iconClass ? `<i class="${iconClass}" style="margin-left:4px;"></i>` : '';
                            metaParts.push(`${ic}${displayName}: ${fv}`);
                        });
                    } catch (e) { }
                }

                const avatar = img
                    ? `<img class="kid-avatar" src="${img}" onerror="this.outerHTML='<div class=\\'kid-avatar\\'>${init}</div>'">`
                    : `<div class="kid-avatar">${init}</div>`;

                return `
        <div class="kid-card" onclick="openKidPoints('${k.student_id}')">
            ${avatar}
            <div class="kid-info">
                <div class="kid-name">${name}</div>
                ${metaParts.length ? `<div class="kid-meta">${metaParts.join(' · ')}</div>` : ''}
            </div>
            <div class="kid-points">⭐ ${points}</div>
            <i class="fas fa-chevron-left kid-arrow"></i>
        </div>`;
            }).join('');
        }

        function openKidPoints(studentId) {
            window.location.href = `/uncle/trip/points/?trip_id=${tripId}&student_id=${studentId}`;
        }

        // ── SCANNER ──────────────────────────────────────────────────────────────────
        function startScanner() {
            document.getElementById('scannerModal').classList.add('open');
            if (!html5QrcodeScanner) {
                html5QrcodeScanner = new Html5Qrcode('reader');
            }
            html5QrcodeScanner.start(
                { facingMode: 'environment' },
                { fps: 10, qrbox: { width: 240, height: 240 } },
                async (decodedText) => {
                    html5QrcodeScanner.stop().then(async () => {
                        document.getElementById('scannerModal').classList.remove('open');
                        
                        let parsedUrl;
                        try {
                            parsedUrl = new URL(decodedText);
                        } catch (e) {
                            await customAlert('الكود الممسوح غير صحيح');
                            return;
                        }
                        const scannedTripId = parsedUrl.searchParams.get('trip_id');
                        const scannedStudentId = parsedUrl.searchParams.get('student_id');
                        
                        if (!scannedTripId || !scannedStudentId) {
                            await customAlert('الكود الممسوح غير صحيح');
                            return;
                        }

                        if (currentTrip && String(scannedTripId) === String(currentTrip.id)) {
                            // Same trip - navigate directly
                            window.location.href = decodedText;
                            return;
                        }

                        // Different trip - check church
                        const fd = new FormData();
                        fd.append('action', 'getTripDetails');
                        fd.append('trip_id', scannedTripId);
                        
                        try {
                            const res = await fetch(API_URL, { method: 'POST', body: fd }).then(r => r.json());
                            const currentChurchId = currentTrip ? currentTrip.church_id : null;
                            if (res.success && res.trip && currentChurchId && String(res.trip.church_id) === String(currentChurchId)) {
                                // Same church, different trip -> Ask to redirect
                                if (await customConfirm(`هذا الكود يخص رحلة أخرى ("${res.trip.title}") لنفس الكنيسة. هل تريد الانتقال إليها لتسجيل النقاط؟`, 'نعم، انتقال', 'إلغاء')) {
                                    window.location.href = decodedText;
                                }
                            } else {
                                // Different church or unauthorized -> Block and alert
                                await customAlert('عذراً، هذا الكود يخص رحلة لكنيسة أخرى ولا يمكن تشغيله في كنيستك.');
                            }
                        } catch (err) {
                            await customAlert('عذراً، هذا الكود يخص رحلة لكنيسة أخرى ولا يمكن تشغيله في كنيستك.');
                        }
                    });
                },
                () => { }
            ).catch(async (err) => {
                await customAlert('حدث خطأ في الوصول للكاميرا: ' + err);
                stopScanner();
            });
        }

        function stopScanner() {
            if (html5QrcodeScanner) {
                html5QrcodeScanner.stop().then(() => {
                    document.getElementById('scannerModal').classList.remove('open');
                }).catch(() => {
                    document.getElementById('scannerModal').classList.remove('open');
                });
            } else {
                document.getElementById('scannerModal').classList.remove('open');
            }
        }

        // ── PRINT QR ─────────────────────────────────────────────────────────────────
        function printFilterQRCards() {
            if (!filteredKids.length) { alert('لا يوجد أطفال لطباعة كروت لهم'); return; }

            const printArea = document.getElementById('printArea');
            printArea.innerHTML = '';

            const churchName = localStorage.getItem('churchName') || localStorage.getItem('uncle_church_name') || 'مدارس الأحد';

            filteredKids.forEach(r => {
                const name = r.student_name || '؟';
                const imgUrl = r.student_image || '';
                const hasImage = imgUrl.trim() !== '' && !imgUrl.includes('placeholder.com') && !imgUrl.includes('via.placeholder');
                const cardId = 'qr_' + r.id;
                const link = `${window.location.origin}/uncle/trip/points/?trip_id=${tripId}&student_id=${r.student_id}`;
                let customHtml = '';
                if (r.custom_data) {
                    try {
                        const cd = JSON.parse(r.custom_data);
                        const icons = currentTrip?.custom_field_icons || {};
                        customHtml = Object.entries(cd).map(([k, v]) => {
                            const meta = icons[k] ? icons[k] : null;
                            const iconClass = meta ? (typeof meta === 'string' ? meta : (meta.icon || '')) : '';
                            const ic = iconClass ? `<i class="${iconClass}"></i> ` : '';
                            return `${ic}${k}: ${v}`;
                        }).join(' &nbsp;|&nbsp; ');
                    } catch (e) { }
                }

                const avatarHtml = hasImage 
                    ? `<img src="${imgUrl}" class="avatar" onerror="this.style.display='none'">` 
                    : '';

                printArea.innerHTML += `
        <div class="print-card">
            <div class="print-card-header" style="display:flex; align-items:center; justify-content:center; gap:6px; border-bottom:1px solid #000; padding-bottom:4px; width:100%; flex-wrap:wrap;">
                <img src="/logo.png" style="height:20px; width:auto; object-fit:contain; flex-shrink:0;" onerror="this.style.display='none'">
                <span style="font-size:11px; font-weight:800; color:#000; text-align:center; line-height:1.2; word-break:break-word;">${churchName}</span>
            </div>
            <h3>${currentTrip?.title || ''}</h3>
            ${avatarHtml}
            <h2>${name}</h2>
            <div class="custom-info">${customHtml}</div>
            <div id="${cardId}"></div>
        </div>`;

                setTimeout(() => {
                    new QRCode(document.getElementById(cardId), {
                        text: link, width: 130, height: 130,
                        colorDark: '#000000', colorLight: '#ffffff',
                        correctLevel: QRCode.CorrectLevel.H
                    });
                }, 100);
            });

            // Give QR library a bit more time to render before printing
            setTimeout(() => {
                window.print();
                setTimeout(() => { printArea.innerHTML = ''; }, 1500);
            }, 1500);
        }

        function customAlert(message) {
            return new Promise(resolve => {
                const overlay = document.createElement('div');
                overlay.style = `
                    position: fixed;
                    top: 0; left: 0; width: 100%; height: 100%;
                    background: rgba(0, 0, 0, 0.6);
                    backdrop-filter: blur(4px);
                    z-index: 100000;
                    display: flex; align-items: center; justify-content: center;
                    opacity: 0; transition: opacity 0.2s ease-out;
                    direction: rtl;
                `;
                const box = document.createElement('div');
                box.style = `
                    background: var(--surface, #ffffff);
                    border-radius: 16px;
                    padding: 24px;
                    width: 90%; max-width: 400px;
                    box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1), 0 10px 10px -5px rgba(0,0,0,0.04);
                    transform: scale(0.9); transition: transform 0.2s ease-out;
                    text-align: center;
                    border: 1px solid var(--border, #e5e7eb);
                `;
                box.innerHTML = `
                    <div style="font-size: 2.5rem; color: var(--danger, #ef4444); margin-bottom: 12px;">
                        <i class="fas fa-exclamation-circle"></i>
                    </div>
                    <h3 style="font-size: 1.1rem; font-weight: 800; color: var(--text, #1f2937); margin-bottom: 16px; line-height: 1.5; text-align: center;">${message}</h3>
                    <button id="customAlertBtn" style="
                        background: var(--brand, #4f46e5); color: white;
                        border: none; padding: 10px 24px; border-radius: 8px;
                        font-weight: 700; font-size: 1rem; cursor: pointer;
                        transition: background 0.15s; width: 100%;
                    ">موافق</button>
                `;
                overlay.appendChild(box);
                document.body.appendChild(overlay);

                setTimeout(() => {
                    overlay.style.opacity = '1';
                    box.style.transform = 'scale(1)';
                }, 10);

                const btn = box.querySelector('#customAlertBtn');
                btn.addEventListener('click', () => {
                    overlay.style.opacity = '0';
                    box.style.transform = 'scale(0.9)';
                    setTimeout(() => {
                        document.body.removeChild(overlay);
                        resolve();
                    }, 200);
                });
            });
        }

        function customConfirm(message, yesLabel = 'نعم', noLabel = 'إلغاء') {
            return new Promise(resolve => {
                const overlay = document.createElement('div');
                overlay.style = `
                    position: fixed;
                    top: 0; left: 0; width: 100%; height: 100%;
                    background: rgba(0, 0, 0, 0.6);
                    backdrop-filter: blur(4px);
                    z-index: 100000;
                    display: flex; align-items: center; justify-content: center;
                    opacity: 0; transition: opacity 0.2s ease-out;
                    direction: rtl;
                `;
                const box = document.createElement('div');
                box.style = `
                    background: var(--surface, #ffffff);
                    border-radius: 16px;
                    padding: 24px;
                    width: 90%; max-width: 400px;
                    box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1), 0 10px 10px -5px rgba(0,0,0,0.04);
                    transform: scale(0.9); transition: transform 0.2s ease-out;
                    text-align: center;
                    border: 1px solid var(--border, #e5e7eb);
                `;
                box.innerHTML = `
                    <div style="font-size: 2.5rem; color: var(--brand, #4f46e5); margin-bottom: 12px;">
                        <i class="fas fa-question-circle"></i>
                    </div>
                    <h3 style="font-size: 1.1rem; font-weight: 800; color: var(--text, #1f2937); margin-bottom: 20px; line-height: 1.5; text-align: center;">${message}</h3>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
                        <button id="customConfirmYes" style="
                            background: var(--brand, #4f46e5); color: white;
                            border: none; padding: 10px 16px; border-radius: 8px;
                            font-weight: 700; font-size: 1rem; cursor: pointer;
                            transition: background 0.15s;
                        ">${yesLabel}</button>
                        <button id="customConfirmNo" style="
                            background: var(--bg, #f3f4f6); color: var(--text-2, #4b5563);
                            border: 1px solid var(--border, #e5e7eb); padding: 10px 16px; border-radius: 8px;
                            font-weight: 700; font-size: 1rem; cursor: pointer;
                            transition: background 0.15s;
                        ">${noLabel}</button>
                    </div>
                `;
                overlay.appendChild(box);
                document.body.appendChild(overlay);

                setTimeout(() => {
                    overlay.style.opacity = '1';
                    box.style.transform = 'scale(1)';
                }, 10);

                const yesBtn = box.querySelector('#customConfirmYes');
                const noBtn = box.querySelector('#customConfirmNo');

                const close = (result) => {
                    overlay.style.opacity = '0';
                    box.style.transform = 'scale(0.9)';
                    setTimeout(() => {
                        document.body.removeChild(overlay);
                        resolve(result);
                    }, 200);
                };

                yesBtn.addEventListener('click', () => close(true));
                noBtn.addEventListener('click', () => close(false));
            });
        }
    </script>
</body>

</html>
