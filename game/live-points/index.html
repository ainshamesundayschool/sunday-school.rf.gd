<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Leaderboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Almarai:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #4361ee;
            --primary-dark: #3a56d4;
            --secondary: #3f37c9;
            --accent: #4895ef;
            --success: #4cc9f0;
            --danger: #f72585;
            --warning: #f8961e;
            --light: #f8f9fa;
            --dark: #212529;
            --gray: #6c757d;
            --white: #ffffff;
        }
        
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        body {
            font-family: 'Almarai', sans-serif;
            background-color: #f0f2f5;
            color: var(--dark);
            line-height: 1.6;
            padding: 0;
            min-height: 100vh;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }
        
        header {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px 0;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            box-shadow: 0 5px 15px rgba(67, 97, 238, 0.3);
        }
        
        h1 {
            font-size: 2rem;
            margin-bottom: 10px;
        }
        
        .leaderboard {
            background-color: white;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }
        
        .leaderboard-header {
            display: flex;
            background: linear-gradient(to right, var(--primary), var(--accent));
            color: white;
            padding: 15px 20px;
            font-weight: 600;
        }
        
        .leaderboard-header div {
            flex: 1;
            text-align: center;
        }
        
        .leaderboard-header div:first-child {
            flex: 0.5;
            text-align: left;
        }
        
        .leaderboard-header div:last-child {
            flex: 0.8;
        }
        
        .participant-row {
            display: flex;
            padding: 15px 20px;
            align-items: center;
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        
        .participant-row:last-child {
            border-bottom: none;
        }
        
        .participant-row.new-entry {
            animation: highlight 2s ease-out;
        }
        
        .participant-row.position-up {
            animation: moveUp 0.5s ease-out;
        }
        
        .participant-row.position-down {
            animation: moveDown 0.5s ease-out;
        }
        
        .participant-row .rank {
            flex: 0.5;
            font-weight: 700;
            font-size: 1.2rem;
            color: var(--primary);
        }
        
        .participant-row .rank-1 {
            color: gold;
            text-shadow: 0 0 3px rgba(0, 0, 0, 0.3);
        }
        
        .participant-row .rank-2 {
            color: silver;
            text-shadow: 0 0 3px rgba(0, 0, 0, 0.3);
        }
        
        .participant-row .rank-3 {
            color: #cd7f32; /* bronze */
            text-shadow: 0 0 3px rgba(0, 0, 0, 0.3);
        }
        
        .participant-row .name {
            flex: 1;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .participant-row .points {
            flex: 0.8;
            text-align: center;
            font-weight: 700;
            color: var(--primary);
        }
        
        .participant-row .change {
            width: 30px;
            text-align: center;
            margin-left: 10px;
            font-weight: 600;
            opacity: 0;
            transition: opacity 0.3s;
        }
        
        .participant-row .change.positive {
            color: var(--success);
            opacity: 1;
        }
        
        .participant-row .change.negative {
            color: var(--danger);
            opacity: 1;
        }
        
        .loading {
            text-align: center;
            padding: 30px;
        }
        
        .loading-spinner {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 4px solid rgba(67, 97, 238, 0.1);
            border-radius: 50%;
            border-top-color: var(--primary);
            animation: spin 1s ease-in-out infinite;
            margin-bottom: 15px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        @keyframes highlight {
            0% { background-color: rgba(72, 149, 239, 0.3); }
            100% { background-color: transparent; }
        }
        
        @keyframes moveUp {
            0% { transform: translateY(20px); opacity: 0; }
            100% { transform: translateY(0); opacity: 1; }
        }
        
        @keyframes moveDown {
            0% { transform: translateY(-20px); opacity: 0; }
            100% { transform: translateY(0); opacity: 1; }
        }
        
        .podium {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            height: 200px;
            margin-bottom: 30px;
            gap: 20px;
            transition: all 0.3s ease;
        }
        
        .podium.hidden {
            display: none;
        }
        
        .podium-step {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100px;
            position: relative;
            border-radius: 8px 8px 0 0;
            background: linear-gradient(to bottom, var(--primary), var(--accent));
            color: white;
            padding: 10px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }
        
        .podium-step-1 {
            height: 180px;
            background: linear-gradient(to bottom, gold, #ffd700);
        }
        
        .podium-step-2 {
            height: 140px;
            background: linear-gradient(to bottom, silver, #c0c0c0);
        }
        
        .podium-step-3 {
            height: 100px;
            background: linear-gradient(to bottom, #cd7f32, #b87333);
        }
        
        .podium-name {
            font-weight: 600;
            margin-bottom: 5px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            width: 100%;
            text-align: center;
        }
        
        .podium-points {
            font-size: 1.2rem;
            font-weight: 700;
        }
        
        /* Floating controls */
        .floating-controls {
            position: fixed;
            bottom: 30px;
            right: 30px;
            display: flex;
            flex-direction: row-reverse;
            gap: 15px;
            align-items: flex-end;
            z-index: 100;
        }
        
        .control-btn {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background-color: var(--primary);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 5px 15px rgba(67, 97, 238, 0.4);
            cursor: pointer;
            transition: all 0.3s ease;
            border: none;
            font-size: 1.2rem;
        }
        
        .control-btn:hover {
            background-color: var(--primary-dark);
        }
        
        .control-btn.active {
            background-color: var(--primary-dark);
        }
        
        .control-btn .fa-expand {
            font-size: 1.1rem;
        }
        
        .control-btn .fa-compress {
            font-size: 1.1rem;
        }
        
        .control-btn .fa-trophy {
            font-size: 1.1rem;
        }
        
        .control-btn .fa-list-ol {
            font-size: 1.1rem;
        }
        
        .control-btn .fa-sync-alt {
            font-size: 1.2rem;
        }
        
        .control-btn .fa-toggle-on {
            font-size: 1.2rem;
        }
        
        .control-btn .fa-toggle-off {
            font-size: 1.2rem;
        }
        
        /* Fullscreen styles */
        body.fullscreen {
            overflow: hidden;
        }
        
        body.fullscreen .container {
            max-width: 100%;
            padding: 0;
        }
        
        body.fullscreen header {
            display: none;
        }
        
        body.fullscreen .leaderboard {
            border-radius: 0;
            height: 100vh;
            box-shadow: none;
        }
        
        body.fullscreen .leaderboard-header {
            padding: 25px 20px;
            font-size: 1.2rem;
        }
        
        body.fullscreen .participant-row {
            padding: 20px;
            font-size: 1.1rem;
        }
           body.fullscreen .floating-controls {
           display: none;
        }
        @media (max-width: 600px) {
            .container {
                padding: 10px;
            }
            
            .podium {
                height: 150px;
            }
            
            .podium-step {
                width: 80px;
            }
            
            .podium-step-1 {
                height: 140px;
            }
            
            .podium-step-2 {
                height: 110px;
            }
            
            .podium-step-3 {
                height: 80px;
            }
            
            .leaderboard-header div:first-child {
                flex: 0.3;
            }
            
            .leaderboard-header div:last-child {
                flex: 0.6;
            }
            
            .participant-row .rank {
                flex: 0.3;
            }
            
            .participant-row .points {
                flex: 0.6;
            }
            
            .floating-controls {
                bottom: 15px;
                right: 15px;
                gap: 10px;
            }
            
            .control-btn {
                width: 50px;
                height: 50px;
                font-size: 1rem;
            }
        }
        button.filter-option {
    border: none;
    padding: 10px 30px;
    border-radius: 5px;
    background-color: #4361ee;
    color: #fff;
}
    </style>
</head>
<body>
    <header>
        <h1>Live Leaderboard</h1>
        <p>Top participants by points</p>
    </header>
    
    <div class="container">
        <div class="podium hidden" id="podium">
            <!-- Podium will be populated by JavaScript -->
        </div>
        
        <div class="leaderboard">
            <div class="leaderboard-header">
                <div>#</div>
                <div>Participant</div>
                <div>Points</div>
                <div>Change</div>
            </div>
            
            <div class="leaderboard-body" id="leaderboard-body">
                <div class="loading">
                    <div class="loading-spinner"></div>
                    <p>Loading leaderboard...</p>
                </div>
            </div>
        </div>
    </div>
    
    <div class="floating-controls">
        <button class="control-btn" id="filter-btn" title="Filter">
            <i class="fas fa-list-ol"></i>
        </button>
        
        <button class="control-btn" id="podium-btn" title="Toggle Podium">
            <i class="fas fa-trophy"></i>
        </button>
        
        <button class="control-btn" id="auto-refresh-btn" title="Auto Refresh">
            <i class="fas fa-toggle-on"></i>
        </button>
        
        <button class="control-btn" id="fullscreen-btn" title="Fullscreen">
            <i class="fas fa-expand"></i>
        </button>
        
        <button class="control-btn" id="refresh-btn" title="Refresh">
            <i class="fas fa-sync-alt"></i>
        </button>
    </div>
    
    <!-- Filter dropdown -->
    <div class="filter-dropdown" id="filter-dropdown" style="display: none; position: fixed; bottom: 100px; right: 30px; background: white; border-radius: 10px; padding: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.2); z-index: 99;">
        <div style="display: flex; flex-direction: column; gap: 8px;">
            <button class="filter-option active" data-count="3">Top 3</button>
            <button class="filter-option" data-count="5">Top 5</button>
            <button class="filter-option" data-count="10">Top 10</button>
            <button class="filter-option" data-count="all">All</button>
        </div>
    </div>
    
    <script>
        // Configuration
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwOkGeV4XJncU-qBj_Ld8zYJorZjFN0RVy_mSl85qcmfewV-L9xQxdV0SO0YAT3j6JL1w/exec';
        const REFRESH_INTERVAL = 1000; // 1 second
        let currentData = [];
        let currentCount = 3;
        let autoRefreshEnabled = true;
        let refreshInterval;
        let podiumVisible = false;
        let filterDropdownVisible = false;
        
        document.addEventListener('DOMContentLoaded', function() {
            // Set up event listeners
            document.querySelectorAll('.filter-option').forEach(btn => {
                btn.addEventListener('click', function() {
                    document.querySelectorAll('.filter-option').forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    
                    if (this.dataset.count === 'all') {
                        currentCount = Infinity;
                    } else {
                        currentCount = parseInt(this.dataset.count);
                    }
                    
                    updateLeaderboard();
                    toggleFilterDropdown();
                });
            });
            
            document.getElementById('refresh-btn').addEventListener('click', function() {
                // Add rotation animation
                this.style.transform = 'rotate(360deg)';
                setTimeout(() => {
                    this.style.transform = 'rotate(0)';
                }, 500);
                
                fetchData();
            });
            
            document.getElementById('auto-refresh-btn').addEventListener('click', function() {
                autoRefreshEnabled = !autoRefreshEnabled;
                if (autoRefreshEnabled) {
                    this.innerHTML = '<i class="fas fa-toggle-on"></i>';
                    startAutoRefresh();
                } else {
                    this.innerHTML = '<i class="fas fa-toggle-off"></i>';
                    clearInterval(refreshInterval);
                }
            });
            
            // Podium toggle button
            document.getElementById('podium-btn').addEventListener('click', function() {
                podiumVisible = !podiumVisible;
                const podium = document.getElementById('podium');
                if (podiumVisible) {
                    podium.classList.remove('hidden');
                    this.classList.add('active');
                } else {
                    podium.classList.add('hidden');
                    this.classList.remove('active');
                }
                updateLeaderboard();
            });
            
            // Filter dropdown button
            document.getElementById('filter-btn').addEventListener('click', toggleFilterDropdown);
            
            // Fullscreen button
            document.getElementById('fullscreen-btn').addEventListener('click', function() {
                if (!document.fullscreenElement) {
                    document.documentElement.requestFullscreen();
                    document.body.classList.add('fullscreen');
                    this.innerHTML = '<i class="fas fa-compress"></i>';
                } else {
                    if (document.exitFullscreen) {
                        document.exitFullscreen();
                        document.body.classList.remove('fullscreen');
                        this.innerHTML = '<i class="fas fa-expand"></i>';
                    }
                }
            });
            
            // Handle fullscreen change events
            document.addEventListener('fullscreenchange', function() {
                const fsBtn = document.getElementById('fullscreen-btn');
                if (!document.fullscreenElement) {
                    document.body.classList.remove('fullscreen');
                    fsBtn.innerHTML = '<i class="fas fa-expand"></i>';
                }
            });
            
            // Close dropdown when clicking outside
            document.addEventListener('click', function(event) {
                if (filterDropdownVisible && 
                    !event.target.closest('#filter-dropdown') && 
                    !event.target.closest('#filter-btn')) {
                    toggleFilterDropdown();
                }
            });
            
            // Initial data load
            fetchData();
            startAutoRefresh();
        });
        
        function toggleFilterDropdown() {
            filterDropdownVisible = !filterDropdownVisible;
            const dropdown = document.getElementById('filter-dropdown');
            if (filterDropdownVisible) {
                dropdown.style.display = 'block';
                document.getElementById('filter-btn').classList.add('active');
            } else {
                dropdown.style.display = 'none';
                document.getElementById('filter-btn').classList.remove('active');
            }
        }
        
        function startAutoRefresh() {
            clearInterval(refreshInterval); // Clear any existing interval
            if (autoRefreshEnabled) {
                refreshInterval = setInterval(fetchData, REFRESH_INTERVAL);
            }
        }
        
        function fetchData() {
            fetch(`${SCRIPT_URL}?action=getLeaderboard`)
                .then(response => response.json())
                .then(data => {
                    if (data.error) {
                        throw new Error(data.error);
                    }
                    
                    // Check for changes and apply animations
                    const oldData = currentData;
                    currentData = data;
                    
                    // Find new entries and position changes
                    const newEntries = [];
                    const positionChanges = {};
                    
                    currentData.forEach((participant, index) => {
                        const oldParticipant = oldData.find(p => p.id === participant.id);
                        
                        if (!oldParticipant) {
                            newEntries.push(participant.id);
                        } else {
                            const oldIndex = oldData.findIndex(p => p.id === participant.id);
                            if (oldIndex !== index) {
                                positionChanges[participant.id] = oldIndex > index ? 'up' : 'down';
                            }
                        }
                    });
                    
                    updateLeaderboard(newEntries, positionChanges);
                })
                .catch(error => {
                    console.error('Error fetching leaderboard:', error);
                    document.getElementById('leaderboard-body').innerHTML = `
                        <div class="participant-row" style="justify-content: center; color: var(--danger);">
                            Error loading leaderboard: ${error.message}
                        </div>
                    `;
                });
        }
        
        function updateLeaderboard(newEntries = [], positionChanges = {}) {
            const leaderboardBody = document.getElementById('leaderboard-body');
            const podium = document.getElementById('podium');
            
            // Filter data based on current count
            const displayData = currentCount === Infinity ? 
                currentData : currentData.slice(0, currentCount);
            
            // Update podium (only for top 3)
            if (podiumVisible) {
                podium.innerHTML = '';
                for (let i = 0; i < Math.min(3, displayData.length); i++) {
                    const participant = displayData[i];
                    podium.innerHTML += `
                        <div class="podium-step podium-step-${i+1}">
                            <div class="podium-name">${participant.name}</div>
                            <div class="podium-points">${participant.points}</div>
                        </div>
                    `;
                }
            }
            
            // Update leaderboard
            let leaderboardHTML = '';
            
            displayData.forEach((participant, index) => {
                const isNew = newEntries.includes(participant.id);
                const positionChange = positionChanges[participant.id] || '';
                const changeClass = positionChange ? `position-${positionChange}` : '';
                const newClass = isNew ? 'new-entry' : '';
                
                // Calculate points change from previous data
                let pointsChange = '';
                if (currentData.length > 1) {
                    const prevParticipant = currentData.find(p => p.id === participant.id);
                    if (prevParticipant && prevParticipant.points !== participant.points) {
                        const change = participant.points - prevParticipant.points;
                        pointsChange = `<span class="change ${change > 0 ? 'positive' : 'negative'}">${change > 0 ? '+' : ''}${change}</span>`;
                    }
                }
                
                leaderboardHTML += `
                    <div class="participant-row ${newClass} ${changeClass}" data-id="${participant.id}">
                        <div class="rank rank-${index+1}">${index+1}</div>
                        <div class="name">${participant.name}</div>
                        <div class="points">${participant.points}</div>
                        ${pointsChange}
                    </div>
                `;
            });
            
            leaderboardBody.innerHTML = leaderboardHTML;
            
            // If no data, show message
            if (displayData.length === 0) {
                leaderboardBody.innerHTML = `
                    <div class="participant-row" style="justify-content: center; color: var(--gray);">
                        No participants found
                    </div>
                `;
            }
        }
    </script>
</body>
</html>
