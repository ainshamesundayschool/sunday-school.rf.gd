name: Deploy to Production
on:
  push:
    branches:
      - main
jobs:
  ftp-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Deploy via FTP (Attempt 1)
        id: deploy_1
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        continue-on-error: true
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: 21
          security: loose
          server-dir: /
          exclude: |
            **/.git*
            **/.git*/**
            **/.github*
            **/.github*/**
            **/uploads/**
            **/config.php
            **/php_errors.log
            **/php_errors
            **/upload_errors
            **/*.sql
            **/db_migrations/**
            **/migrations/**
            **/Peter Fayez.png
            **/Peter.png
            **/imgs/screenshots/**
            **/imgs/Sunday School App.png
            **/imgs/Sunday-School old.png

      - name: Wait 15s before retry
        if: steps.deploy_1.outcome == 'failure'
        run: sleep 15

      - name: Deploy via FTP (Attempt 2)
        id: deploy_2
        if: steps.deploy_1.outcome == 'failure'
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        continue-on-error: true
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: 21
          security: loose
          server-dir: /
          exclude: |
            **/.git*
            **/.git*/**
            **/.github*
            **/.github*/**
            **/uploads/**
            **/config.php
            **/php_errors.log
            **/php_errors
            **/upload_errors
            **/*.sql
            **/db_migrations/**
            **/migrations/**
            **/Peter Fayez.png
            **/Peter.png
            **/imgs/screenshots/**
            **/imgs/Sunday School App.png
            **/imgs/Sunday-School old.png

      - name: Wait 30s before final retry
        if: steps.deploy_1.outcome == 'failure' && steps.deploy_2.outcome == 'failure'
        run: sleep 30

      - name: Deploy via FTP (Attempt 3 - Final)
        if: steps.deploy_1.outcome == 'failure' && steps.deploy_2.outcome == 'failure'
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: 21
          security: loose
          server-dir: /
          exclude: |
            **/.git*
            **/.git*/**
            **/.github*
            **/.github*/**
            **/uploads/**
            **/config.php
            **/php_errors.log
            **/php_errors
            **/upload_errors
            **/*.sql
            **/db_migrations/**
            **/migrations/**
            **/Peter Fayez.png
            **/Peter.png
            **/imgs/screenshots/**
            **/imgs/Sunday School App.png
            **/imgs/Sunday-School old.png
