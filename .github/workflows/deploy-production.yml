name: Deploy to Production
on:
  push:
    branches:
      - main
jobs:
  ftp-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: 21
          security: loose
          server-dir: /
          timeout: 600000
          exclude: |
            **/.git*
            **/.git*/**
            **/.github*
            **/.github*/**
            **/uploads/**
            **/config.php
            **/php_errors.log
            **/php_errors
            **/upload_errors
            **/*.sql
            **/db_migrations/**
            **/migrations/**
            **/Peter Fayez.png
            **/Peter.png
            **/imgs/screenshots/**
            **/imgs/Sunday School App.png
            **/imgs/Sunday-School old.png
